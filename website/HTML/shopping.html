<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <link rel="icon" href="/static/images/PigStyle.ico">
    <title>Inventory - PigStyle Records</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-03HFDR9PV7"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-03HFDR9PV7');
    </script>
    
    <!-- External CSS -->
    <link rel="stylesheet" href="/static/css/shopping.css">
    
    <!-- JavaScript files -->
    <script src="/static/js/app-config.js"></script>
    <script src="/static/js/config-value-manager.js"></script>
</head>
<body>
    <!-- Navbar -->
    <nav style="background: #000; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; position: fixed; top: 0; left: 0; right: 0; z-index: 1000; border-bottom: 2px solid #ff6b6b;">
        <a href="/" style="color: white; text-decoration: none; font-size: 20px; font-weight: bold; display: flex; align-items: center; gap: 10px;">
            <img src="/static/images/PigStyle.ico" alt="PigStyle" style="height: 30px; width: 30px;">
        </a>
        <div style="display: flex; gap: 20px; align-items: center;">
            <a href="/shop" style="color: white; text-decoration: none;">Shop</a>
            <a href="/streaming" style="color: white; text-decoration: none;">Streaming</a>
            <a href="/consignment" style="color: white; text-decoration: none;">Consignment</a>
            <div id="auth-section"></div>
            
            <!-- Cart drawer toggle button - only shows when items exist -->
            <div id="cartToggleContainer" style="display: none;">
                <div class="cart-icon-wrapper" id="cartToggle">
                    <i class="fas fa-shopping-cart" style="color: white; font-size: 20px;"></i>
                    <span id="cartBadge" class="cart-badge">0</span>
                </div>
            </div>
        </div>
    </nav>

    <!-- Add padding to account for fixed navbar -->
    <div style="padding-top: 60px;"></div>

    <!-- Background Image -->
    <div class="background-container">
        <img src="/static/images/background.png" alt="Background" class="background-image">
        <div class="background-overlay"></div>
    </div>

    <div class="header-section">
        <div class='search-wrapper'>
            <input type='text' id='searchBox' placeholder='Search artist or record...'>
        </div>
        
        <div class="filter-section">
            <div class="filter-group">
                <div class="filter-label"><i class="far fa-calendar-alt"></i> New Arrivals</div>
                <div class="filter-toggle">
                    <button type="button" class="filter-toggle-btn active" id="newArrivalsToggle">
                        <span class="toggle-slider"></span>
                        <span class="toggle-label">Last 7 days</span>
                    </button>
                </div>
            </div>

            <div class="filter-group">
                <div class="filter-label"><i class="fas fa-music"></i> Genre</div>
                <div class="genre-filter">
                    <select id="genreSelect" class="genre-select">
                        <option value="">All Genres</option>
                    </select>
                </div>
            </div>
        </div>
    </div>
    
    <div class='catalog-container' id='catalogContainer'>
        <div id='loading'>
            <div class="loading-dots">
                <div></div>
                <div></div>
                <div></div>
                <div></div>
            </div>
            <p>Loading inventory...</p>
        </div>
    </div>

    <!-- Cart Drawer - Hidden by default -->
    <div class="cart-drawer" id="cartDrawer">
        <div class="cart-drawer-header">
            <h3><i class="fas fa-shopping-cart"></i> Your Cart</h3>
            <button class="cart-drawer-close" id="closeCartDrawer">&times;</button>
        </div>
        <div class="cart-drawer-items" id="cartItems">
            <!-- Cart items will be dynamically inserted here -->
            <div class="empty-cart-message">
                <i class="fas fa-shopping-bag"></i>
                <p>Your cart is empty</p>
            </div>
        </div>
        <div class="cart-drawer-footer" id="cartFooter" style="display: none;">
            <!-- Cart footer will be dynamically populated by updateCartDrawer() -->
        </div>
    </div>

    <!-- Cart Overlay (click to close) -->
    <div class="cart-overlay" id="cartOverlay"></div>

    <script>
        // Store all releases globally
        let allReleases = [];
        
        // Cart state
        let cart = {
            items: [],
            total: 0
        };

        // Current order being processed
        let currentOrder = null;

        // Shipping cost - will be set from config
        let shippingCost = 0;
        
        // Tax rate - will be loaded from config
        let taxRate = 0;

        // Debug mode
        let debugMode = true;

        // Default record image constant (empty string - we use CSS backgrounds now)
        const DEFAULT_RECORD_IMAGE = '';

        // Add debug message
        function addDebug(message, type = 'info') {
            if (!debugMode) return;
            console.log(`[Checkout Debug] ${message}`);
        }

        // Load cart from localStorage on page load
        function loadCart() {
            const savedCart = localStorage.getItem('pigstyle_cart');
            if (savedCart) {
                try {
                    cart = JSON.parse(savedCart);
                    updateCartDisplay();
                    addDebug(`Loaded cart with ${cart.items.length} items`);
                } catch (e) {
                    console.error('Error loading cart:', e);
                }
            }
        }

        // Save cart to localStorage
        function saveCart() {
            localStorage.setItem('pigstyle_cart', JSON.stringify(cart));
            updateCartDisplay();
        }

        // Update cart display (badge, toggle visibility, drawer)
        function updateCartDisplay() {
            const cartToggleContainer = document.getElementById('cartToggleContainer');
            const cartBadge = document.getElementById('cartBadge');
            
            // Update badge count
            const itemCount = cart.items.reduce((sum, item) => sum + item.quantity, 0);
            cartBadge.textContent = itemCount;
            
            // Show/hide cart toggle based on items
            if (itemCount > 0) {
                cartToggleContainer.style.display = 'block';
            } else {
                cartToggleContainer.style.display = 'none';
            }
            
            // Update cart drawer if it's open
            updateCartDrawer();
        }

        // Update cart drawer contents with tax display
        async function updateCartDrawer() {
            const cartItems = document.getElementById('cartItems');
            const cartFooter = document.getElementById('cartFooter');
            
            if (cart.items.length === 0) {
                cartItems.innerHTML = `
                    <div class="empty-cart-message">
                        <i class="fas fa-shopping-bag"></i>
                        <p>Your cart is empty</p>
                    </div>
                `;
                cartFooter.style.display = 'none';
            } else {
                // Calculate subtotal
                const subtotal = cart.items.reduce((sum, item) => sum + (item.price * item.quantity), 0);
                
                // Get tax rate (use stored value or fetch if needed)
                let currentTaxRate = taxRate;
                if (currentTaxRate === 0) {
                    try {
                        currentTaxRate = await getConfigValue('TAX_RATE') || 0;
                        taxRate = currentTaxRate; // Store for future use
                    } catch (e) {
                        console.warn('Could not fetch tax rate, using 0');
                        currentTaxRate = 0;
                    }
                }
                
                // Calculate tax
                const taxAmount = subtotal * (currentTaxRate / 100);
                const totalWithTax = subtotal + taxAmount;
                
                // Build items HTML with table layout
                let itemsHtml = `
                    <table class="cart-items-table">
                        <thead>
                            <tr>
                                <th>Item</th>
                                <th class="price-column">Price</th>
                                <th class="action-column"></th>
                            </tr>
                        </thead>
                        <tbody>
                `;
                
                cart.items.forEach((item, index) => {
                    const conditionClass = getConditionClass(item.condition);
                    
                    // Handle image display
                    const imageHtml = item.image_url ? 
                        `<img src="${item.image_url}" alt="${item.title}" class="cart-item-image" onerror="this.parentElement.innerHTML='<div class=\'cart-item-image default-record-bg\'></div>'">` : 
                        `<div class="cart-item-image default-record-bg"></div>`;
                    
                    itemsHtml += `
                        <tr class="cart-item-row" data-cart-index="${index}">
                            <td class="item-info-cell">
                                <div class="cart-item-info">
                                    ${imageHtml}
                                    <div class="cart-item-details">
                                        <div class="cart-item-title">${escapeHtml(item.title)}</div>
                                        <div class="cart-item-artist">${escapeHtml(item.artist)}</div>
                                        <span class="cart-item-condition ${conditionClass}">${item.condition || 'Unknown'}</span>
                                    </div>
                                </div>
                            </td>
                            <td class="item-price-cell">
                                <div class="cart-item-price">$${item.price.toFixed(2)}</div>
                            </td>
                            <td class="item-action-cell">
                                <button class="cart-item-remove-btn" onclick="removeFromCart(${index})" title="Remove item">
                                    <i class="fas fa-times"></i>
                                </button>
                            </td>
                        </tr>
                    `;
                });
                
                itemsHtml += `
                        </tbody>
                    </table>
                `;
                
                cartItems.innerHTML = itemsHtml;
                
                // Update footer with table layout for totals
                cartFooter.innerHTML = `
                    <table class="cart-totals-table">
                        <tbody>
                            <tr class="subtotal-row">
                                <td class="label">Subtotal:</td>
                                <td class="amount">$${subtotal.toFixed(2)}</td>
                            </tr>
                            <tr class="tax-row">
                                <td class="label">Tax (${currentTaxRate}%):</td>
                                <td class="amount">$${taxAmount.toFixed(2)}</td>
                            </tr>
                            <tr class="total-row">
                                <td class="label">Total:</td>
                                <td class="amount total-amount">$${totalWithTax.toFixed(2)}</td>
                            </tr>
                        </tbody>
                    </table>
                    <button class="checkout-btn" id="checkoutBtn">Proceed to Checkout</button>
                `;
                
                cartFooter.style.display = 'block';
                
                // Re-attach checkout button event listener
                document.getElementById('checkoutBtn').addEventListener('click', function() {
                    if (cart.items.length > 0) {
                        showShippingOptions();
                    }
                });
            }
        }

        // Check if a copy is already in cart
        function isInCart(copyId) {
            return cart.items.some(item => item.copyId === copyId);
        }

        // Add item to cart
        function addToCart(copy, release) {
            // Check if item is already in cart
            if (isInCart(copy.id)) {
                showNotification('This item is already in your cart!', 'error');
                return false;
            }
            
            // Add new item
            cart.items.push({
                copyId: copy.id,
                title: release.title,
                artist: release.artist,
                condition: copy.condition,
                price: copy.store_price,
                image_url: release.image_url,
                quantity: 1
            });
            
            // Recalculate cart.total
            cart.total = cart.items.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            
            saveCart();
            showNotification('Item added to cart!', 'success');
            return true;
        }

        // Remove item from cart
        function removeFromCart(index) {
            cart.items.splice(index, 1);
            
            // Recalculate cart.total after removal
            cart.total = cart.items.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            
            saveCart();
            showNotification('Item removed from cart', 'success');
            
            // If cart becomes empty, close the drawer
            if (cart.items.length === 0) {
                closeCartDrawer();
            }
        }

        // Clear entire cart
        function clearCart() {
            cart.items = [];
            cart.total = 0;
            
            saveCart();
            closeCartDrawer();
            showNotification('Cart cleared', 'success');
        }

        // Show notification
        function showNotification(message, type = 'success') {
            const notification = document.createElement('div');
            notification.className = `notification ${type === 'error' ? 'error' : ''}`;
            notification.textContent = message;
            
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.style.animation = 'slideOut 0.3s ease';
                setTimeout(() => {
                    notification.remove();
                }, 300);
            }, 3000);
        }

        // Open cart drawer
        function openCartDrawer() {
            document.getElementById('cartDrawer').classList.add('open');
            document.getElementById('cartOverlay').classList.add('active');
            updateCartDrawer(); // Refresh contents when opening
        }

        // Close cart drawer
        function closeCartDrawer() {
            document.getElementById('cartDrawer').classList.remove('open');
            document.getElementById('cartOverlay').classList.remove('active');
        }

        // Load data from grouped API endpoint
        async function loadCatalogData() {
            try {
                console.log('Loading grouped catalog data from API...');
                const response = await fetch(`${AppConfig.baseUrl}/catalog/grouped-by-release`);
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status} - ${response.statusText}`);
                }
                
                const data = await response.json();
                
                console.log('API Response:', data);
                
                if (data.status === 'success') {
                    allReleases = data.groups || [];
                    console.log(`Loaded ${allReleases.length} unique releases with ${data.total_copies} total copies`);
                    
                    // Populate genre filter
                    populateGenreFilter(allReleases);
                    
                    displayReleases(allReleases);
                } else {
                    throw new Error('Invalid response from server: ' + JSON.stringify(data));
                }
                
            } catch (error) {
                console.error('CRITICAL ERROR: Failed to load grouped catalog data:', error);
                
                // Show error message to user with details
                document.getElementById('catalogContainer').innerHTML = `
                    <div class="error-message">
                        <i class="fas fa-exclamation-triangle"></i>
                        <h2>Failed to Load Catalog</h2>
                        <p>Unable to retrieve inventory data from the server. Please try again or contact support if the problem persists.</p>
                        <div class="error-details">
                            <strong>Error:</strong> ${escapeHtml(error.message)}
                        </div>
                        <button class="retry-btn" onclick="window.location.reload()">
                            <i class="fas fa-sync-alt"></i> Retry
                        </button>
                    </div>
                `;
                
                // Re-throw the error to ensure it's not silently handled
                throw error;
            }
        }

        // Populate genre filter dropdown
        function populateGenreFilter(releases) {
            const genreSelect = document.getElementById('genreSelect');
            
            // Get unique genres
            const genres = new Set();
            releases.forEach(release => {
                if (release.genre_name) {
                    genres.add(release.genre_name);
                }
            });
            
            // Sort genres alphabetically
            const sortedGenres = Array.from(genres).sort();
            
            // Add options to select
            sortedGenres.forEach(genre => {
                const option = document.createElement('option');
                option.value = genre;
                option.textContent = genre;
                genreSelect.appendChild(option);
            });
        }

        // Display releases (keeps same tile layout)
        function displayReleases(releases) {
            const container = document.getElementById('catalogContainer');
            container.innerHTML = ''; // Clear loading message

            if (!releases || releases.length === 0) {
                container.innerHTML = '<div class="no-records">No records found in the database.</div>';
                return;
            }

            console.log(`Displaying ${releases.length} releases`);

            // Create a gallery container to maintain same layout
            const gallery = document.createElement('div');
            gallery.className = 'group-gallery';

            releases.forEach(release => {
                const card = createReleaseCard(release);
                gallery.appendChild(card);
            });

            container.appendChild(gallery);
            
            // Apply filters after loading
            setTimeout(() => {
                applyFilters();
            }, 100);
        }

        // Create a card for a release
        function createReleaseCard(release) {
            const card = document.createElement('div');
            card.className = 'card';
            
            // Set data attributes for filtering
            card.setAttribute('data-artist', (release.artist || '').toLowerCase());
            card.setAttribute('data-title', (release.title || '').toLowerCase());
            card.setAttribute('data-genre', release.genre_name || '');
            
            // Set date attribute for filtering (earliest creation date)
            if (release.created_at) {
                card.setAttribute('data-created', release.created_at);
                
                // Add "New Arrival" badge for items added in the last 7 days
                const sevenDaysAgo = new Date();
                sevenDaysAgo.setDate(sevenDaysAgo.getDate() - 7);
                const createdDate = new Date(release.created_at);
                
                if (createdDate >= sevenDaysAgo) {
                    const badge = document.createElement('div');
                    badge.className = 'new-arrival-badge';
                    badge.textContent = 'NEW';
                    card.appendChild(badge);
                }
            }
            
            // Get genre
            const genre = release.genre_name || 'Unknown Genre';
            
            // Calculate price range display
            const priceRange = release.price_range;
            let priceDisplay = '';
            if (priceRange.min > 0 && priceRange.max > 0) {
                if (priceRange.min === priceRange.max) {
                    priceDisplay = `$${priceRange.min.toFixed(2)}`;
                } else {
                    priceDisplay = `$${priceRange.min.toFixed(2)} - $${priceRange.max.toFixed(2)}`;
                }
            } else if (priceRange.min > 0) {
                priceDisplay = `$${priceRange.min.toFixed(2)}`;
            } else {
                priceDisplay = 'Price varies';
            }
            
            // Get all unique conditions from copies
            const conditions = [...new Set(release.copies.map(c => c.condition).filter(Boolean))];
            const conditionCounts = {};
            release.copies.forEach(copy => {
                if (copy.condition) {
                    conditionCounts[copy.condition] = (conditionCounts[copy.condition] || 0) + 1;
                }
            });
            
            // Sort conditions by grade
            const conditionOrder = {
                'Mint (M)': 1,
                'Near Mint (NM or M-)': 2,
                'Very Good Plus (VG+)': 3,
                'Very Good (VG)': 4,
                'Good Plus (G+)': 5,
                'Good (G)': 6,
                'Fair (F)': 7,
                'Poor (P)': 8
            };
            
            const sortedConditions = conditions.sort((a, b) => 
                (conditionOrder[a] || 99) - (conditionOrder[b] || 99)
            );
            
            // Build conditions HTML
            let conditionsHtml = '';
            if (sortedConditions.length > 0) {
                conditionsHtml = '<div class="conditions-list">';
                sortedConditions.slice(0, 3).forEach(condition => {
                    if (!condition) return;
                    const conditionClass = getConditionClass(condition);
                    const count = conditionCounts[condition] || '';
                    const countDisplay = count > 1 ? ` (${count})` : '';
                    conditionsHtml += `<span class="condition-indicator ${conditionClass}">${condition}${countDisplay}</span>`;
                });
                if (sortedConditions.length > 3) {
                    conditionsHtml += `<span class="more-copies">+${sortedConditions.length - 3} more</span>`;
                }
                conditionsHtml += '</div>';
            }
            
            // Copy count display - only show if more than 1 copy
            let copyCountHtml = '';
            if (release.total_copies > 1) {
                const copyCountText = `${release.total_copies} copies`;
                copyCountHtml = `<span class="copy-count">${copyCountText}</span>`;
            }
            
            // Handle image display - use CSS background if no image
            const imageHtml = release.image_url ? 
                `<img src="${release.image_url}" alt="${release.title}" onerror="this.parentElement.classList.add('default-record-bg'); this.style.display='none';">` : 
                '';
            
            card.innerHTML = `
                <div class="card-image ${!release.image_url ? 'default-record-bg' : ''}">
                    ${imageHtml}
                </div>
                <div class="card-info">
                    <h3>${escapeHtml(release.title)}</h3>
                    <p class="artist">${escapeHtml(release.artist)}</p>
                    
                    <div class="copy-info">
                        ${copyCountHtml}
                        <span class="price-range">${priceDisplay}</span>
                    </div>
                    
                    <p class="genre">${escapeHtml(genre)}</p>
                    
                    ${conditionsHtml}
                    
                    ${release.copies.some(c => c.youtube_url) ? `
                        <a href="#" class="youtube-link" onclick="handleYouTubeClick('${release.copies.find(c => c.youtube_url)?.youtube_url || ''}', '${escapeHtml(release.artist)} - ${escapeHtml(release.title)}'); return false;">
                            🎵 Watch Video
                        </a>
                    ` : ''}
                </div>
            `;
            
            // Add click handler to show all copies popup
            card.addEventListener('click', function(e) {
                // Don't trigger if clicking on YouTube link
                if (e.target.closest('.youtube-link')) return;
                
                // Show popup with all copies
                showCopiesPopup(release);
            });
            
            return card;
        }

        // Helper function to escape HTML
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Helper function to get CSS class for condition
        function getConditionClass(condition) {
            const conditionLower = (condition || '').toLowerCase();
            if (conditionLower.includes('mint') && !conditionLower.includes('near')) {
                return 'condition-mint';
            } else if (conditionLower.includes('near mint')) {
                return 'condition-near-mint';
            } else if (conditionLower.includes('very good plus')) {
                return 'condition-very-good-plus';
            } else if (conditionLower.includes('very good')) {
                return 'condition-very-good';
            } else if (conditionLower.includes('good plus')) {
                return 'condition-good-plus';
            } else if (conditionLower.includes('good')) {
                return 'condition-good';
            } else if (conditionLower.includes('fair')) {
                return 'condition-fair';
            } else if (conditionLower.includes('poor')) {
                return 'condition-poor';
            }
            return '';
        }

        // Show popup with all copies (with album image and add to cart buttons)
        function showCopiesPopup(release) {
            // Create modal overlay
            const modal = document.createElement('div');
            modal.className = 'copies-modal-overlay';
            
            // Sort copies by condition (best first)
            const conditionOrder = {
                'Mint (M)': 1,
                'Near Mint (NM or M-)': 2,
                'Very Good Plus (VG+)': 3,
                'Very Good (VG)': 4,
                'Good Plus (G+)': 5,
                'Good (G)': 6,
                'Fair (F)': 7,
                'Poor (P)': 8
            };
            
            const sortedCopies = [...release.copies].sort((a, b) => {
                const orderA = conditionOrder[a.condition] || 99;
                const orderB = conditionOrder[b.condition] || 99;
                if (orderA !== orderB) return orderA - orderB;
                return b.store_price - a.store_price; // Higher price first for same condition
            });
            
            // Handle image display - use CSS background if no image
            const imageHtml = release.image_url ? 
                `<img src="${release.image_url}" alt="${escapeHtml(release.title)}" onerror="this.parentElement.classList.add('default-record-bg'); this.style.display='none';">` : 
                '';
            
            // Build footer HTML - only show if more than 1 copy
            let footerHtml = '';
            if (release.total_copies > 1) {
                footerHtml = `
                    <div class="copies-modal-footer">
                        <span class="footer-total">Total Copies: ${release.total_copies}</span>
                    </div>
                `;
            }
            
            // Create modal content with image
            modal.innerHTML = `
                <div class="copies-modal">
                    <div class="copies-modal-header">
                        <h3>${escapeHtml(release.artist)} - ${escapeHtml(release.title)}</h3>
                        <button class="copies-modal-close">&times;</button>
                    </div>
                    <div class="copies-modal-content">
                        <div class="modal-album-image ${!release.image_url ? 'default-record-bg' : ''}">
                            ${imageHtml}
                        </div>
                        <div class="copies-list-with-image">
                            ${sortedCopies.map(copy => {
                                const conditionClass = getConditionClass(copy.condition);
                                const alreadyInCart = isInCart(copy.id);
                                return `
                                    <div class="copy-item">
                                        <div class="copy-item-content">
                                            <span class="copy-condition">
                                                <span class="condition-indicator ${conditionClass}">${copy.condition || 'Unknown'}</span>
                                            </span>
                                            <span class="copy-price">$${copy.store_price.toFixed(2)}</span>
                                        </div>
                                        <button class="add-to-cart-btn ${alreadyInCart ? 'in-cart' : ''}" 
                                                data-copy-id="${copy.id}" 
                                                data-copy-condition="${copy.condition}" 
                                                data-copy-price="${copy.store_price}"
                                                ${alreadyInCart ? 'disabled' : ''}>
                                            <i class="fas ${alreadyInCart ? 'fa-check' : 'fa-cart-plus'}"></i> 
                                            ${alreadyInCart ? 'In Cart' : 'Add to Cart'}
                                        </button>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    </div>
                    ${footerHtml}
                </div>
            `;
            
            // Add click handler to close button
            const closeBtn = modal.querySelector('.copies-modal-close');
            closeBtn.addEventListener('click', () => {
                modal.remove();
            });
            
            // Add click outside to close
            modal.addEventListener('click', function(e) {
                if (e.target === modal) {
                    modal.remove();
                }
            });
            
            // Add event listeners for add to cart buttons
            modal.querySelectorAll('.add-to-cart-btn:not([disabled])').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    e.stopPropagation();
                    
                    const copyId = btn.dataset.copyId;
                    
                    // Find the full copy object
                    const copy = release.copies.find(c => c.id == copyId);
                    
                    if (copy) {
                        const added = addToCart(copy, release);
                        
                        if (added) {
                            // Close the modal after adding to cart
                            modal.remove();
                        }
                    }
                });
            });
            
            document.body.appendChild(modal);
        }

            const videoId = extractYouTubeId(youtubeUrl);
            if (!videoId) {

            const modal = document.createElement('div');
            modal.className = 'youtube-modal-overlay';
            
            modal.innerHTML = `

                    </div>

                            src="https://www.youtube.com/embed/${videoId}?autoplay=1" 
                            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"

        // Extract YouTube ID
        function extractYouTubeId(url) {
            if (!url) return null;
            
            const patterns = [
                /youtube\.com\/watch\?v=([a-zA-Z0-9_-]{11})/,
                /youtu\.be\/([a-zA-Z0-9_-]{11})/,
                /youtube\.com\/embed\/([a-zA-Z0-9_-]{11})/,
                /youtube\.com\/v\/([a-zA-Z0-9_-]{11})/
            ];
            
            for (const pattern of patterns) {
                const match = url.match(pattern);
                if (match && match[1]) {
                    return match[1];
                }
            }
            
            return null;
        }

        // Apply all filters (new arrivals toggle and genre)
        function applyFilters() {
            const container = document.getElementById('catalogContainer');
            const cards = container.querySelectorAll('.card');
            const newArrivalsActive = document.getElementById('newArrivalsToggle').classList.contains('active');
            const selectedGenre = document.getElementById('genreSelect').value;
            
            let visibleCount = 0;
            
            cards.forEach(card => {
                const createdDate = card.getAttribute('data-created');
                const genre = card.getAttribute('data-genre') || '';
                
                // Check new arrivals filter
                let dateMatch = true;
                if (newArrivalsActive && createdDate) {
                    const sevenDaysAgo = new Date();
                    sevenDaysAgo.setDate(sevenDaysAgo.getDate() - 7);
                    sevenDaysAgo.setHours(0, 0, 0, 0);
                    const cardDate = new Date(createdDate);
                    dateMatch = cardDate >= sevenDaysAgo;
                }
                
                // Check genre filter
                const genreMatch = !selectedGenre || genre === selectedGenre;
                
                // Get search term from search box
                const searchTerm = document.getElementById('searchBox').value.toLowerCase().trim();
                const artist = card.getAttribute('data-artist') || '';
                const title = card.getAttribute('data-title') || '';
                const searchMatch = !searchTerm || artist.includes(searchTerm) || title.includes(searchTerm);
                
                const shouldShow = dateMatch && genreMatch && searchMatch;
                
                card.style.display = shouldShow ? 'block' : 'none';
                if (shouldShow) visibleCount++;
            });
            
            // Show no results message if needed
            const existingNoResults = container.querySelector('.no-records');
            if (visibleCount === 0) {
                if (!existingNoResults) {
                    const noResultsDiv = document.createElement('div');
                    noResultsDiv.className = 'no-records';
                    noResultsDiv.textContent = 'No records match your filters.';
                    container.appendChild(noResultsDiv);
                }
            } else if (existingNoResults) {
                existingNoResults.remove();
            }
        }

        // Initialize filters
        function initializeFilters() {
            const searchBox = document.getElementById('searchBox');
            const newArrivalsToggle = document.getElementById('newArrivalsToggle');
            const genreSelect = document.getElementById('genreSelect');
            
            // Search functionality
            searchBox.addEventListener('input', applyFilters);
            
            // New arrivals toggle (click to toggle on/off)
            newArrivalsToggle.addEventListener('click', function() {
                this.classList.toggle('active');
                applyFilters();
            });
            
            // Genre filter
            genreSelect.addEventListener('change', applyFilters);
        }

        // Process checkout with Square (order creation happens on backend)
        async function processCheckout(shippingData) {
            try {
                // Close cart drawer
                closeCartDrawer();
                
                // Show processing modal
                const modal = document.createElement('div');
                modal.className = 'payment-modal-overlay';
                modal.innerHTML = `
                    <div class="payment-modal">
                        <div class="loading-spinner"></div>
                        <h2>Processing Checkout...</h2>
                        <p>Please wait while we prepare your payment.</p>
                    </div>
                `;
                document.body.appendChild(modal);
                
                addDebug('Sending cart to backend for checkout...');
                
                // Calculate tax (use stored taxRate)
                const taxableAmount = cart.total + (shippingData?.cost || 0);
                const taxAmount = taxableAmount * (taxRate / 100);
                const totalWithTax = taxableAmount + taxAmount;
                
                // Prepare items array
                const items = cart.items.map(item => ({
                    copy_id: item.copyId,
                    title: item.title,
                    artist: item.artist,
                    condition: item.condition,
                    price: item.price,
                    quantity: item.quantity || 1
                }));
                
                // Prepare customer/shipping data
                const requestData = {
                    items: items,
                    shipping: shippingData.method === 'ship' ? {
                        amount: shippingData.cost,
                        name: 'Shipping'
                    } : null,
                    subtotal: cart.total,
                    tax: taxAmount,
                    total: totalWithTax,
                    currency: 'USD'
                };
 
                // Add customer info if shipping
                if (shippingData.method === 'ship') {
                    Object.assign(requestData, {
                        customer_name: shippingData.fullName,
                        customer_email: shippingData.email,
                        address: shippingData.address,
                        apt: shippingData.apt,
                        city: shippingData.city,
                        state: shippingData.state,
                        zip: shippingData.zip,
                        country: shippingData.country
                    });
                }
                
                // Send to checkout endpoint
                const response = await fetch(`${AppConfig.baseUrl}/api/checkout/process`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(requestData)
                });
                
                const data = await response.json();
                
                if (data.status === 'success' && data.checkout_url) {
                    // Store order info for reference
                    currentOrder = {
                        order_id: data.order_id,
                        order_number: data.order_number
                    };
                    
                    // Redirect to Square checkout page
                    addDebug(`Redirecting to Square checkout: ${data.checkout_url}`);
                    window.location.href = data.checkout_url;
                    
                } else if (data.status === 'error') {
                    // Payment failed
                    modal.innerHTML = `
                        <div class="payment-modal">
                            <i class="fas fa-exclamation-circle"></i>
                            <h2>Checkout Failed</h2>
                            <p>${data.error || 'An error occurred processing your checkout.'}</p>
                            <button class="payment-btn payment-btn-primary" id="tryAgainBtn">
                                Try Again
                            </button>
                            <button class="payment-btn payment-btn-secondary" id="closeErrorBtn" style="margin-top: 10px;">
                                Cancel
                            </button>
                        </div>
                    `;
                    
                    document.getElementById('tryAgainBtn').addEventListener('click', () => {
                        modal.remove();
                        processCheckout(shippingData);
                    });
                    
                    document.getElementById('closeErrorBtn').addEventListener('click', () => {
                        modal.remove();
                        openCartDrawer();
                    });
                }
                
            } catch (error) {
                console.error('Checkout error:', error);
                addDebug(`Checkout error: ${error.message}`, 'error');
                
                // Remove any existing modal
                const existingModal = document.querySelector('.payment-modal-overlay');
                if (existingModal) {
                    existingModal.remove();
                }
                
                showNotification('Error processing checkout: ' + error.message, 'error');
                openCartDrawer();
            }
        }

        // Check checkout status when returning from Square
        async function checkReturnStatus() {
            const urlParams = new URLSearchParams(window.location.search);
            const transactionId = urlParams.get('transactionId');
            const status = urlParams.get('status');
            const orderId = urlParams.get('order_id');
            
            addDebug(`Returning from checkout: transactionId=${transactionId}, status=${status}, orderId=${orderId}`);
            
            if (transactionId && status === 'completed' && orderId) {
                try {
                    // Call backend to update record statuses
                    const response = await fetch(`${AppConfig.baseUrl}/api/order/complete`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            transaction_id: transactionId,
                            order_id: orderId
                        })
                    });
                    
                    const data = await response.json();
                    
                    if (data.status === 'success') {
                        addDebug('Order status updated successfully');
                    } else {
                        addDebug(`Failed to update order: ${data.error}`, 'error');
                    }
                } catch (error) {
                    addDebug(`Error calling order complete endpoint: ${error.message}`, 'error');
                } finally {
                    // Clear cart on successful payment
                    cart.items = [];
                    saveCart();
                    
                    // Show success message
                    setTimeout(() => {
                        showNotification('Payment successful! Thank you for your purchase.', 'success');
                    }, 500);
                    
                    // Remove query parameters from URL
                    window.history.replaceState({}, document.title, '/shop');
                }
            } else if (status === 'canceled') {
                showNotification('Checkout was canceled.', 'error');
                window.history.replaceState({}, document.title, '/shop');
            }
        }
