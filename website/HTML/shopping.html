<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <link rel="icon" href="/static/images/PigStyle.ico">
    <title>Inventory - PigStyle Records</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-03HFDR9PV7"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-03HFDR9PV7');
    </script>
    
    <!-- External CSS -->
    <link rel="stylesheet" href="/static/css/shopping.css">
    
    <!-- JavaScript files -->
    <script src="/static/js/app-config.js"></script>
    <script src="/static/js/config-value-manager.js"></script>
    
    <style>
        /* Format filter additional styles */
        .format-indicator.vinyl-33 { background: #2c3e50; color: white; }
        .format-indicator.vinyl-45 { background: #e67e22; color: white; }
        .format-indicator.vinyl-78 { background: #8e44ad; color: white; }
        .format-indicator.cd { background: #3498db; color: white; }
        .format-indicator.cassette { background: #1abc9c; color: white; }
        
        .format-indicator i { margin-right: 5px; font-size: 11px; }
        
        .toggle-switch {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            padding: 8px 12px;
            background: #f8f9fa;
            border-radius: 20px;
            border: 1px solid #ddd;
        }
        .toggle-switch input {
            display: none;
        }
        .toggle-slider {
            width: 40px;
            height: 20px;
            background: #ccc;
            border-radius: 20px;
            position: relative;
            transition: 0.3s;
        }
        .toggle-slider:before {
            content: "";
            position: absolute;
            width: 16px;
            height: 16px;
            background: white;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: 0.3s;
        }
        .toggle-switch input:checked + .toggle-slider {
            background: #007bff;
        }
        .toggle-switch input:checked + .toggle-slider:before {
            left: 22px;
        }
        .toggle-label {
            font-size: 13px;
            color: #333;
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav>
        <a href="/">
            <img src="/static/images/PigStyle.ico" alt="PigStyle">
        </a>
        <div>
            <a href="/shop" style="color: #ff6b6b; text-decoration: none;">Browse</a>
            <a href="/merch" style="color: white; text-decoration: none; font-weight: bold;">Merch</a>
            <a href="/streaming" style="color: white; text-decoration: none;">Stream</a>
            <a href="/connect" style="color: white; text-decoration: none;">Connect</a>
            <div id="auth-section"></div>
            
            <!-- Cart drawer toggle button - only shows when items exist -->
            <div id="cartToggleContainer" style="display: none;">
                <div class="cart-icon-wrapper" id="cartToggle">
                    <i class="fas fa-shopping-cart"></i>
                    <span id="cartBadge" class="cart-badge">0</span>
                </div>
            </div>
        </div>
    </nav>

    <!-- Add padding to account for fixed navbar -->
    <div style="padding-top: 60px;"></div>

    <!-- Background Image -->
    <div class="background-container">
        <img src="/static/images/background.png" alt="Background" class="background-image">
        <div class="background-overlay"></div>
    </div>

    <div class="header-section">
        <div class='search-wrapper'>
            <input type='text' id='searchBox' placeholder='Search artist or record...'>
        </div>
        
        <div class="filter-section">
            <!-- Genre Filter -->
            <div class="filter-group">
                <div class="filter-label"><i class="fas fa-music"></i> Genre</div>
                <div class="filter-controls">
                    <button id="genreFilterBtn" class="filter-toggle-btn">
                        <i class="fas fa-filter"></i> Filter Genres
                    </button>
                    
                    <div id="genreCheckboxContainer" class="filter-checkbox-container">
                        <div class="filter-checkbox-loading">
                            <div class="loading-dots small">
                                <div></div>
                                <div></div>
                                <div></div>
                                <div></div>
                            </div>
                            <p>Loading genres...</p>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Format / Speed Filter -->
            <div class="filter-group">
                <div class="filter-label"><i class="fas fa-record-vinyl"></i> Format / Speed</div>
                <div class="filter-controls">
                    <button id="formatFilterBtn" class="filter-toggle-btn">
                        <i class="fas fa-filter"></i> Filter Formats
                    </button>
                    
                    <div id="formatCheckboxContainer" class="filter-checkbox-container">
                        <div class="filter-checkbox-header">
                            <h3>Select Formats</h3>
                        </div>
                        <div class="filter-checkbox-group">
                            <div class="filter-checkbox-item">
                                <input type="checkbox" id="format-33" value="33" checked>
                                <label for="format-33"><i class="fas fa-record-vinyl"></i> 33⅓ RPM (LP)</label>
                            </div>
                            <div class="filter-checkbox-item">
                                <input type="checkbox" id="format-45" value="45" checked>
                                <label for="format-45"><i class="fas fa-record-vinyl"></i> 45 RPM (Single)</label>
                            </div>
                            <div class="filter-checkbox-item">
                                <input type="checkbox" id="format-78" value="78" checked>
                                <label for="format-78"><i class="fas fa-record-vinyl"></i> 78 RPM (Shellac)</label>
                            </div>
                            <div class="filter-checkbox-item">
                                <input type="checkbox" id="format-cd" value="cd" checked>
                                <label for="format-cd"><i class="fas fa-compact-disc"></i> CD</label>
                            </div>
                            <div class="filter-checkbox-item">
                                <input type="checkbox" id="format-cassette" value="cassette" checked>
                                <label for="format-cassette"><i class="fas fa-tape"></i> Cassette</label>
                            </div>
                        </div>
                        <div class="filter-actions">
                            <button class="filter-action-btn filter-select-all" id="selectAllFormats">Select All</button>
                            <button class="filter-action-btn filter-deselect-all" id="deselectAllFormats">Clear All</button>
                            <button class="filter-action-btn filter-apply" id="applyFormatFilter">Apply</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <div class='catalog-container' id='catalogContainer'>
        <div id='loading'>
            <div class="loading-dots">
                <div></div>
                <div></div>
                <div></div>
                <div></div>
            </div>
            <p>Loading inventory...</p>
        </div>
    </div>

    <!-- Cart Drawer - Hidden by default -->
    <div class="cart-drawer" id="cartDrawer">
        <div class="cart-drawer-header">
            <h3><i class="fas fa-shopping-cart"></i> Your Cart</h3>
            <button class="cart-drawer-close" id="closeCartDrawer">&times;</button>
        </div>
        <div class="cart-drawer-items" id="cartItems">
            <!-- Cart items will be dynamically inserted here -->
            <div class="empty-cart-message">
                <i class="fas fa-shopping-bag"></i>
                <p>Your cart is empty</p>
            </div>
        </div>
        <div class="cart-drawer-footer" id="cartFooter" style="display: none;">
            <!-- Cart footer will be dynamically populated by updateCartDrawer() -->
        </div>
    </div>

    <!-- Cart Overlay (click to close) -->
    <div class="cart-overlay" id="cartOverlay"></div>

    <script>
        // Store all releases globally
        let allReleases = [];
        
        // Store available genres
        let availableGenres = [];
        
        // Current selected genres for filtering
        let selectedGenres = [];
        
        // Current selected formats for filtering
        let selectedFormats = ['33', '45', '78', 'cd', 'cassette'];
        
        // Cart state
        let cart = {
            items: [],
            total: 0
        };

        // Current order being processed
        let currentOrder = null;

        // Shipping cost - will be set from config
        let shippingCost = 0;
        
        // Tax rate - will be loaded from config
        let taxRate = 0;

        // Debug mode
        let debugMode = true;

        // Add debug message
        function addDebug(message, type = 'info') {
            if (!debugMode) return;
            console.log(`[Checkout Debug] ${message}`);
        }

        // Get format from barcode prefix
        function getFormatFromBarcode(barcode) {
            if (!barcode || typeof barcode !== 'string') {
                return 'unknown';
            }
            
            const prefix = barcode.substring(0, 2);
            
            switch(prefix) {
                case '22':
                    return '33';
                case '55':
                    return '45';
                case '66':
                    return '78';
                case '33':
                    return 'cd';
                case '44':
                    return 'cassette';
                default:
                    return 'unknown';
            }
        }

        // Load cart from localStorage on page load
        function loadCart() {
            const savedCart = localStorage.getItem('pigstyle_cart');
            if (savedCart) {
                try {
                    cart = JSON.parse(savedCart);
                    updateCartDisplay();
                    addDebug(`Loaded cart with ${cart.items.length} items`);
                } catch (e) {
                    console.error('Error loading cart:', e);
                }
            }
        }

        // Save cart to localStorage
        function saveCart() {
            localStorage.setItem('pigstyle_cart', JSON.stringify(cart));
            updateCartDisplay();
        }

        // Update cart display (badge, toggle visibility, drawer)
        function updateCartDisplay() {
            const cartToggleContainer = document.getElementById('cartToggleContainer');
            const cartBadge = document.getElementById('cartBadge');
            
            // Update badge count
            const itemCount = cart.items.reduce((sum, item) => sum + item.quantity, 1);
            cartBadge.textContent = itemCount;
            
            // Show/hide cart toggle based on items
            if (itemCount > 0) {
                cartToggleContainer.style.display = 'block';
            } else {
                cartToggleContainer.style.display = 'none';
            }
            
            // Update cart drawer if it's open
            updateCartDrawer();
        }

        // Update cart drawer contents with tax display
        async function updateCartDrawer() {
            const cartItems = document.getElementById('cartItems');
            const cartFooter = document.getElementById('cartFooter');
            
            if (cart.items.length === 0) {
                cartItems.innerHTML = `
                    <div class="empty-cart-message">
                        <i class="fas fa-shopping-bag"></i>
                        <p>Your cart is empty</p>
                    </div>
                `;
                cartFooter.style.display = 'none';
            } else {
                // Calculate subtotal
                const subtotal = cart.items.reduce((sum, item) => sum + (item.price * item.quantity), 0);
                
                // Get tax rate (use stored value or fetch if needed)
                let currentTaxRate = taxRate;
                if (currentTaxRate === 0) {
                    try {
                        currentTaxRate = await getConfigValue('TAX_RATE') || 0;
                        taxRate = currentTaxRate; // Store for future use
                    } catch (e) {
                        console.warn('Could not fetch tax rate, using 0');
                        currentTaxRate = 0;
                    }
                }
                
                // Calculate tax
                const taxAmount = subtotal * (currentTaxRate / 100);
                const totalWithTax = subtotal + taxAmount;
                
                // Build items HTML with table layout
                let itemsHtml = `
                    <table class="cart-items-table">
                        <thead>
                            <tr>
                                <th>Item</th>
                                <th class="price-column">Price</th>
                                <th class="action-column"></th>
                            </thead>
                        <tbody>
                `;
                
                cart.items.forEach((item, index) => {
                    const conditionClass = getConditionClass(item.condition);
                    
                    // Handle image display
                    const imageHtml = item.image_url ? 
                        `<img src="${item.image_url}" alt="${item.title}" class="cart-item-image" onerror="this.parentElement.innerHTML='<div class=\'cart-item-image default-record-bg\'></div>'">` : 
                        `<div class="cart-item-image default-record-bg"></div>`;
                    
                    itemsHtml += `
                        <tr class="cart-item-row" data-cart-index="${index}">
                            <td class="item-info-cell">
                                <div class="cart-item-info">
                                    ${imageHtml}
                                    <div class="cart-item-details">
                                        <div class="cart-item-title">${escapeHtml(item.title)}</div>
                                        <div class="cart-item-artist">${escapeHtml(item.artist)}</div>
                                        <span class="cart-item-condition ${conditionClass}">${item.condition || 'Unknown'}</span>
                                        ${item.format ? `<div class="cart-item-format"><i class="fas ${item.format === 'CD' ? 'fa-compact-disc' : 'fa-record-vinyl'}"></i> ${item.format}</div>` : ''}
                                    </div>
                                </div>
                             </td>
                            <td class="item-price-cell">
                                <div class="cart-item-price">$${item.price.toFixed(2)}</div>
                             </td>
                            <td class="item-action-cell">
                                <button class="cart-item-remove-btn" onclick="removeFromCart(${index})" title="Remove item">
                                    <i class="fas fa-times"></i>
                                </button>
                             </td>
                         </tr>
                    `;
                });
                
                itemsHtml += `
                        </tbody>
                    </table>
                `;
                
                cartItems.innerHTML = itemsHtml;
                
                // Update footer with table layout for totals
                cartFooter.innerHTML = `
                    <table class="cart-totals-table">
                        <tbody>
                            <tr class="subtotal-row">
                                <td class="label">Subtotal:</td>
                                <td class="amount">$${subtotal.toFixed(2)}</td>
                             </tr>
                            <tr class="tax-row">
                                <td class="label">Tax (${currentTaxRate}%):</td>
                                <td class="amount">$${taxAmount.toFixed(2)}</td>
                             </tr>
                            <tr class="total-row">
                                <td class="label">Total:</td>
                                <td class="amount total-amount">$${totalWithTax.toFixed(2)}</td>
                             </tr>
                        </tbody>
                    </table>
                    <button class="checkout-btn" id="checkoutBtn">Proceed to Checkout</button>
                `;
                
                cartFooter.style.display = 'block';
                
                // Re-attach checkout button event listener
                document.getElementById('checkoutBtn').addEventListener('click', function() {
                    if (cart.items.length > 0) {
                        showShippingOptions();
                    }
                });
            }
        }

        // Check if a copy is already in cart
        function isInCart(copyId) {
            return cart.items.some(item => item.copyId === copyId);
        }

        // Add item to cart
        function addToCart(copy, release, format) {
            // Check if item is already in cart
            if (isInCart(copy.id)) {
                showNotification('This item is already in your cart!', 'error');
                return false;
            }
            
            // Add new item
            cart.items.push({
                copyId: copy.id,
                title: release.title,
                artist: release.artist,
                condition: copy.condition,
                price: copy.store_price,
                image_url: release.image_url,
                format: format,
                quantity: 1
            });
            
            // Recalculate cart.total
            cart.total = cart.items.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            
            saveCart();
            showNotification(`Added ${format} - ${release.title} to cart!`, 'success');
            return true;
        }

        // Remove item from cart
        function removeFromCart(index) {
            cart.items.splice(index, 1);
            
            // Recalculate cart.total after removal
            cart.total = cart.items.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            
            saveCart();
            showNotification('Item removed from cart', 'success');
            
            // If cart becomes empty, close the drawer
            if (cart.items.length === 0) {
                closeCartDrawer();
            }
        }

        // Clear entire cart
        function clearCart() {
            cart.items = [];
            cart.total = 0;
            
            saveCart();
            closeCartDrawer();
            showNotification('Cart cleared', 'success');
        }

        // Show notification
        function showNotification(message, type = 'success') {
            const notification = document.createElement('div');
            notification.className = `notification ${type === 'error' ? 'error' : ''}`;
            notification.textContent = message;
            
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.style.animation = 'slideOut 0.3s ease';
                setTimeout(() => {
                    notification.remove();
                }, 300);
            }, 3000);
        }

        // Open cart drawer
        function openCartDrawer() {
            document.getElementById('cartDrawer').classList.add('open');
            document.getElementById('cartOverlay').classList.add('active');
            updateCartDrawer(); // Refresh contents when opening
        }

        // Close cart drawer
        function closeCartDrawer() {
            document.getElementById('cartDrawer').classList.remove('open');
            document.getElementById('cartOverlay').classList.remove('active');
        }

        // Load data from grouped API endpoint
        async function loadCatalogData() {
            try {
                console.log('Loading grouped catalog data from API...');
                const response = await fetch(`${AppConfig.baseUrl}/catalog/grouped-by-release`);
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status} - ${response.statusText}`);
                }
                
                const data = await response.json();
                
                console.log('API Response:', data);
                
                if (data.status === 'success') {
                    allReleases = data.groups || [];
                    
                    // Extract unique genres from releases
                    const genreSet = new Set();
                    allReleases.forEach(release => {
                        if (release.genre_name && release.genre_name !== 'Unknown') {
                            genreSet.add(release.genre_name);
                        }
                    });
                    
                    // Convert to array and sort
                    availableGenres = Array.from(genreSet).sort();
                    
                    console.log(`Loaded ${allReleases.length} unique releases with ${data.total_copies} total copies`);
                    console.log(`Found ${availableGenres.length} unique genres:`, availableGenres);
                    
                    // Populate genre filter dropdown
                    populateGenreFilter();
                    
                    // Populate format filter
                    populateFormatFilter();
                    
                    displayReleases(allReleases);
                } else {
                    throw new Error('Invalid response from server: ' + JSON.stringify(data));
                }
                
            } catch (error) {
                console.error('CRITICAL ERROR: Failed to load grouped catalog data:', error);
                
                // Show error message to user with details
                document.getElementById('catalogContainer').innerHTML = `
                    <div class="error-message">
                        <i class="fas fa-exclamation-triangle"></i>
                        <h2>Failed to Load Catalog</h2>
                        <p>Unable to retrieve inventory data from the server. Please try again or contact support if the problem persists.</p>
                        <div class="error-details">
                            <strong>Error:</strong> ${escapeHtml(error.message)}
                        </div>
                        <button class="retry-btn" onclick="window.location.reload()">
                            <i class="fas fa-sync-alt"></i> Retry
                        </button>
                    </div>
                `;
                
                // Re-throw the error to ensure it's not silently handled
                throw error;
            }
        }
        
        // Helper function to get date category data - FIXED TIMEZONE VERSION
        function getDateCategoryData(createdDate) {
            if (!createdDate) return null;
            
            // Parse the date string - handle both UTC and local formats
            let recordDate;
            
            // If it's a string like "2024-03-28 20:59:22" (database format)
            if (typeof createdDate === 'string' && createdDate.includes(' ')) {
                // Replace space with T to make it ISO-like, then parse
                const isoString = createdDate.replace(' ', 'T') + 'Z';
                recordDate = new Date(isoString);
            } else {
                recordDate = new Date(createdDate);
            }
            
            // Check if date is valid
            if (isNaN(recordDate.getTime())) {
                console.warn('Invalid date:', createdDate);
                return null;
            }
            
            // Get today's date at midnight LOCAL time
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            
            // Get record date at midnight LOCAL time (not UTC)
            const recordDateLocal = new Date(recordDate);
            recordDateLocal.setHours(0, 0, 0, 0);
            
            // Calculate difference in days (local time)
            const diffDays = Math.floor((today - recordDateLocal) / (1000 * 60 * 60 * 24));
            
            // Format the full date for display
            const fullDate = recordDate.toLocaleDateString('en-US', { 
                month: 'long', 
                day: 'numeric', 
                year: 'numeric' 
            });
            
            // If diffDays is negative or zero, show as "Added Today"
            if (diffDays <= 0) {
                return { 
                    label: 'Added Today', 
                    emoji: '🆕',
                    fullDate: fullDate
                };
            } else if (diffDays === 1) {
                return { 
                    label: 'Added Yesterday', 
                    emoji: '✨',
                    fullDate: fullDate
                };
            } else if (diffDays <= 7) {
                return { 
                    label: `Added ${diffDays} Days Ago`, 
                    emoji: '📅',
                    fullDate: fullDate
                };
            } else if (diffDays <= 14) {
                return { 
                    label: 'Added Last Week', 
                    emoji: '📆',
                    fullDate: fullDate
                };
            } else if (diffDays <= 30) {
                return { 
                    label: 'Added This Month', 
                    emoji: '🗓️',
                    fullDate: fullDate
                };
            } else {
                return { 
                    label: 'Added Earlier', 
                    emoji: '💿',
                    fullDate: fullDate
                };
            }
        }

        // Group releases by date
        function groupReleasesByDate(releases) {
            const groups = [];
            let currentDateKey = null;
            let currentDateGroup = null;
            
            releases.forEach(release => {
                const dateData = getDateCategoryData(release.created_at);
                if (!dateData) return;
                
                const dateKey = release.created_at ? new Date(release.created_at).toDateString() : 'unknown';
                
                if (dateKey !== currentDateKey) {
                    // Save previous group if exists
                    if (currentDateGroup) {
                        groups.push(currentDateGroup);
                    }
                    
                    // Start new group
                    currentDateKey = dateKey;
                    currentDateGroup = {
                        dateData: dateData,
                        releases: []
                    };
                }
                
                currentDateGroup.releases.push(release);
            });
            
            // Push the last group
            if (currentDateGroup) {
                groups.push(currentDateGroup);
            }
            
            return groups;
        }

        // Populate genre filter dropdown
        function populateGenreFilter() {
            const container = document.getElementById('genreCheckboxContainer');
            
            if (!container) return;
            
            if (availableGenres.length === 0) {
                container.innerHTML = '<div class="filter-checkbox-loading">No genres available</div>';
                return;
            }
            
            let html = `
                <div class="filter-checkbox-header">
                    <h3>Select Genres</h3>
                </div>
                <div class="filter-checkbox-group">
            `;
            
            availableGenres.forEach(genre => {
                const checked = selectedGenres.includes(genre) ? 'checked' : '';
                html += `
                    <div class="filter-checkbox-item">
                        <input type="checkbox" id="genre-${escapeHtml(genre)}" value="${escapeHtml(genre)}" ${checked}>
                        <label for="genre-${escapeHtml(genre)}">${escapeHtml(genre)}</label>
                    </div>
                `;
            });
            
            html += `
                </div>
                <div class="filter-actions">
                    <button class="filter-action-btn filter-select-all" id="selectAllGenres">Select All</button>
                    <button class="filter-action-btn filter-deselect-all" id="deselectAllGenres">Clear All</button>
                    <button class="filter-action-btn filter-apply" id="applyGenreFilter">Apply</button>
                </div>
            `;
            
            container.innerHTML = html;
            
            // Add event listeners
            document.getElementById('selectAllGenres').addEventListener('click', () => {
                document.querySelectorAll('#genreCheckboxContainer input[type="checkbox"]').forEach(cb => {
                    cb.checked = true;
                });
            });
            
            document.getElementById('deselectAllGenres').addEventListener('click', () => {
                document.querySelectorAll('#genreCheckboxContainer input[type="checkbox"]').forEach(cb => {
                    cb.checked = false;
                });
            });
            
            document.getElementById('applyGenreFilter').addEventListener('click', () => {
                // Update selected genres
                selectedGenres = [];
                document.querySelectorAll('#genreCheckboxContainer input[type="checkbox"]:checked').forEach(cb => {
                    selectedGenres.push(cb.value);
                });
                
                // Close the dropdown
                document.getElementById('genreCheckboxContainer').classList.remove('show');
                
                // Apply filters
                applyFilters();
            });
        }
        
        // Populate format filter
        function populateFormatFilter() {
            const container = document.getElementById('formatCheckboxContainer');
            if (!container) return;
            
            // Get checkbox elements
            const format33 = document.getElementById('format-33');
            const format45 = document.getElementById('format-45');
            const format78 = document.getElementById('format-78');
            const formatCd = document.getElementById('format-cd');
            const formatCassette = document.getElementById('format-cassette');
            
            // Set initial checked state
            if (format33) format33.checked = selectedFormats.includes('33');
            if (format45) format45.checked = selectedFormats.includes('45');
            if (format78) format78.checked = selectedFormats.includes('78');
            if (formatCd) formatCd.checked = selectedFormats.includes('cd');
            if (formatCassette) formatCassette.checked = selectedFormats.includes('cassette');
            
            // Add event listeners for buttons
            const selectAllBtn = document.getElementById('selectAllFormats');
            const deselectAllBtn = document.getElementById('deselectAllFormats');
            const applyBtn = document.getElementById('applyFormatFilter');
            
            if (selectAllBtn) {
                selectAllBtn.addEventListener('click', () => {
                    if (format33) format33.checked = true;
                    if (format45) format45.checked = true;
                    if (format78) format78.checked = true;
                    if (formatCd) formatCd.checked = true;
                    if (formatCassette) formatCassette.checked = true;
                });
            }
            
            if (deselectAllBtn) {
                deselectAllBtn.addEventListener('click', () => {
                    if (format33) format33.checked = false;
                    if (format45) format45.checked = false;
                    if (format78) format78.checked = false;
                    if (formatCd) formatCd.checked = false;
                    if (formatCassette) formatCassette.checked = false;
                });
            }
            
            if (applyBtn) {
                applyBtn.addEventListener('click', () => {
                    selectedFormats = [];
                    if (format33 && format33.checked) selectedFormats.push('33');
                    if (format45 && format45.checked) selectedFormats.push('45');
                    if (format78 && format78.checked) selectedFormats.push('78');
                    if (formatCd && formatCd.checked) selectedFormats.push('cd');
                    if (formatCassette && formatCassette.checked) selectedFormats.push('cassette');
                    
                    // Close dropdown
                    const formatContainer = document.getElementById('formatCheckboxContainer');
                    if (formatContainer) formatContainer.classList.remove('show');
                    
                    // Apply filters
                    applyFilters();
                });
            }
        }

        // Create a date card
        function createDateCard(dateData, releaseCount) {
            const card = document.createElement('div');
            card.className = 'date-card';
            card.setAttribute('data-date-card', 'true');
            
            card.innerHTML = `
                <div class="date-emoji">${dateData.emoji}</div>
                <div class="date-label">${dateData.label}</div>
                <div class="date-full">${dateData.fullDate}</div>
                <div class="record-count">${releaseCount} record${releaseCount !== 1 ? 's' : ''}</div>
            `;
            
            return card;
        }

        // Create a record card with format badges
        function createRecordCard(release) {
            const card = document.createElement('div');
            card.className = 'card';
            
            // Set data attributes for filtering
            card.setAttribute('data-artist', (release.artist || '').toLowerCase());
            card.setAttribute('data-title', (release.title || '').toLowerCase());
            card.setAttribute('data-genre', (release.genre_name || '').toLowerCase());
            card.setAttribute('data-created', release.created_at || '');
            
            // Get genre
            const genre = release.genre_name || 'Unknown Genre';
            
            // Calculate price range display
            const priceRange = release.price_range;
            let priceDisplay = '';
            if (priceRange.min > 0 && priceRange.max > 0) {
                if (priceRange.min === priceRange.max) {
                    priceDisplay = `$${priceRange.min.toFixed(2)}`;
                } else {
                    priceDisplay = `$${priceRange.min.toFixed(2)} - $${priceRange.max.toFixed(2)}`;
                }
            } else if (priceRange.min > 0) {
                priceDisplay = `$${priceRange.min.toFixed(2)}`;
            } else {
                priceDisplay = 'Price varies';
            }
            
            // Build formats list - with format detection from barcode
            let formatsHtml = '';
            if (release.formats && release.formats.length > 0) {
                formatsHtml = '<div class="formats-list">';
                release.formats.forEach(format => {
                    // Determine format class and icon based on barcode of first copy
                    let formatClass = '';
                    let formatIcon = '';
                    let formatDisplay = format.format;
                    
                    if (format.copies.length > 0) {
                        const barcodePrefix = format.copies[0].barcode?.substring(0, 2);
                        if (barcodePrefix === '22') {
                            formatClass = 'vinyl-33';
                            formatIcon = 'fa-record-vinyl';
                            formatDisplay = '33⅓ RPM';
                        } else if (barcodePrefix === '55') {
                            formatClass = 'vinyl-45';
                            formatIcon = 'fa-record-vinyl';
                            formatDisplay = '45 RPM';
                        } else if (barcodePrefix === '66') {
                            formatClass = 'vinyl-78';
                            formatIcon = 'fa-record-vinyl';
                            formatDisplay = '78 RPM';
                        } else if (barcodePrefix === '33') {
                            formatClass = 'cd';
                            formatIcon = 'fa-compact-disc';
                            formatDisplay = 'CD';
                        } else if (barcodePrefix === '44') {
                            formatClass = 'cassette';
                            formatIcon = 'fa-tape';
                            formatDisplay = 'Cassette';
                        }
                    }
                    
                    const countDisplay = format.total_copies > 1 ? ` (${format.total_copies})` : '';
                    formatsHtml += `<span class="format-indicator ${formatClass}" data-format="${formatDisplay}">
                        <i class="fas ${formatIcon}"></i> ${formatDisplay}${countDisplay}
                    </span>`;
                });
                formatsHtml += '</div>';
            }
            
            // Get all unique conditions from all formats
            const allConditions = [];
            release.formats.forEach(format => {
                format.copies.forEach(copy => {
                    if (copy.condition && !allConditions.includes(copy.condition)) {
                        allConditions.push(copy.condition);
                    }
                });
            });
            
            // Sort conditions by grade
            const conditionOrder = {
                'Mint (M)': 1,
                'Near Mint (NM or M-)': 2,
                'Very Good Plus (VG+)': 3,
                'Very Good (VG)': 4,
                'Good Plus (G+)': 5,
                'Good (G)': 6,
                'Fair (F)': 7,
                'Poor (P)': 8
            };
            
            const sortedConditions = allConditions.sort((a, b) => 
                (conditionOrder[a] || 99) - (conditionOrder[b] || 99)
            );
            
            // Build conditions HTML
            let conditionsHtml = '';
            if (sortedConditions.length > 0) {
                conditionsHtml = '<div class="conditions-list">';
                sortedConditions.slice(0, 3).forEach(condition => {
                    if (!condition) return;
                    const conditionClass = getConditionClass(condition);
                    conditionsHtml += `<span class="condition-indicator ${conditionClass}">${condition}</span>`;
                });
                if (sortedConditions.length > 3) {
                    conditionsHtml += `<span class="more-copies">+${sortedConditions.length - 3} more</span>`;
                }
                conditionsHtml += '</div>';
            }
            
            // Copy count display
            let copyCountHtml = '';
            if (release.total_copies > 1) {
                copyCountHtml = `<span class="copy-count">${release.total_copies} copies</span>`;
            }
            
            // Handle image display
            const imageHtml = release.image_url ? 
                `<img src="${release.image_url}" alt="${release.title}" style="width: 100%; height: 100%; object-fit: cover;" onerror="this.parentElement.classList.add('default-record-bg'); this.style.display='none';">` : 
                '';
            
            card.innerHTML = `
                <div class="card-image ${!release.image_url ? 'default-record-bg' : ''}">
                    ${imageHtml}
                </div>
                <div class="card-info">
                    <h3 title="${escapeHtml(release.title)}">${escapeHtml(release.title)}</h3>
                    <p class="artist" title="${escapeHtml(release.artist)}">${escapeHtml(release.artist)}</p>
                    
                    <div class="copy-info">
                        ${copyCountHtml}
                        <span class="price-range">${priceDisplay}</span>
                    </div>
                    
                    ${formatsHtml}
                    
                    <p class="genre" title="${escapeHtml(genre)}">${escapeHtml(genre)}</p>
                    
                    ${conditionsHtml}
                    
                    ${release.formats.some(f => f.copies.some(c => c.youtube_url)) ? `
                        <a href="#" class="youtube-link" onclick="handleYouTubeClick('${release.formats.find(f => f.copies.find(c => c.youtube_url))?.copies.find(c => c.youtube_url)?.youtube_url || ''}', '${escapeHtml(release.artist)} - ${escapeHtml(release.title)}'); return false;">
                            🎵 Watch Video
                        </a>
                    ` : ''}
                </div>
            `;
            
            // Add click handler to show all copies popup
            card.addEventListener('click', function(e) {
                // Don't trigger if clicking on YouTube link or format indicator
                if (e.target.closest('.youtube-link')) return;
                if (e.target.closest('.format-indicator')) return;
                
                // Show popup with all copies grouped by format
                showCopiesPopup(release);
            });
            
            // Add click handlers for format indicators
            setTimeout(() => {
                card.querySelectorAll('.format-indicator').forEach(indicator => {
                    indicator.addEventListener('click', function(e) {
                        e.stopPropagation();
                        const format = this.getAttribute('data-format');
                        showCopiesPopup(release, format);
                    });
                });
            }, 0);
            
            return card;
        }

        // Display releases with date cards
        function displayReleases(releases) {
            const container = document.getElementById('catalogContainer');
            container.innerHTML = ''; // Clear loading message

            if (!releases || releases.length === 0) {
                container.innerHTML = '<div class="no-records-message"><i class="fas fa-search"></i><p>No records found in the database.</p></div>';
                return;
            }

            console.log(`Displaying ${releases.length} releases`);

            // Sort releases by date added descending (newest first)
            const sortedReleases = [...releases].sort((a, b) => {
                const dateA = a.created_at ? new Date(a.created_at) : new Date(0);
                const dateB = b.created_at ? new Date(b.created_at) : new Date(0);
                return dateB - dateA;
            });

            // Group releases by date
            const dateGroups = groupReleasesByDate(sortedReleases);
            
            // Create gallery container
            const gallery = document.createElement('div');
            gallery.className = 'group-gallery';

            // Build the layout with date cards and record cards
            dateGroups.forEach(group => {
                // Add date card
                const dateCard = createDateCard(group.dateData, group.releases.length);
                gallery.appendChild(dateCard);
                
                // Add all record cards for this date
                group.releases.forEach(release => {
                    const recordCard = createRecordCard(release);
                    gallery.appendChild(recordCard);
                });
            });

            container.appendChild(gallery);
            
            // Apply filters after loading
            setTimeout(() => {
                applyFilters();
            }, 100);
        }

        // Show popup with all copies grouped by format
        function showCopiesPopup(release, filterFormat = null) {
            // Create modal overlay
            const modal = document.createElement('div');
            modal.className = 'copies-modal-overlay';
            
            // Handle image display
            const imageHtml = release.image_url ? 
                `<img src="${release.image_url}" alt="${escapeHtml(release.title)}" style="width: 100%; height: 100%; object-fit: cover;" onerror="this.parentElement.classList.add('default-record-bg'); this.style.display='none';">` : 
                '';
            
            // Filter formats if specified
            let formatsToShow = release.formats;
            if (filterFormat) {
                formatsToShow = release.formats.filter(f => {
                    // Get format from barcode to compare
                    if (f.copies.length > 0) {
                        const barcodeFormat = getFormatFromBarcode(f.copies[0].barcode);
                        let displayFormat = '';
                        if (barcodeFormat === '33') displayFormat = '33⅓ RPM';
                        else if (barcodeFormat === '45') displayFormat = '45 RPM';
                        else if (barcodeFormat === '78') displayFormat = '78 RPM';
                        else if (barcodeFormat === 'cd') displayFormat = 'CD';
                        else if (barcodeFormat === 'cassette') displayFormat = 'Cassette';
                        return displayFormat === filterFormat;
                    }
                    return f.format === filterFormat;
                });
            }
            
            // Build formats HTML
            let formatsHtml = '';
            formatsToShow.forEach(format => {
                // Determine format display based on barcode
                let formatDisplay = format.format;
                let formatIcon = 'fa-record-vinyl';
                
                if (format.copies.length > 0) {
                    const barcodeFormat = getFormatFromBarcode(format.copies[0].barcode);
                    if (barcodeFormat === '33') {
                        formatDisplay = '33⅓ RPM';
                        formatIcon = 'fa-record-vinyl';
                    } else if (barcodeFormat === '45') {
                        formatDisplay = '45 RPM';
                        formatIcon = 'fa-record-vinyl';
                    } else if (barcodeFormat === '78') {
                        formatDisplay = '78 RPM';
                        formatIcon = 'fa-record-vinyl';
                    } else if (barcodeFormat === 'cd') {
                        formatDisplay = 'CD';
                        formatIcon = 'fa-compact-disc';
                    } else if (barcodeFormat === 'cassette') {
                        formatDisplay = 'Cassette';
                        formatIcon = 'fa-tape';
                    }
                }
                
                let copiesHtml = '';
                format.copies.forEach(copy => {
                    const conditionClass = getConditionClass(copy.condition);
                    const alreadyInCart = isInCart(copy.id);
                    
                    copiesHtml += `
                        <div class="copy-item">
                            <div class="copy-item-content">
                                <span class="copy-condition">
                                    <span class="condition-indicator ${conditionClass}">${copy.condition || 'Unknown'}</span>
                                </span>
                                <span class="copy-price">$${copy.store_price.toFixed(2)}</span>
                                ${copy.barcode ? `<span class="copy-barcode">${copy.barcode}</span>` : ''}
                            </div>
                            <button class="add-to-cart-btn ${alreadyInCart ? 'in-cart' : ''}" 
                                    data-copy-id="${copy.id}" 
                                    data-copy-condition="${copy.condition}" 
                                    data-copy-price="${copy.store_price}"
                                    data-format="${formatDisplay}"
                                    ${alreadyInCart ? 'disabled' : ''}>
                                <i class="fas ${alreadyInCart ? 'fa-check' : 'fa-cart-plus'}"></i> 
                                ${alreadyInCart ? 'In Cart' : 'Add to Cart'}
                            </button>
                        </div>
                    `;
                });
                
                const countDisplay = format.total_copies > 1 ? 
                    `<span style="font-size: 0.8rem; font-weight: normal; margin-left: auto;">${format.total_copies} copies</span>` : '';
                
                formatsHtml += `
                    <div class="modal-format-section">
                        <div class="modal-format-title">
                            <i class="fas ${formatIcon}"></i>
                            ${formatDisplay}
                            ${countDisplay}
                        </div>
                        <div class="copies-list-with-format">
                            ${copiesHtml}
                        </div>
                    </div>
                `;
            });
            
            // Build footer HTML - only show total if multiple formats or multiple copies
            let footerHtml = '';
            if (release.total_copies > 1) {
                footerHtml = `
                    <div class="copies-modal-footer">
                        <span class="footer-total">Total Copies: ${release.total_copies}</span>
                    </div>
                `;
            }
            
            // Create modal content with image
            modal.innerHTML = `
                <div class="copies-modal">
                    <div class="copies-modal-header">
                        <h3>${escapeHtml(release.artist)} - ${escapeHtml(release.title)}</h3>
                        <button class="copies-modal-close">&times;</button>
                    </div>
                    <div class="copies-modal-content">
                        <div class="modal-album-image ${!release.image_url ? 'default-record-bg' : ''}">
                            ${imageHtml}
                        </div>
                        ${formatsHtml}
                    </div>
                    ${footerHtml}
                </div>
            `;
            
            // Add click handler to close button
            const closeBtn = modal.querySelector('.copies-modal-close');
            closeBtn.addEventListener('click', () => {
                modal.remove();
            });
            
            // Add click outside to close
            modal.addEventListener('click', function(e) {
                if (e.target === modal) {
                    modal.remove();
                }
            });
            
            // Add event listeners for add to cart buttons
            modal.querySelectorAll('.add-to-cart-btn:not([disabled])').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    e.stopPropagation();
                    
                    const copyId = btn.dataset.copyId;
                    const format = btn.dataset.format;
                    
                    // Find the full copy object
                    let copy = null;
                    for (const formatData of release.formats) {
                        const found = formatData.copies.find(c => c.id == copyId);
                        if (found) {
                            copy = found;
                            break;
                        }
                    }
                    
                    if (copy) {
                        const added = addToCart(copy, release, format);
                        
                        if (added) {
                            // Close the modal after adding to cart
                            modal.remove();
                        }
                    }
                });
            });
            
            document.body.appendChild(modal);
        }

        // Helper function to escape HTML
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Helper function to get CSS class for condition
        function getConditionClass(condition) {
            const conditionLower = (condition || '').toLowerCase();
            if (conditionLower.includes('mint') && !conditionLower.includes('near')) {
                return 'condition-mint';
            } else if (conditionLower.includes('near mint')) {
                return 'condition-near-mint';
            } else if (conditionLower.includes('very good plus')) {
                return 'condition-very-good-plus';
            } else if (conditionLower.includes('very good')) {
                return 'condition-very-good';
            } else if (conditionLower.includes('good plus')) {
                return 'condition-good-plus';
            } else if (conditionLower.includes('good')) {
                return 'condition-good';
            } else if (conditionLower.includes('fair')) {
                return 'condition-fair';
            } else if (conditionLower.includes('poor')) {
                return 'condition-poor';
            }
            return '';
        }

        // Apply all filters (search, genre, and format)
        function applyFilters() {
            const container = document.getElementById('catalogContainer');
            const allCards = container.querySelectorAll('.card, .date-card');
            
            // Get search term
            const searchBox = document.getElementById('searchBox');
            const searchTerm = searchBox ? searchBox.value.toLowerCase().trim() : '';
            
            let visibleCount = 0;
            let currentDateGroupHasVisible = false;
            let lastDateCard = null;
            
            allCards.forEach(card => {
                // Check if it's a date card
                if (card.classList.contains('date-card')) {
                    // Store reference to date card and reset group visibility
                    lastDateCard = card;
                    currentDateGroupHasVisible = false;
                    card.style.display = 'flex';
                    return;
                }
                
                // It's a record card
                const artist = card.getAttribute('data-artist') || '';
                const title = card.getAttribute('data-title') || '';
                const genre = card.getAttribute('data-genre') || '';
                
                // Check search
                const searchMatch = !searchTerm || 
                    artist.includes(searchTerm) || 
                    title.includes(searchTerm);
                
                // Check genre filter
                let genreMatch = true;
                if (selectedGenres.length > 0) {
                    genreMatch = selectedGenres.some(g => g.toLowerCase() === genre);
                }
                
                // Check format filter (based on barcode of copies)
                let formatMatch = true;
                if (selectedFormats.length > 0 && selectedFormats.length < 5) {
                    // Find the release data for this card
                    const releaseArtist = artist;
                    const releaseTitle = title;
                    
                    // Find the release in allReleases
                    const release = allReleases.find(r => 
                        r.artist?.toLowerCase() === releaseArtist && 
                        r.title?.toLowerCase() === releaseTitle
                    );
                    
                    if (release && release.formats) {
                        // Check if any copy in this release has a format matching selected formats
                        let hasMatchingFormat = false;
                        
                        for (const format of release.formats) {
                            for (const copy of format.copies) {
                                const formatType = getFormatFromBarcode(copy.barcode);
                                if (selectedFormats.includes(formatType)) {
                                    hasMatchingFormat = true;
                                    break;
                                }
                            }
                            if (hasMatchingFormat) break;
                        }
                        
                        formatMatch = hasMatchingFormat;
                    }
                }
                
                const shouldShow = searchMatch && genreMatch && formatMatch;
                
                card.style.display = shouldShow ? 'block' : 'none';
                if (shouldShow) {
                    visibleCount++;
                    currentDateGroupHasVisible = true;
                }
                
                // Update the date card visibility based on whether any records in its group are visible
                if (lastDateCard && shouldShow) {
                    lastDateCard.style.display = 'flex';
                }
            });
            
            // Hide date cards that have no visible records in their group
            allCards.forEach(card => {
                if (card.classList.contains('date-card') && card.style.display !== 'none') {
                    let hasVisibleAfter = false;
                    let nextElement = card.nextElementSibling;
                    while (nextElement && !nextElement.classList.contains('date-card')) {
                        if (nextElement.classList.contains('card') && nextElement.style.display !== 'none') {
                            hasVisibleAfter = true;
                            break;
                        }
                        nextElement = nextElement.nextElementSibling;
                    }
                    if (!hasVisibleAfter) {
                        card.style.display = 'none';
                    }
                }
            });
            
            // Show no results message if needed
            const existingNoResults = container.querySelector('.no-records-message');
            if (visibleCount === 0) {
                if (!existingNoResults) {
                    const noResultsDiv = document.createElement('div');
                    noResultsDiv.className = 'no-records-message';
                    noResultsDiv.innerHTML = '<i class="fas fa-search"></i><p>No records match your search criteria.</p>';
                    container.appendChild(noResultsDiv);
                }
            } else if (existingNoResults) {
                existingNoResults.remove();
            }
        }

        // Initialize filter functionality
        function initializeFilters() {
            const searchBox = document.getElementById('searchBox');
            
            // Search functionality
            searchBox.addEventListener('input', applyFilters);
            
            // Setup genre filter toggle
            const genreFilterBtn = document.getElementById('genreFilterBtn');

                genreFilterBtn.addEventListener('click', (e) => {

                    }
                });
            }
            
            // Setup format filter toggle
            const formatFilterBtn = document.getElementById('formatFilterBtn');
            const formatCheckboxContainer = document.getElementById('formatCheckboxContainer');
            
            if (formatFilterBtn && formatCheckboxContainer) {
                formatFilterBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    formatCheckboxContainer.classList.toggle('show');
                });
                
                // Close when clicking outside
                document.addEventListener('click', (e) => {
                    if (!formatCheckboxContainer.contains(e.target) && !formatFilterBtn.contains(e.target)) {
                        formatCheckboxContainer.classList.remove('show');
                    }
                });
            }
        }

        // Handle YouTube click
        function handleYouTubeClick(youtubeUrl, title) {
            const videoId = extractYouTubeId(youtubeUrl);
            if (!videoId) {
                alert('Invalid YouTube URL');
                return;
            }
            
            const modal = document.createElement('div');
            modal.className = 'youtube-modal-overlay';
            
            modal.innerHTML = `
                <div class="youtube-modal">
                    <div class="youtube-modal-header">
                        <h3>${title}</h3>
                        <button class="youtube-modal-close" onclick="this.closest('.youtube-modal-overlay').remove()">×</button>
                    </div>
                    <div class="youtube-video-container">
                        <iframe 
                            src="https://www.youtube.com/embed/${videoId}?autoplay=1" 
                            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                            allowfullscreen>
                        </iframe>
                    </div>
                </div>
            `;
            
            modal.addEventListener('click', function(e) {
                if (e.target === modal) {
                    modal.remove();
                }
            });
            
            document.body.appendChild(modal);
        }

        // Extract YouTube ID
        function extractYouTubeId(url) {
            if (!url) return null;
            
            const patterns = [
                /youtube\.com\/watch\?v=([a-zA-Z0-9_-]{11})/,
                /youtu\.be\/([a-zA-Z0-9_-]{11})/,
                /youtube\.com\/embed\/([a-zA-Z0-9_-]{11})/,
                /youtube\.com\/v\/([a-zA-Z0-9_-]{11})/
            ];
            
            for (const pattern of patterns) {
                const match = url.match(pattern);
                if (match && match[1]) {
                    return match[1];
                }
            }
            
            return null;
        }
