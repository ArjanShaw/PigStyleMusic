<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <link rel="icon" href="/static/images/PigStyle.ico">
    <title>Merchandise - PigStyle Records</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-03HFDR9PV7"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-03HFDR9PV7');
    </script>
    
    <!-- External CSS -->
    <link rel="stylesheet" href="/static/css/merchandise.css">
    
    <!-- JavaScript files -->
    <script src="/static/js/app-config.js"></script>
    <script src="/static/js/config-value-manager.js"></script>
</head>
<body>
    <!-- Navbar -->
    <nav style="background: #000; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; position: fixed; top: 0; left: 0; right: 0; z-index: 1000; border-bottom: 2px solid #ff6b6b;">
        <a href="/" style="color: white; text-decoration: none; font-size: 20px; font-weight: bold; display: flex; align-items: center; gap: 10px;">
            <img src="/static/images/PigStyle.ico" alt="PigStyle" style="height: 30px; width: 30px;">
        </a>
        <div style="display: flex; gap: 20px; align-items: center;">
            <a href="/shop" style="color: white; text-decoration: none;">Records</a>
            <a href="/merch" style="color: #ff6b6b; text-decoration: none; font-weight: bold;">Merch</a>
            <a href="/streaming" style="color: white; text-decoration: none;">Stream</a>
            <a href="/consignment" style="color: white; text-decoration: none;">Consign</a>
            <div id="auth-section"></div>
            
            <!-- Cart drawer toggle button - only shows when items exist -->
            <div id="cartToggleContainer" style="display: none;">
                <div class="cart-icon-wrapper" id="cartToggle">
                    <i class="fas fa-shopping-cart" style="color: white; font-size: 20px;"></i>
                    <span id="cartBadge" class="cart-badge">0</span>
                </div>
            </div>
        </div>
    </nav>

    <!-- Add padding to account for fixed navbar -->
    <div style="padding-top: 60px;"></div>

    <!-- Background Image -->
    <div class="background-container">
        <img src="/static/images/background.png" alt="Background" class="background-image">
        <div class="background-overlay"></div>
    </div>

    <div class="header-section">
        <div class='search-wrapper'>
            <input type='text' id='searchBox' placeholder='Search merchandise...'>
        </div>
    </div>
    
    <div class='catalog-container' id='catalogContainer'>
        <div id='loading'>
            <div class="loading-dots">
                <div></div>
                <div></div>
                <div></div>
                <div></div>
            </div>
            <p>Loading merchandise...</p>
        </div>
    </div>

    <!-- Cart Drawer - Hidden by default -->
    <div class="cart-drawer" id="cartDrawer">
        <div class="cart-drawer-header">
            <h3><i class="fas fa-shopping-cart"></i> Your Cart</h3>
            <button class="cart-drawer-close" id="closeCartDrawer">&times;</button>
        </div>
        <div class="cart-drawer-items" id="cartItems">
            <!-- Cart items will be dynamically inserted here -->
            <div class="empty-cart-message">
                <i class="fas fa-shopping-bag"></i>
                <p>Your cart is empty</p>
            </div>
        </div>
        <div class="cart-drawer-footer" id="cartFooter" style="display: none;">
            <!-- Cart footer will be dynamically populated by updateCartDrawer() -->
        </div>
    </div>

    <!-- Cart Overlay (click to close) -->
    <div class="cart-overlay" id="cartOverlay"></div>

    <!-- Merchandise Details Modal -->
    <div class="merch-modal-overlay" id="merchModal" style="display: none;">
        <div class="merch-modal">
            <div class="merch-modal-header">
                <h3 id="modalTitle">Item Details</h3>
                <button class="merch-modal-close" id="closeModalBtn">&times;</button>
            </div>
            <div class="merch-modal-content" id="modalContent">
                <!-- Modal content will be populated dynamically -->
            </div>
        </div>
    </div>

    <script>
        // Store all accessories globally
        let allAccessories = [];
        
        // Cart state
        let cart = {
            items: [],
            total: 0
        };

        // Current order being processed
        let currentOrder = null;

        // Hardcoded shipping rates
        const SHIPPING_TEE = 5.72;
        const SHIPPING_STICKER = 0.45;
        
        // Tax rate - will be loaded from config
        let taxRate = 0;

        // Debug mode
        let debugMode = true;

        // Default merchandise image
        const DEFAULT_MERCH_IMAGE = '';

        // Add debug message
        function addDebug(message, type = 'info') {
            if (!debugMode) return;
            console.log(`[Merchandise Debug] ${message}`);
        }

        // Load cart from localStorage on page load
        function loadCart() {
            const savedCart = localStorage.getItem('pigstyle_cart_merch');
            if (savedCart) {
                try {
                    cart = JSON.parse(savedCart);
                    updateCartDisplay();
                    addDebug(`Loaded cart with ${cart.items.length} items`);
                } catch (e) {
                    console.error('Error loading cart:', e);
                }
            }
        }

        // Save cart to localStorage
        function saveCart() {
            localStorage.setItem('pigstyle_cart_merch', JSON.stringify(cart));
            updateCartDisplay();
        }

        // Update cart display (badge, toggle visibility, drawer)
        function updateCartDisplay() {
            const cartToggleContainer = document.getElementById('cartToggleContainer');
            const cartBadge = document.getElementById('cartBadge');
            
            // Update badge count
            const itemCount = cart.items.reduce((sum, item) => sum + item.quantity, 0);
            cartBadge.textContent = itemCount;
            
            // Show/hide cart toggle based on items
            if (itemCount > 0) {
                cartToggleContainer.style.display = 'block';
            } else {
                cartToggleContainer.style.display = 'none';
            }
            
            // Update cart drawer if it's open
            updateCartDrawer();
        }

        // Update cart drawer contents with tax display
        async function updateCartDrawer() {
            const cartItems = document.getElementById('cartItems');
            const cartFooter = document.getElementById('cartFooter');
            
            if (cart.items.length === 0) {
                cartItems.innerHTML = `
                    <div class="empty-cart-message">
                        <i class="fas fa-shopping-bag"></i>
                        <p>Your cart is empty</p>
                    </div>
                `;
                cartFooter.style.display = 'none';
            } else {
                // Calculate subtotal
                const subtotal = cart.items.reduce((sum, item) => sum + (item.price * item.quantity), 0);
                
                // Get tax rate (use stored value or fetch if needed)
                let currentTaxRate = taxRate;
                if (currentTaxRate === 0) {
                    try {
                        currentTaxRate = await getConfigValue('TAX_RATE') || 0;
                        taxRate = currentTaxRate; // Store for future use
                    } catch (e) {
                        console.warn('Could not fetch tax rate, using 0');
                        currentTaxRate = 0;
                    }
                }
                
                // Calculate tax
                const taxAmount = subtotal * (currentTaxRate / 100);
                const totalWithTax = subtotal + taxAmount;
                
                // Build items HTML with table layout
                let itemsHtml = `
                    <table class="cart-items-table">
                        <thead>
                            <tr>
                                <th>Item</th>
                                <th class="price-column">Price</th>
                                <th class="quantity-column">Qty</th>
                                <th class="action-column"></th>
                            </tr>
                        </thead>
                        <tbody>
                `;
                
                cart.items.forEach((item, index) => {
                    // Handle image display
                    const imageHtml = item.image_url ? 
                        `<img src="${item.image_url}" alt="${item.description}" class="cart-item-image" onerror="this.parentElement.innerHTML='<div class=\'cart-item-image default-merch-bg\'></div>'">` : 
                        `<div class="cart-item-image default-merch-bg"></div>`;
                    
                    itemsHtml += `
                        <tr class="cart-item-row" data-cart-index="${index}">
                            <td class="item-info-cell">
                                <div class="cart-item-info">
                                    ${imageHtml}
                                    <div class="cart-item-details">
                                        <div class="cart-item-title">${escapeHtml(item.description || item.title)}</div>
                                        ${item.barcode ? `<div class="cart-item-sku">SKU: ${escapeHtml(item.barcode)}</div>` : ''}
                                    </div>
                                </div>
                            </td>
                            <td class="item-price-cell">
                                <div class="cart-item-price">$${item.price.toFixed(2)}</div>
                            </td>
                            <td class="item-quantity-cell">
                                <div class="cart-item-quantity">
                                    <button class="quantity-btn" onclick="updateQuantity(${index}, -1)">-</button>
                                    <span class="quantity-value">${item.quantity}</span>
                                    <button class="quantity-btn" onclick="updateQuantity(${index}, 1)">+</button>
                                </div>
                            </td>
                            <td class="item-action-cell">
                                <button class="cart-item-remove-btn" onclick="removeFromCart(${index})" title="Remove item">
                                    <i class="fas fa-times"></i>
                                </button>
                            </td>
                        </tr>
                    `;
                });
                
                itemsHtml += `
                        </tbody>
                    </table>
                `;
                
                cartItems.innerHTML = itemsHtml;
                
                // Update footer with table layout for totals
                cartFooter.innerHTML = `
                    <table class="cart-totals-table">
                        <tbody>
                            <tr class="subtotal-row">
                                <td class="label">Subtotal:</td>
                                <td class="amount">$${subtotal.toFixed(2)}</td>
                            </tr>
                            <tr class="tax-row">
                                <td class="label">Tax (${currentTaxRate}%):</td>
                                <td class="amount">$${taxAmount.toFixed(2)}</td>
                            </tr>
                            <tr class="total-row">
                                <td class="label">Total:</td>
                                <td class="amount total-amount">$${totalWithTax.toFixed(2)}</td>
                            </tr>
                        </tbody>
                    </table>
                    <button class="checkout-btn" id="checkoutBtn">Proceed to Checkout</button>
                `;
                
                cartFooter.style.display = 'block';
                
                // Re-attach checkout button event listener
                document.getElementById('checkoutBtn').addEventListener('click', function() {
                    if (cart.items.length > 0) {
                        showShippingOptions();
                    }
                });
            }
        }

        // Update quantity of item in cart
        function updateQuantity(index, change) {
            const item = cart.items[index];
            if (!item) return;
            
            const newQuantity = item.quantity + change;
            
            if (newQuantity <= 0) {
                // Remove item if quantity becomes 0
                removeFromCart(index);
                return;
            }
            
            // Check if we have enough stock
            const accessory = allAccessories.find(a => a.id == item.accessoryId);
            if (accessory && newQuantity > accessory.count) {
                showNotification(`Only ${accessory.count} available in stock`, 'error');
                return;
            }
            
            item.quantity = newQuantity;
            
            // Recalculate cart.total
            cart.total = cart.items.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            
            saveCart();
            showNotification('Quantity updated', 'success');
        }

        // Check if an item is already in cart
        function isInCart(accessoryId) {
            return cart.items.some(item => item.accessoryId == accessoryId);
        }

        // Add item to cart
        function addToCart(accessory) {
            // Check if item is already in cart
            const existingItem = cart.items.find(item => item.accessoryId == accessory.id);
            
            if (existingItem) {
                // Check if we have enough stock
                if (existingItem.quantity >= accessory.count) {
                    showNotification('No more stock available', 'error');
                    return false;
                }
                
                // Increment quantity
                existingItem.quantity += 1;
                showNotification('Item quantity updated in cart!', 'success');
            } else {
                // Add new item
                cart.items.push({
                    accessoryId: accessory.id,
                    title: accessory.description,
                    description: accessory.description,
                    price: accessory.store_price,
                    image_url: accessory.image_url,
                    barcode: accessory.bar_code,
                    quantity: 1
                });
                showNotification('Item added to cart!', 'success');
            }
            
            // Recalculate cart.total
            cart.total = cart.items.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            
            saveCart();
            return true;
        }

        // Remove item from cart
        function removeFromCart(index) {
            cart.items.splice(index, 1);
            
            // Recalculate cart.total after removal
            cart.total = cart.items.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            
            saveCart();
            showNotification('Item removed from cart', 'success');
            
            // If cart becomes empty, close the drawer
            if (cart.items.length === 0) {
                closeCartDrawer();
            }
        }

        // Clear entire cart
        function clearCart() {
            cart.items = [];
            cart.total = 0;
            
            saveCart();
            closeCartDrawer();
            showNotification('Cart cleared', 'success');
        }

        // Show notification
        function showNotification(message, type = 'success') {
            const notification = document.createElement('div');
            notification.className = `notification ${type === 'error' ? 'error' : ''}`;
            notification.textContent = message;
            
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.style.animation = 'slideOut 0.3s ease';
                setTimeout(() => {
                    notification.remove();
                }, 300);
            }, 3000);
        }

        // Open cart drawer
        function openCartDrawer() {
            document.getElementById('cartDrawer').classList.add('open');
            document.getElementById('cartOverlay').classList.add('active');
            updateCartDrawer(); // Refresh contents when opening
        }

        // Close cart drawer
        function closeCartDrawer() {
            document.getElementById('cartDrawer').classList.remove('open');
            document.getElementById('cartOverlay').classList.remove('active');
        }

        // Load accessories from API
        async function loadAccessories() {
            try {
                console.log('Loading merchandise from API...');
                const response = await fetch(`${AppConfig.baseUrl}/accessories`);
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status} - ${response.statusText}`);
                }
                
                const data = await response.json();
                
                console.log('API Response:', data);
                
                if (data.status === 'success') {
                    allAccessories = data.accessories || [];
                    console.log(`Loaded ${allAccessories.length} merchandise items`);
                    displayAccessories(allAccessories);
                } else {
                    throw new Error('Invalid response from server: ' + JSON.stringify(data));
                }
                
            } catch (error) {
                console.error('CRITICAL ERROR: Failed to load merchandise:', error);
                
                // Show error message to user with details
                document.getElementById('catalogContainer').innerHTML = `
                    <div class="error-message">
                        <i class="fas fa-exclamation-triangle"></i>
                        <h2>Failed to Load Merchandise</h2>
                        <p>Unable to retrieve merchandise data from the server. Please try again or contact support if the problem persists.</p>
                        <div class="error-details">
                            <strong>Error:</strong> ${escapeHtml(error.message)}
                        </div>
                        <button class="retry-btn" onclick="window.location.reload()">
                            <i class="fas fa-sync-alt"></i> Retry
                        </button>
                    </div>
                `;
                
                throw error;
            }
        }

        // Display accessories in catalog
        function displayAccessories(accessories) {
            const container = document.getElementById('catalogContainer');
            container.innerHTML = ''; // Clear loading message

            if (!accessories || accessories.length === 0) {
                container.innerHTML = '<div class="no-items">No merchandise found in the database.</div>';
                return;
            }

            console.log(`Displaying ${accessories.length} merchandise items`);

            // Create a gallery container
            const gallery = document.createElement('div');
            gallery.className = 'merch-gallery';

            accessories.forEach(accessory => {
                const card = createAccessoryCard(accessory);
                gallery.appendChild(card);
            });

            container.appendChild(gallery);
        }

        // Create a card for an accessory
        function createAccessoryCard(accessory) {
            const card = document.createElement('div');
            card.className = 'merch-card';
            
            // Set data attributes for filtering
            card.setAttribute('data-description', (accessory.description || '').toLowerCase());
            card.setAttribute('data-barcode', (accessory.bar_code || '').toLowerCase());
            
            // Handle image display - use CSS background if no image
            const imageHtml = accessory.image_url ? 
                `<img src="${accessory.image_url}" alt="${accessory.description}" onload="this.parentElement.classList.remove('loading')" onerror="this.parentElement.innerHTML='<div class=\\'default-merch-bg\\'></div>';">` : 
                '';
            
            // Check if already in cart
            const inCart = isInCart(accessory.id);
            
            card.innerHTML = `
                <div class="merch-image ${!accessory.image_url ? 'default-merch-bg' : 'loading'}">
                    ${imageHtml}
                </div>
                <div class="merch-info">
                    <h3>${escapeHtml(accessory.description)}</h3>
                    
                    <div class="merch-details">
                        <span class="merch-price">$${parseFloat(accessory.store_price).toFixed(2)}</span>
                    </div>
                    
                    ${accessory.bar_code ? `<p class="merch-sku">SKU: ${escapeHtml(accessory.bar_code)}</p>` : ''}
                    
                    <button class="add-to-cart-btn ${inCart ? 'in-cart' : ''}" 
                            data-accessory-id="${accessory.id}"
                            style="margin-top: 10px; padding: 8px; background: #ff6b6b; color: white; border: none; border-radius: 20px; cursor: pointer; font-weight: 600; transition: all 0.2s;">
                        <i class="fas ${inCart ? 'fa-check' : 'fa-cart-plus'}"></i> 
                        ${inCart ? 'In Cart' : 'Add to Cart'}
                    </button>
                </div>
            `;
            
            // Add click handler for add to cart button
            const addBtn = card.querySelector('.add-to-cart-btn');
            addBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                if (!inCart) {
                    addToCart(accessory);
                    
                    // Update button state
                    addBtn.classList.add('in-cart');
                    addBtn.innerHTML = '<i class="fas fa-check"></i> In Cart';
                }
            });
            
            // Add click handler to show details modal
            card.addEventListener('click', function(e) {
                // Don't trigger if clicking on add to cart button
                if (e.target.closest('.add-to-cart-btn')) return;
                
                // Show details modal
                showItemDetails(accessory);
            });
            
            return card;
        }

        // Show item details modal
        function showItemDetails(accessory) {
            const modal = document.getElementById('merchModal');
            const modalTitle = document.getElementById('modalTitle');
            const modalContent = document.getElementById('modalContent');
            
            modalTitle.textContent = accessory.description;
            
            const inCart = isInCart(accessory.id);
            
            // Handle image display
            const imageHtml = accessory.image_url ? 
                `<img src="${accessory.image_url}" alt="${accessory.description}" style="width: 100%; height: 100%; object-fit: cover;" onload="this.parentElement.classList.remove('loading')" onerror="this.parentElement.innerHTML='<div class=\\'default-merch-bg\\'></div>';">` : 
                '';
            
            modalContent.innerHTML = `
                <div style="display: flex; gap: 20px; flex-wrap: wrap;">
                    <div class="modal-image ${!accessory.image_url ? 'default-merch-bg' : 'loading'}" style="width: 150px; height: 150px; flex-shrink: 0;">
                        ${imageHtml}
                    </div>
                    <div style="flex: 1; min-width: 200px;">
                        <p style="font-size: 1.1rem; margin-bottom: 15px; font-weight: 600;">${escapeHtml(accessory.description)}</p>
                        
                        <div style="margin-bottom: 10px; display: flex;">
                            <span style="width: 80px; color: #666;">Price:</span>
                            <span style="font-weight: 600; color: #28a745;">$${parseFloat(accessory.store_price).toFixed(2)}</span>
                        </div>
                        
                        <div style="margin-bottom: 10px; display: flex;">
                            <span style="width: 80px; color: #666;">SKU:</span>
                            <span>${escapeHtml(accessory.bar_code || 'N/A')}</span>
                        </div>
                        
                        <div style="margin-bottom: 10px; display: flex;">
                            <span style="width: 80px; color: #666;">Added:</span>
                            <span>${new Date(accessory.created_at).toLocaleDateString()}</span>
                        </div>
                        
                        ${accessory.updated_at ? `
                        <div style="margin-bottom: 10px; display: flex;">
                            <span style="width: 80px; color: #666;">Updated:</span>
                            <span>${new Date(accessory.updated_at).toLocaleDateString()}</span>
                        </div>
                        ` : ''}
                        
                        <button class="add-to-cart-btn ${inCart ? 'in-cart' : ''}" 
                                data-accessory-id="${accessory.id}"
                                style="margin-top: 15px; width: 100%; padding: 10px; background: #ff6b6b; color: white; border: none; border-radius: 20px; cursor: pointer; font-weight: 600;">
                            <i class="fas ${inCart ? 'fa-check' : 'fa-cart-plus'}"></i> 
                            ${inCart ? 'In Cart' : 'Add to Cart'}
                        </button>
                    </div>
                </div>
            `;
            
            // Add event listener for add to cart button in modal
            const modalAddBtn = modalContent.querySelector('.add-to-cart-btn');
            if (modalAddBtn) {
                modalAddBtn.addEventListener('click', () => {
                    if (!inCart) {
                        addToCart(accessory);
                        
                        // Update button state
                        modalAddBtn.classList.add('in-cart');
                        modalAddBtn.innerHTML = '<i class="fas fa-check"></i> In Cart';
                        
                        // Also update the card button if it exists
                        const cardBtn = document.querySelector(`.add-to-cart-btn[data-accessory-id="${accessory.id}"]`);
                        if (cardBtn) {
                            cardBtn.classList.add('in-cart');
                            cardBtn.innerHTML = '<i class="fas fa-check"></i> In Cart';
                        }
                        
                        // Close modal after 1 second
                        setTimeout(() => {
                            modal.style.display = 'none';
                        }, 1000);
                    }
                });
            }
            
            modal.style.display = 'flex';
        }

        // Helper function to escape HTML
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Apply search filter
        function applySearchFilter() {
            const searchTerm = document.getElementById('searchBox').value.toLowerCase().trim();
            const container = document.getElementById('catalogContainer');
            const cards = container.querySelectorAll('.merch-card');
            
            let visibleCount = 0;
            
            cards.forEach(card => {
                const description = card.getAttribute('data-description') || '';
                const barcode = card.getAttribute('data-barcode') || '';
                
                const searchMatch = !searchTerm || 
                    description.includes(searchTerm) || 
                    barcode.includes(searchTerm);
                
                card.style.display = searchMatch ? 'block' : 'none';
                if (searchMatch) visibleCount++;
            });
            
            // Show no results message if needed
            const existingNoResults = container.querySelector('.no-items');
            if (visibleCount === 0 && searchTerm) {
                if (!existingNoResults) {
                    const noResultsDiv = document.createElement('div');
                    noResultsDiv.className = 'no-items';
                    noResultsDiv.textContent = 'No merchandise matches your search criteria.';
                    container.appendChild(noResultsDiv);
                }
            } else if (existingNoResults) {
                existingNoResults.remove();
            }
        }

        // Initialize search functionality
        function initializeSearch() {
            const searchBox = document.getElementById('searchBox');
            
            // Search functionality
            searchBox.addEventListener('input', applySearchFilter);
            
            // Clear search button (if we add one later)
            const clearSearchBtn = document.getElementById('clearSearch');
            if (clearSearchBtn) {
                clearSearchBtn.addEventListener('click', function() {
                    searchBox.value = '';
                    applySearchFilter();
                });
            }
        }

        // ==================== CHECKOUT FUNCTIONS ====================

        // Calculate shipping cost based on cart items
        function calculateShippingCost() {
            let hasTees = false;
            let hasStickers = false;
            
            cart.items.forEach(item => {
                const description = (item.description || item.title || '').toLowerCase();
                if (description.includes('tee')) {
                    hasTees = true;
                } else if (description.includes('sticker')) {
                    hasStickers = true;
                }
            });
            
            let shippingCost = 0;
            if (hasTees) shippingCost += SHIPPING_TEE;
            if (hasStickers) shippingCost += SHIPPING_STICKER;
            
            return shippingCost;
        }

        // Show shipping/pickup options modal
        function showShippingOptions() {
            return new Promise((resolve) => {
                // Calculate shipping cost based on cart items
                const calculatedShipping = calculateShippingCost();
                
                // Create modal overlay
                const modal = document.createElement('div');
                modal.className = 'payment-modal-overlay';
                modal.style.zIndex = '4000'; // Higher than other modals
                
                modal.innerHTML = `
                    <div class="payment-modal shipping-modal">
                        <h2 style="margin-bottom: 20px; color: #333; text-align: center;">Shipping Options</h2>
                        
                        <div class="shipping-option" id="pickupOption">
                            <input type="radio" name="shippingOption" id="pickupRadio" value="pickup" checked>
                            <label for="pickupRadio">Pick up in store</label>
                            <p style="margin: 5px 0 0 25px; font-size: 13px; color: #666;">Free - Available during business hours</p>
                        </div>
                        
                        <div class="shipping-option" id="shipOption">
                            <input type="radio" name="shippingOption" id="shipRadio" value="ship">
                            <label for="shipRadio">Ship my order</label>
                            <p style="margin: 5px 0 0 25px; font-size: 13px; color: #666;">Shipping costs calculated based on items</p>
                            <div class="shipping-cost-display">+ $${calculatedShipping.toFixed(2)} shipping</div>
                        </div>
                        
                        <div id="shippingFormContainer" style="display: none;">
                            <div class="shipping-form">
                                <h4>Shipping Information</h4>
                                <div class="form-group">
                                    <label for="fullName">Full Name *</label>
                                    <input type="text" id="fullName" placeholder="John Doe">
                                </div>
                                <div class="form-group">
                                    <label for="address">Street Address *</label>
                                    <input type="text" id="address" placeholder="123 Main St">
                                </div>
                                <div class="form-group">
                                    <label for="apt">Apartment/Suite (optional)</label>
                                    <input type="text" id="apt" placeholder="Apt 4B">
                                </div>
                                <div class="form-row">
                                    <div class="form-group">
                                        <label for="city">City *</label>
                                        <input type="text" id="city" placeholder="New York">
                                    </div>
                                    <div class="form-group">
                                        <label for="state">State *</label>
                                        <input type="text" id="state" placeholder="NY">
                                    </div>
                                </div>
                                <div class="form-row">
                                    <div class="form-group">
                                        <label for="zip">ZIP Code *</label>
                                        <input type="text" id="zip" placeholder="10001">
                                    </div>
                                    <div class="form-group">
                                        <label for="country">Country *</label>
                                        <input type="text" id="country" placeholder="USA" value="USA">
                                    </div>
                                </div>
                                <div class="form-group">
                                    <label for="email">Email *</label>
                                    <input type="email" id="email" placeholder="john@example.com">
                                </div>
                                <div class="form-group">
                                    <label for="phone">Phone (optional)</label>
                                    <input type="tel" id="phone" placeholder="(555) 123-4567">
                                </div>
                            </div>
                        </div>
                        
                        <div class="modal-actions">
                            <button class="cancel-btn" id="cancelShipping">Cancel</button>
                            <button class="continue-btn" id="continueShipping">Continue to Payment</button>
                        </div>
                    </div>
                `;
                
                document.body.appendChild(modal);
                
                // Get elements
                const pickupOption = document.getElementById('pickupOption');
                const shipOption = document.getElementById('shipOption');
                const pickupRadio = document.getElementById('pickupRadio');
                const shipRadio = document.getElementById('shipRadio');
                const shippingFormContainer = document.getElementById('shippingFormContainer');
                const continueBtn = document.getElementById('continueShipping');
                const cancelBtn = document.getElementById('cancelShipping');
                
                // Handle option selection
                pickupOption.addEventListener('click', () => {
                    pickupRadio.checked = true;
                    shipRadio.checked = false;
                    shippingFormContainer.style.display = 'none';
                    pickupOption.classList.add('selected');
                    shipOption.classList.remove('selected');
                });
                
                shipOption.addEventListener('click', () => {
                    shipRadio.checked = true;
                    pickupRadio.checked = false;
                    shippingFormContainer.style.display = 'block';
                    shipOption.classList.add('selected');
                    pickupOption.classList.remove('selected');
                });
                
                // Handle continue button
                continueBtn.addEventListener('click', async () => {
                    const isShip = shipRadio.checked;
                    
                    if (isShip) {
                        // Validate shipping form
                        const fullName = document.getElementById('fullName')?.value.trim();
                        const address = document.getElementById('address')?.value.trim();
                        const city = document.getElementById('city')?.value.trim();
                        const state = document.getElementById('state')?.value.trim();
                        const zip = document.getElementById('zip')?.value.trim();
                        const country = document.getElementById('country')?.value.trim();
                        const email = document.getElementById('email')?.value.trim();
                        
                        if (!fullName || !address || !city || !state || !zip || !country || !email) {
                            showNotification('Please fill in all required fields', 'error');
                            return;
                        }
                        
                        if (!email.includes('@') || !email.includes('.')) {
                            showNotification('Please enter a valid email address', 'error');
                            return;
                        }
                    }
                    
                    // Collect shipping data with calculated cost
                    const shippingData = {
                        method: isShip ? 'ship' : 'pickup',
                        cost: isShip ? calculatedShipping : 0,
                        ...(isShip && {
                            fullName: document.getElementById('fullName')?.value.trim(),
                            email: document.getElementById('email')?.value.trim(),
                            address: document.getElementById('address')?.value.trim(),
                            apt: document.getElementById('apt')?.value.trim(),
                            city: document.getElementById('city')?.value.trim(),
                            state: document.getElementById('state')?.value.trim(),
                            zip: document.getElementById('zip')?.value.trim(),
                            country: document.getElementById('country')?.value.trim(),
                            phone: document.getElementById('phone')?.value.trim()
                        })
                    };
                    
                    console.log('Shipping data collected:', shippingData);
                    
                    // Close modal
                    modal.remove();
                    
                    // Process checkout with Square
                    await processCheckout(shippingData);
                });
                
                // Handle cancel button
                cancelBtn.addEventListener('click', () => {
                    modal.remove();
                    resolve(null); // Cancelled
                });
                
                // Handle click outside
                modal.addEventListener('click', (e) => {
                    if (e.target === modal) {
                        modal.remove();
                        resolve(null);
                    }
                });
            });
        }

        // Process checkout with Square
        async function processCheckout(shippingData) {
            try {
                // Close cart drawer
                closeCartDrawer();
                
                // Show processing modal
                const modal = document.createElement('div');
                modal.className = 'payment-modal-overlay';
                modal.innerHTML = `
                    <div class="payment-modal">
                        <div class="loading-spinner"></div>
                        <h2>Processing Checkout...</h2>
                        <p>Please wait while we prepare your payment.</p>
                    </div>
                `;
                document.body.appendChild(modal);
                
                addDebug('Sending cart to backend for checkout...');
                
                // Calculate subtotal from cart items
                const subtotal = cart.items.reduce((sum, item) => {
                    const price = parseFloat(item.price);
                    return sum + (price * item.quantity);
                }, 0);
                
                // Calculate tax
                const taxableAmount = subtotal + (shippingData?.cost || 0);
                const taxAmount = taxableAmount * (taxRate / 100);
                const totalWithTax = taxableAmount + taxAmount;
                
                // Prepare items array
                const items = cart.items.map(item => ({
                    accessory_id: item.accessoryId,
                    title: item.title || item.description,
                    description: item.description,
                    price: parseFloat(item.price),
                    quantity: item.quantity
                }));
                
                // Prepare customer/shipping data
                const requestData = {
                    items: items,
                    item_type: 'accessory',
                    shipping: shippingData.method === 'ship' ? {
                        amount: shippingData.cost,
                        name: 'Shipping'
                    } : null,
                    subtotal: subtotal,
                    tax: taxAmount,
                    total: totalWithTax,
                    currency: 'USD'
                };
                
                // Add customer info if shipping
                if (shippingData.method === 'ship') {
                    Object.assign(requestData, {
                        customer_name: shippingData.fullName,
                        customer_email: shippingData.email,
                        address: shippingData.address,
                        apt: shippingData.apt,
                        city: shippingData.city,
                        state: shippingData.state,
                        zip: shippingData.zip,
                        country: shippingData.country
                    });
                }
                
                console.log('Sending to checkout endpoint:', requestData);
                
                // Send to checkout endpoint
                const response = await fetch(`${AppConfig.baseUrl}/api/checkout/process`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(requestData)
                });
                
                const data = await response.json();
                
                if (data.status === 'success' && data.checkout_url) {
                    // Store order info for reference
                    currentOrder = {
                        order_id: data.order_id,
                        order_number: data.order_number
                    };
                    
                    // Clear cart before redirect
                    cart.items = [];
                    cart.total = 0;
                    saveCart();
                    
                    // Redirect to Square checkout page
                    addDebug(`Redirecting to Square checkout: ${data.checkout_url}`);
                    window.location.href = data.checkout_url;
                    
                } else if (data.status === 'error') {
                    // Payment failed
                    modal.innerHTML = `
                        <div class="payment-modal">
                            <i class="fas fa-exclamation-circle"></i>
                            <h2>Checkout Failed</h2>
                            <p>${data.error || 'An error occurred processing your checkout.'}</p>
                            <button class="payment-btn payment-btn-primary" id="tryAgainBtn">
                                Try Again
                            </button>
                            <button class="payment-btn payment-btn-secondary" id="closeErrorBtn" style="margin-top: 10px;">
                                Cancel
                            </button>
                        </div>
                    `;
                    
                    document.getElementById('tryAgainBtn').addEventListener('click', () => {
                        modal.remove();
                        processCheckout(shippingData);
                    });
                    
                    document.getElementById('closeErrorBtn').addEventListener('click', () => {
                        modal.remove();
                        openCartDrawer();
                    });
                }
                
            } catch (error) {
                console.error('Checkout error:', error);
                addDebug(`Checkout error: ${error.message}`, 'error');
                
                // Remove any existing modal
                const existingModal = document.querySelector('.payment-modal-overlay');
                if (existingModal) {
                    existingModal.remove();
                }
                
                showNotification('Error processing checkout: ' + error.message, 'error');
                openCartDrawer();
            }
        }

        // Check checkout status when returning from Square
        async function checkReturnStatus() {
            const urlParams = new URLSearchParams(window.location.search);
            const transactionId = urlParams.get('transactionId');
            const status = urlParams.get('status');
            const orderId = urlParams.get('order_id');
            
            addDebug(`Returning from checkout: transactionId=${transactionId}, status=${status}, orderId=${orderId}`);
            
            if (transactionId && status === 'completed' && orderId) {
                try {
                    // Call backend to update accessory counts
                    const response = await fetch(`${AppConfig.baseUrl}/api/order/complete`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            transaction_id: transactionId,
                            order_id: orderId
                        })
                    });
                    
                    const data = await response.json();
                    
                    if (data.status === 'success') {
                        addDebug('Order status updated successfully');
                    } else {
                        addDebug(`Failed to update order: ${data.error}`, 'error');
                    }
                } catch (error) {
                    addDebug(`Error calling order complete endpoint: ${error.message}`, 'error');
                } finally {
                    // Cart is already cleared before redirect, but just in case
                    cart.items = [];
                    cart.total = 0;
                    saveCart();
                    
                    // Show success message
                    setTimeout(() => {
                        showNotification('Payment successful! Thank you for your purchase.', 'success');
                    }, 500);
                    
                    // Remove query parameters from URL
                    window.history.replaceState({}, document.title, '/merchandise');
                    
                    // Reload accessories to update stock counts
                    loadAccessories();
                }
            } else if (status === 'canceled') {
                showNotification('Checkout was canceled.', 'error');
                window.history.replaceState({}, document.title, '/merchandise');
            }
        }

        // Initialize cart event listeners
        function initializeCart() {
            // Cart toggle click
            document.getElementById('cartToggle').addEventListener('click', openCartDrawer);
            
            // Close cart drawer
            document.getElementById('closeCartDrawer').addEventListener('click', closeCartDrawer);
            
            // Overlay click to close
            document.getElementById('cartOverlay').addEventListener('click', closeCartDrawer);
            
            // Close modal when X is clicked
            document.getElementById('closeModalBtn').addEventListener('click', () => {
                document.getElementById('merchModal').style.display = 'none';
            });
            
            // Close modal when clicking outside
            document.getElementById('merchModal').addEventListener('click', (e) => {
                if (e.target === document.getElementById('merchModal')) {
                    document.getElementById('merchModal').style.display = 'none';
                }
            });
        }

        // Load the catalog data when page loads
        document.addEventListener('DOMContentLoaded', async function() {
            try {
                // Load tax rate
                try {
                    taxRate = await getConfigValue('TAX_RATE') || 0;
                    console.log('Tax rate set to:', taxRate);
                } catch (e) {
                    console.warn('Could not load tax rate, using 0');
                    taxRate = 0;
                }
                
                loadCart(); // Load cart from localStorage
                await loadAccessories();
                initializeSearch();
                initializeCart();
                checkReturnStatus();
                
                // Make functions globally available
                window.removeFromCart = removeFromCart;
                window.updateQuantity = updateQuantity;
                
            } catch (error) {
                console.error('Failed to initialize page:', error);
            }
        });
    </script>
</body>
