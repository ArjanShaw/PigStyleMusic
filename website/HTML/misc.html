<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <link rel="icon" href="/static/images/PigStyle.ico">
    <title>Merchandise - PigStyle Records</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/accessories.css">
    
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-03HFDR9PV7"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-03HFDR9PV7');
    </script>
    
    <style>
        /* Subscription Modal Styles */
        .subscribe-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        
        .subscribe-modal.active {
            display: flex;
        }
        
        .subscribe-modal-content {
            background: white;
            border-radius: 12px;
            max-width: 500px;
            width: 90%;
            max-height: 90%;
            overflow-y: auto;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        
        .subscribe-modal-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 12px 12px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .subscribe-modal-header h3 {
            margin: 0;
            font-size: 1.3rem;
        }
        
        .subscribe-modal-close {
            background: none;
            border: none;
            color: white;
            font-size: 28px;
            cursor: pointer;
            padding: 0;
            line-height: 1;
        }
        
        .subscribe-modal-close:hover {
            opacity: 0.8;
        }
        
        .subscribe-modal-body {
            padding: 25px;
        }
        
        .subscribe-form-group {
            margin-bottom: 20px;
        }
        
        .subscribe-form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }
        
        .subscribe-form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 1rem;
            box-sizing: border-box;
        }
        
        .subscribe-form-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .subscribe-form-hint {
            font-size: 12px;
            color: #666;
            margin-bottom: 20px;
            padding: 8px;
            background: #f8f9fa;
            border-radius: 4px;
        }
        
        .subscribe-submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .subscribe-submit-btn:hover {
            transform: translateY(-2px);
        }
        
        .subscribe-submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        body.modal-open {
            overflow: hidden;
        }
        
        .notification {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: 8px;
            z-index: 3500;
            color: white;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav>
        <a href="/" style="color: white; text-decoration: none; font-size: 20px; font-weight: bold; display: flex; align-items: center; gap: 10px;">
            <img src="/static/images/PigStyle.ico" alt="PigStyle" style="height: 30px; width: 30px;">
            <span>PigStyle Records</span>
        </a>
        <div style="display: flex; gap: 20px; align-items: center;">
            <a href="/browse" style="color: white; text-decoration: none;">Browse</a>
            <a href="/misc" style="color: #ff6b6b; font-weight: bold; text-decoration: none;">Misc</a>
            <a href="/connect" style="color: white; text-decoration: none;">Connect</a>
            <a href="#" id="subscribe-alert-link" style="color: white; text-decoration: none; display: inline-flex; align-items: center; gap: 6px;">
                <i class="fas fa-bell"></i> Record Alerts
            </a>
            <div id="auth-section"></div>
        </div>
    </nav>

    <!-- Subscription Modal -->
    <div id="subscribe-modal" class="subscribe-modal">
        <div class="subscribe-modal-content">
            <div class="subscribe-modal-header">
                <h3><i class="fas fa-bell"></i> Get Notified When We Get Records You Want!</h3>
                <button class="subscribe-modal-close">&times;</button>
            </div>
            <div class="subscribe-modal-body">
                <p>Enter your email and what you're looking for. We'll email you when matching records arrive!</p>
                
                <form id="subscribe-form">
                    <div class="subscribe-form-group">
                        <label for="subscribe-email"><i class="fas fa-envelope"></i> Your Email *</label>
                        <input type="email" id="subscribe-email" required placeholder="you@example.com">
                    </div>
                    
                    <div class="subscribe-form-group">
                        <label for="subscribe-artist"><i class="fas fa-microphone"></i> Artist</label>
                        <input type="text" id="subscribe-artist" placeholder="e.g., Bruce Springsteen">
                    </div>
                    
                    <div class="subscribe-form-group">
                        <label for="subscribe-title"><i class="fas fa-music"></i> Album Title</label>
                        <input type="text" id="subscribe-title" placeholder="e.g., Born to Run">
                    </div>
                    
                    <div class="subscribe-form-group">
                        <label for="subscribe-catalog"><i class="fas fa-barcode"></i> Catalog Number</label>
                        <input type="text" id="subscribe-catalog" placeholder="e.g., JC 33795">
                    </div>
                    
                    <div class="subscribe-form-hint">
                        <i class="fas fa-info-circle"></i> Enter at least one search term (artist, title, or catalog number)
                    </div>
                    
                    <button type="submit" class="subscribe-submit-btn">
                        <i class="fas fa-bell"></i> Subscribe
                    </button>
                </form>
                
                <div id="subscribe-message" style="display: none;"></div>
            </div>
        </div>
    </div>

    <!-- Add padding to account for fixed navbar -->
    <div style="padding-top: 60px;"></div>

    <!-- Background Image -->
    <div class="background-container">
        <img src="/static/images/background.png" alt="Background" class="background-image">
        <div class="background-overlay"></div>
    </div>

    <div class="catalog-container" id="catalogContainer">
        <div class="loading">
            <div class="loading-dots">
                <div></div>
                <div></div>
                <div></div>
                <div></div>
            </div>
            <p>Loading merchandise...</p>
        </div>
    </div>

    <script src="/static/js/app-config.js"></script>
    <script src="/static/js/merchandise-store.js"></script>
    
    <script>
        // Subscription Modal Functions
        const subscribeModal = document.getElementById('subscribe-modal');
        const subscribeLink = document.getElementById('subscribe-alert-link');
        const subscribeClose = document.querySelector('.subscribe-modal-close');
        const subscribeForm = document.getElementById('subscribe-form');
        const subscribeMessage = document.getElementById('subscribe-message');

        function showNotification(msg, type) {
            const n = document.createElement('div');
            n.className = 'notification';
            n.textContent = msg;
            n.style.background = type === 'error' ? '#dc3545' : '#28a745';
            document.body.appendChild(n);
            setTimeout(() => n.remove(), 3000);
        }

        function openSubscribeModal() {
            if (subscribeModal) {
                subscribeModal.style.display = 'flex';
                document.body.style.overflow = 'hidden';
            }
        }

        function closeSubscribeModal() {
            if (subscribeModal) {
                subscribeModal.style.display = 'none';
                document.body.style.overflow = '';
                if (subscribeMessage) subscribeMessage.style.display = 'none';
                if (subscribeForm) subscribeForm.reset();
            }
        }

        if (subscribeLink) {
            subscribeLink.addEventListener('click', function(e) {
                e.preventDefault();
                openSubscribeModal();
            });
        }

        if (subscribeClose) {
            subscribeClose.addEventListener('click', closeSubscribeModal);
        }

        if (subscribeModal) {
            subscribeModal.addEventListener('click', function(e) {
                if (e.target === subscribeModal) closeSubscribeModal();
            });
        }

        function showSubscribeMessage(message, type) {
            if (!subscribeMessage) return;
            subscribeMessage.textContent = message;
            subscribeMessage.style.display = 'block';
            subscribeMessage.style.background = type === 'success' ? '#d4edda' : (type === 'info' ? '#cce5ff' : '#f8d7da');
            subscribeMessage.style.color = type === 'success' ? '#155724' : (type === 'info' ? '#004085' : '#721c24');
            subscribeMessage.style.border = type === 'success' ? '1px solid #c3e6cb' : (type === 'info' ? '1px solid #b8daff' : '1px solid #f5c6cb');
            subscribeMessage.style.borderRadius = '4px';
            subscribeMessage.style.padding = '12px';
            subscribeMessage.style.marginTop = '15px';
        }

        if (subscribeForm) {
            subscribeForm.addEventListener('submit', async function(e) {
                e.preventDefault();
                
                const email = document.getElementById('subscribe-email').value.trim();
                const artist = document.getElementById('subscribe-artist').value.trim();
                const title = document.getElementById('subscribe-title').value.trim();
                const catalog_number = document.getElementById('subscribe-catalog').value.trim();
                
                if (!artist && !title && !catalog_number) {
                    showSubscribeMessage('Please enter at least one search term (artist, title, or catalog number)', 'error');
                    return;
                }
                
                if (!email || !email.includes('@') || !email.includes('.')) {
                    showSubscribeMessage('Please enter a valid email address', 'error');
                    return;
                }
                
                const submitBtn = subscribeForm.querySelector('.subscribe-submit-btn');
                submitBtn.disabled = true;
                submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Subscribing...';
                
                try {
                    const isLocalhost = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
                    const apiUrl = isLocalhost 
                        ? 'http://localhost:5000/api/subscribe'
                        : `https://${window.location.hostname}/api/subscribe`;
                    
                    const response = await fetch(apiUrl, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Accept': 'application/json'
                        },
                        body: JSON.stringify({
                            email: email,
                            artist: artist,
                            title: title,
                            catalog_number: catalog_number
                        })
                    });
                    
                    const data = await response.json();
                    
                    if (response.ok && data.status === 'success') {
                        if (data.already_subscribed) {
                            showSubscribeMessage(data.message, 'info');
                        } else {
                            showSubscribeMessage('Thank you for subscribing! We\'ll email you when matching records arrive.', 'success');
                        }
                        subscribeForm.reset();
                        
                        setTimeout(() => {
                            closeSubscribeModal();
                        }, 3000);
                    } else {
                        showSubscribeMessage(data.error || 'Something went wrong. Please try again.', 'error');
                    }
                    
                } catch (error) {
                    console.error('Subscription error:', error);
                    showSubscribeMessage('Network error. Please try again.', 'error');
                } finally {
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<i class="fas fa-bell"></i> Subscribe';
                }
            });
        }
    </script>
</body>
</html>
