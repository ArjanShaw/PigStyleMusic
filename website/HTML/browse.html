    <script>
        // Core data
        let allRecords = [];
        let availableGenres = [];
        let selectedGenres = [];
        let currentSearchTerm = '';
        
        // DEFAULT: Show New Arrivals (last 7 days) on page load
        let newArrivalsActive = true;
        let newVinylActive = false;
        
        let cart = { items: [], total: 0 };
        let shippingCost = 0;
        let taxRate = 0;

        function extractGenreFromLocation(location) {
            if (!location || location === 'NULL') return null;
            if (location.includes(' | ')) {
                const genre = location.split(' | ')[0].trim();
                if (genre && genre !== 'NULL' && genre !== '') return genre;
            }
            if (location && location !== 'NULL') return location.trim();
            return null;
        }

        function getFormatDisplayName(barcode) {
            if (!barcode || typeof barcode !== 'string') return 'Vinyl';
            const prefix = barcode.substring(0, 2);
            switch(prefix) {
                case '22': return '33⅓ RPM';
                case '55': return '45 RPM';
                case '66': return '78 RPM';
                case '33': return 'CD';
                case '44': return 'Cassette';
                default: return 'Vinyl';
            }
        }

        function isNewVinyl(record) {
            if (!record) return false;
            return record.condition_disc_id === 1 && record.condition_sleeve_id === 1;
        }

        function getConditionNameFromId(conditionId) {
            const map = {1: 'Mint', 2: 'Near Mint', 3: 'VG+', 4: 'VG', 5: 'G+', 6: 'G', 7: 'Fair', 8: 'Poor'};
            return map[conditionId] || 'Unknown';
        }

        function getConditionClassFromId(conditionId) {
            if (conditionId === 1) return 'condition-mint';
            if (conditionId === 2) return 'condition-near-mint';
            if (conditionId === 3) return 'condition-very-good-plus';
            if (conditionId === 4) return 'condition-very-good';
            return '';
        }

        function updateFilterUI() {
            const arrivalsBtn = document.getElementById('newArrivalsBtn');
            const vinylBtn = document.getElementById('newVinylBtn');
            
            if (arrivalsBtn) {
                if (newArrivalsActive) {
                    arrivalsBtn.classList.add('active');
                    arrivalsBtn.innerHTML = '<i class="fas fa-calendar-week"></i> New Arrivals';
                } else {
                    arrivalsBtn.classList.remove('active');
                    arrivalsBtn.innerHTML = '<i class="fas fa-list"></i> All Records';
                }
            }
            if (vinylBtn) {
                if (newVinylActive) vinylBtn.classList.add('active');
                else vinylBtn.classList.remove('active');
            }
            
            let filters = [];
            if (currentSearchTerm) filters.push(`Search: "${currentSearchTerm}"`);
            if (newArrivalsActive) filters.push(`New Arrivals (last 7 days)`);
            if (!newArrivalsActive) filters.push(`All Records`);
            if (newVinylActive) filters.push(`New Vinyl Only`);
            if (selectedGenres.length > 0) filters.push(`Genre: ${selectedGenres.join(', ')}`);
            
            const statusRow = document.getElementById('filterStatusRow');
            const summaryDiv = document.getElementById('filterSummary');
            
            if (filters.length === 0 && newArrivalsActive) {
                statusRow.style.display = 'flex';
                summaryDiv.innerHTML = `New Arrivals (last 7 days) <span class="result-count-badge">${allRecords.length} results</span>`;
                return;
            }
            
            if (filters.length === 0 && !newArrivalsActive) {
                statusRow.style.display = 'flex';
                summaryDiv.innerHTML = `All Records <span class="result-count-badge">${allRecords.length} results</span>`;
                return;
            }
            
            if (filters.length === 0) {
                statusRow.style.display = 'none';
                return;
            }
            
            statusRow.style.display = 'flex';
            summaryDiv.innerHTML = `${filters.join(' · ')} <span class="result-count-badge">${allRecords.length} results</span>`;
        }

        async function loadCatalogData() {
            const searchBox = document.getElementById('searchBox');
            currentSearchTerm = searchBox ? searchBox.value.trim() : '';
            
            let url = `${AppConfig.baseUrl}/records?status_id=2`;
            
            // When newArrivalsActive is TRUE, use default backend behavior (last 7 days)
            // When newArrivalsActive is FALSE, bypass the filter to show all records
            if (newArrivalsActive === false) {
                url += `&bypass_date_filter=true`;
            }
            
            if (currentSearchTerm) {
                url = `${AppConfig.baseUrl}/records?search=${encodeURIComponent(currentSearchTerm)}&status_id=2`;
                if (newArrivalsActive === false) {
                    url += `&bypass_date_filter=true`;
                }
            }
            
            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                
                if (data.status === 'success') {
                    let records = data.records || [];
                    
                    // Apply frontend filters for New Vinyl
                    if (newVinylActive) {
                        records = records.filter(record => isNewVinyl(record));
                    }
                    
                    // Apply genre filter
                    if (selectedGenres.length > 0) {
                        records = records.filter(record => {
                            const genre = extractGenreFromLocation(record.location);
                            if (!genre) return false;
                            return selectedGenres.some(selected => 
                                selected.toLowerCase() === genre.toLowerCase()
                            );
                        });
                    }
                    
                    allRecords = records;
                    
                    // Extract genres from ALL records for dropdown
                    const genreSet = new Set();
                    if (data.records) {
                        data.records.forEach(record => {
                            const genre = extractGenreFromLocation(record.location);
                            if (genre && genre !== 'n/a') genreSet.add(genre);
                        });
                    }
                    availableGenres = Array.from(genreSet).sort();
                    populateGenreDropdown();
                    displayRecords(allRecords);
                    updateFilterUI();
                }
            } catch (error) {
                console.error('Failed to load:', error);
                document.getElementById('catalogContainer').innerHTML = `
                    <div class="error-message">
                        <i class="fas fa-exclamation-triangle"></i>
                        <h2>Failed to Load Catalog</h2>
                        <p>${error.message}</p>
                        <button class="retry-btn" onclick="location.reload()">Retry</button>
                    </div>
                `;
            }
        }

        function populateGenreDropdown() {
            const genreList = document.getElementById('genreList');
            if (!genreList) return;
            if (availableGenres.length === 0) {
                genreList.innerHTML = '<div style="color: #999; text-align: center;">No genres available</div>';
                return;
            }
            genreList.innerHTML = availableGenres.map(genre => `
                <div class="filter-checkbox-item">
                    <input type="checkbox" id="genre_${escapeHtml(genre)}" value="${escapeHtml(genre)}">
                    <label for="genre_${escapeHtml(genre)}">${escapeHtml(genre)}</label>
                </div>
            `).join('');
            document.querySelectorAll('#genreList input').forEach(cb => {
                if (selectedGenres.includes(cb.value)) cb.checked = true;
            });
        }

        function clearAllFilters() {
            selectedGenres = [];
            currentSearchTerm = '';
            newArrivalsActive = true;
            newVinylActive = false;
            const searchBox = document.getElementById('searchBox');
            if (searchBox) searchBox.value = '';
            document.querySelectorAll('#genreList input').forEach(cb => cb.checked = false);
            loadCatalogData();
        }

        function toggleNewArrivals() {
            newArrivalsActive = !newArrivalsActive;
            loadCatalogData();
        }
        
        function toggleNewVinyl() {
            newVinylActive = !newVinylActive;
            loadCatalogData();
        }

        function displayRecords(records) {
            const container = document.getElementById('catalogContainer');
            container.innerHTML = '';
            
            if (!records || records.length === 0) {
                let message = 'No records match your filters.';
                if (newArrivalsActive && !newVinylActive) message = 'No new arrivals in the last 7 days.';
                if (newVinylActive && !newArrivalsActive) message = 'No new vinyl records available.';
                if (newArrivalsActive && newVinylActive) message = 'No recent new vinyl records found.';
                container.innerHTML = `<div class="no-records-message"><i class="fas fa-search"></i><p>${message}</p></div>`;
                return;
            }
            
            // Sort by newest first
            const sortedRecords = [...records].sort((a, b) => {
                const dateA = a.created_at ? new Date(a.created_at) : new Date(0);
                const dateB = b.created_at ? new Date(b.created_at) : new Date(0);
                return dateB - dateA;
            });
            
            const grid = document.createElement('div');
            grid.className = 'records-grid';
            sortedRecords.forEach(record => grid.appendChild(createRecordCard(record)));
            container.appendChild(grid);
        }

        function createRecordCard(record) {
            const card = document.createElement('div');
            card.className = 'record-card';
            
            const genre = extractGenreFromLocation(record.location) || 'Uncategorized';
            const conditionName = getConditionNameFromId(record.condition_disc_id);
            const conditionClass = getConditionClassFromId(record.condition_disc_id);
            const format = getFormatDisplayName(record.barcode);
            const alreadyInCart = cart.items.some(item => item.copyId === record.id);
            
            const imageHtml = record.image_url ? 
                `<img src="${record.image_url}" alt="${record.title}" onerror="this.parentElement.classList.add('default-bg'); this.style.display='none';">` : '';
            
            card.innerHTML = `
                <div class="record-card-image ${!record.image_url ? 'default-bg' : ''}">
                    ${imageHtml || '<i class="fas fa-music"></i>'}
                </div>
                <div class="record-card-info">
                    <div class="record-card-artist" title="${escapeHtml(record.artist)}">${escapeHtml(record.artist)}</div>
                    <div class="record-card-title" title="${escapeHtml(record.title)}">${escapeHtml(record.title)}</div>
                    <div class="record-card-price">$${parseFloat(record.store_price).toFixed(2)}</div>
                    <div>
                        <span class="record-card-condition ${conditionClass}">${conditionName}</span>
                        <span class="record-card-genre">${format}</span>
                        ${alreadyInCart ? '<span class="in-cart-badge"><i class="fas fa-check"></i> In Cart</span>' : ''}
                    </div>
                    <div class="record-card-genre"><i class="fas fa-music"></i> ${escapeHtml(genre)}</div>
                </div>
            `;
            
            card.addEventListener('click', (e) => {
                if (e.target.closest('.add-to-cart-modal-btn')) return;
                showRecordModal(record);
            });
            
            return card;
        }

        function showRecordModal(record) {
            const alreadyInCart = cart.items.some(item => item.copyId === record.id);
            const genre = extractGenreFromLocation(record.location) || 'Uncategorized';
            const conditionName = getConditionNameFromId(record.condition_disc_id);
            const conditionClass = getConditionClassFromId(record.condition_disc_id);
            const format = getFormatDisplayName(record.barcode);
            
            const modal = document.createElement('div');
            modal.className = 'record-modal-overlay';
            
            const imageHtml = record.image_url ? 
                `<img src="${record.image_url}" alt="${record.title}" onerror="this.parentElement.classList.add('default-bg'); this.style.display='none';">` : '';
            
            modal.innerHTML = `
                <div class="record-modal">
                    <div class="record-modal-header">
                        <h3>${escapeHtml(record.artist)}</h3>
                        <button class="record-modal-close">&times;</button>
                    </div>
                    <div class="record-modal-image ${!record.image_url ? 'default-bg' : ''}">
                        ${imageHtml || '<i class="fas fa-music" style="font-size: 64px;"></i>'}
                    </div>
                    <div class="record-modal-info">
                        <div class="record-modal-title">${escapeHtml(record.title)}</div>
                        <div class="record-modal-details">
                            <div class="detail-row">
                                <span class="detail-label">Condition:</span>
                                <span class="detail-value"><span class="condition-indicator ${conditionClass}">${conditionName}</span></span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">Format:</span>
                                <span class="detail-value">${format}</span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">Genre:</span>
                                <span class="detail-value">${escapeHtml(genre)}</span>
                            </div>
                            ${record.catalog_number ? `
                            <div class="detail-row">
                                <span class="detail-label">Catalog #:</span>
                                <span class="detail-value">${escapeHtml(record.catalog_number)}</span>
                            </div>
                            ` : ''}
                            ${record.barcode ? `
                            <div class="detail-row">
                                <span class="detail-label">Barcode:</span>
                                <span class="detail-value">${escapeHtml(record.barcode)}</span>
                            </div>
                            ` : ''}
                        </div>
                        <div class="record-modal-price">$${parseFloat(record.store_price).toFixed(2)}</div>
                        <div class="record-modal-actions">
                            <button class="add-to-cart-modal-btn" data-record-id="${record.id}" ${alreadyInCart ? 'disabled' : ''}>
                                <i class="fas ${alreadyInCart ? 'fa-check' : 'fa-cart-plus'}"></i> ${alreadyInCart ? 'In Cart' : 'Add to Cart'}
                            </button>
                            <button class="close-modal-btn">Close</button>
                        </div>
                    </div>
                </div>
            `;
            
            document.body.appendChild(modal);
            
            modal.querySelector('.record-modal-close').addEventListener('click', () => modal.remove());
            modal.querySelector('.close-modal-btn').addEventListener('click', () => modal.remove());
            modal.addEventListener('click', (e) => { if (e.target === modal) modal.remove(); });
            
            const addBtn = modal.querySelector('.add-to-cart-modal-btn');
            if (addBtn && !addBtn.disabled) {
                addBtn.addEventListener('click', () => {
                    addToCart(record);
                    modal.remove();
                });
            }
        }

        function addToCart(record) {
            if (cart.items.some(item => item.copyId === record.id)) {
                showNotification('Already in cart', 'error');
                return false;
            }
            
            cart.items.push({
                copyId: record.id,
                title: record.title,
                artist: record.artist,
                condition: getConditionNameFromId(record.condition_disc_id),
                price: parseFloat(record.store_price),
                image_url: record.image_url,
                format: getFormatDisplayName(record.barcode),
                quantity: 1
            });
            
            cart.total = cart.items.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            saveCart();
            showNotification(`Added ${record.title} to cart!`, 'success');
            return true;
        }
        
        function removeFromCart(index) {
            cart.items.splice(index, 1);
            cart.total = cart.items.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            saveCart();
            showNotification('Removed from cart', 'success');
            if (cart.items.length === 0) closeCartDrawer();
            loadCatalogData(); // Refresh to update "In Cart" badges
        }
        
        function saveCart() {
            localStorage.setItem('pigstyle_cart', JSON.stringify(cart));
            updateCartDisplay();
        }
        
        function loadCart() {
            const saved = localStorage.getItem('pigstyle_cart');
            if (saved) {
                cart = JSON.parse(saved);
                updateCartDisplay();
            }
        }
        
        function updateCartDisplay() {
            const container = document.getElementById('cartToggleContainer');
            const badge = document.getElementById('cartBadge');
            const count = cart.items.reduce((sum, item) => sum + item.quantity, 0);
            badge.textContent = count;
            container.style.display = count > 0 ? 'block' : 'none';
            updateCartDrawer();
        }
        
        function updateCartDrawer() {
            const itemsDiv = document.getElementById('cartItems');
            const footer = document.getElementById('cartFooter');
            
            if (cart.items.length === 0) {
                itemsDiv.innerHTML = '<div class="empty-cart-message"><i class="fas fa-shopping-bag"></i><p>Your cart is empty</p></div>';
                footer.style.display = 'none';
                return;
            }
            
            let subtotal = cart.items.reduce((s, i) => s + (i.price * i.quantity), 0);
            let taxAmt = subtotal * (taxRate / 100);
            
            let html = `
                <table class="cart-items-table">
                    <thead><tr><th>Item</th><th>Price</th><th>Qty</th><th>Total</th><th></th></tr></thead>
                    <tbody>
            `;
            cart.items.forEach((item, idx) => {
                html += `
                    <tr>
                        <td><strong>${escapeHtml(item.artist)} - ${escapeHtml(item.title)}</strong><br><small>${item.format} · ${item.condition}</small></td>
                        <td>$${item.price.toFixed(2)}</td>
                        <td>${item.quantity}</td>
                        <td>$${(item.price * item.quantity).toFixed(2)}</td>
                        <td><button class="remove-item-btn" onclick="removeFromCart(${idx})"><i class="fas fa-trash"></i></button></td>
                    </tr>
                `;
            });
            html += `
                    </tbody>
                </table>
                <div class="cart-summary">
                    <div class="cart-summary-row"><span>Subtotal:</span><span>$${subtotal.toFixed(2)}</span></div>
                    <div class="cart-summary-row"><span>Tax (${taxRate}%):</span><span>$${taxAmt.toFixed(2)}</span></div>
                    <div class="cart-summary-row total"><span>Total:</span><span>$${(subtotal + taxAmt).toFixed(2)}</span></div>
                </div>
                <button class="checkout-btn" id="checkoutBtn">Proceed to Checkout</button>
            `;
            itemsDiv.innerHTML = html;
            footer.style.display = 'block';
            document.getElementById('checkoutBtn')?.addEventListener('click', showCheckoutModal);
        }
        
        function showNotification(msg, type) {
            const n = document.createElement('div');
            n.className = `notification ${type === 'error' ? 'error' : ''}`;
            n.textContent = msg;
            n.style.cssText = `
                position: fixed;
                bottom: 20px;
                right: 20px;
                background: ${type === 'error' ? '#dc3545' : '#28a745'};
                color: white;
                padding: 12px 20px;
                border-radius: 8px;
                z-index: 3000;
                animation: slideIn 0.3s ease;
            `;
            document.body.appendChild(n);
            setTimeout(() => n.remove(), 3000);
        }
        
        function openCartDrawer() {
            document.getElementById('cartDrawer').classList.add('open');
            document.getElementById('cartOverlay').classList.add('active');
            updateCartDrawer();
        }
        
        function closeCartDrawer() {
            document.getElementById('cartDrawer').classList.remove('open');
            document.getElementById('cartOverlay').classList.remove('active');
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function debounce(fn, delay) {
            let t;
            return function(...a) {
                clearTimeout(t);
                t = setTimeout(() => fn(...a), delay);
            };
        }

        // CHECKOUT MODAL
        function showCheckoutModal() {
            closeCartDrawer();
            
            const subtotal = cart.total;
            const taxAmount = subtotal * (taxRate / 100);
            const baseTotal = subtotal + taxAmount;
            
            const modal = document.createElement('div');
            modal.className = 'checkout-modal-overlay';
            modal.innerHTML = `
                <div class="checkout-modal">
                    <div class="checkout-modal-header">
                        <h3><i class="fas fa-shopping-cart"></i> Checkout</h3>
                        <button class="checkout-modal-close">&times;</button>
                    </div>
                    
                    <div class="checkout-summary">
                        <div class="summary-row">
                            <span>Subtotal:</span>
                            <span>$${subtotal.toFixed(2)}</span>
                        </div>
                        <div class="summary-row">
                            <span>Tax (${taxRate}%):</span>
                            <span>$${taxAmount.toFixed(2)}</span>
                        </div>
                        <div class="summary-row" id="shippingSummaryRow" style="display: none;">
                            <span>Shipping:</span>
                            <span id="shippingAmount">$${shippingCost.toFixed(2)}</span>
                        </div>
                        <div class="summary-row total-row">
                            <strong>Total:</strong>
                            <strong id="totalAmount">$${baseTotal.toFixed(2)}</strong>
                        </div>
                    </div>
                    
                    <div class="checkout-option">
                        <label class="option-card" id="walkinOption">
                            <input type="radio" name="checkoutType" value="walkin" checked>
                            <div class="option-content">
                                <i class="fas fa-store"></i>
                                <div>
                                    <strong>In-Store Pickup</strong>
                                    <small>Pick up at our store - No shipping fee</small>
                                </div>
                            </div>
                        </label>
                        
                        <label class="option-card" id="shippingOption">
                            <input type="radio" name="checkoutType" value="shipping">
                            <div class="option-content">
                                <i class="fas fa-truck"></i>
                                <div>
                                    <strong>Ship to Me</strong>
                                    <small>$${shippingCost.toFixed(2)} shipping fee</small>
                                </div>
                            </div>
                        </label>
                    </div>
                    
                    <div class="checkout-fields" id="walkinFields">
                        <div class="form-group">
                            <label>Your Name <span class="required">*</span></label>
                            <input type="text" id="walkinName" placeholder="Enter your name">
                        </div>
                        <div class="form-group">
                            <label>Email (for receipt)</label>
                            <input type="email" id="walkinEmail" placeholder="your@email.com">
                        </div>
                        <div class="form-group">
                            <label>Phone (optional)</label>
                            <input type="tel" id="walkinPhone" placeholder="(555) 555-5555">
                        </div>
                    </div>
                    
                    <div class="checkout-fields" id="shippingFields" style="display: none;">
                        <div class="form-group">
                            <label>Full Name <span class="required">*</span></label>
                            <input type="text" id="shippingName" placeholder="Enter your full name">
                        </div>
                        <div class="form-group">
                            <label>Email <span class="required">*</span></label>
                            <input type="email" id="shippingEmail" placeholder="your@email.com">
                        </div>
                        <div class="form-group">
                            <label>Phone</label>
                            <input type="tel" id="shippingPhone" placeholder="(555) 555-5555">
                        </div>
                        <div class="form-group">
                            <label>Street Address <span class="required">*</span></label>
                            <input type="text" id="addressLine1" placeholder="Street address">
                        </div>
                        <div class="form-group">
                            <label>Apartment/Suite (optional)</label>
                            <input type="text" id="addressLine2" placeholder="Apt, Suite, Unit, etc.">
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>City <span class="required">*</span></label>
                                <input type="text" id="city" placeholder="City">
                            </div>
                            <div class="form-group">
                                <label>State <span class="required">*</span></label>
                                <input type="text" id="state" placeholder="State">
                            </div>
                            <div class="form-group">
                                <label>ZIP <span class="required">*</span></label>
                                <input type="text" id="zip" placeholder="ZIP code">
                            </div>
                        </div>
                    </div>
                    
                    <div class="checkout-actions">
                        <button class="cancel-btn" id="cancelCheckout">Cancel</button>
                        <button class="confirm-btn" id="confirmCheckout">Continue to Payment</button>
                    </div>
                </div>
            `;
            
            document.body.appendChild(modal);
            
            const walkinOption = modal.querySelector('#walkinOption');
            const shippingOption = modal.querySelector('#shippingOption');
            const walkinFields = modal.querySelector('#walkinFields');
            const shippingFields = modal.querySelector('#shippingFields');
            const shippingSummaryRow = modal.querySelector('#shippingSummaryRow');
            const totalAmountSpan = modal.querySelector('#totalAmount');
            const confirmBtn = modal.querySelector('#confirmCheckout');
            
            function updateTotal() {
                const isShipping = shippingOption.querySelector('input').checked;
                let total = baseTotal;
                if (isShipping) {
                    total = baseTotal + shippingCost;
                    shippingSummaryRow.style.display = 'flex';
                } else {
                    shippingSummaryRow.style.display = 'none';
                }
                totalAmountSpan.textContent = `$${total.toFixed(2)}`;
            }
            
            function updateSelectedOption() {
                if (walkinOption.querySelector('input').checked) {
                    walkinOption.classList.add('selected');
                    shippingOption.classList.remove('selected');
                    walkinFields.style.display = 'block';
                    shippingFields.style.display = 'none';
                } else {
                    walkinOption.classList.remove('selected');
                    shippingOption.classList.add('selected');
                    walkinFields.style.display = 'none';
                    shippingFields.style.display = 'block';
                }
                updateTotal();
            }
            
            walkinOption.addEventListener('click', () => {
                walkinOption.querySelector('input').checked = true;
                shippingOption.querySelector('input').checked = false;
                updateSelectedOption();
            });
            
            shippingOption.addEventListener('click', () => {
                walkinOption.querySelector('input').checked = false;
                shippingOption.querySelector('input').checked = true;
                updateSelectedOption();
            });
            
            modal.querySelector('.checkout-modal-close').addEventListener('click', () => modal.remove());
            modal.querySelector('#cancelCheckout').addEventListener('click', () => modal.remove());
            modal.addEventListener('click', (e) => { if (e.target === modal) modal.remove(); });
            
            confirmBtn.addEventListener('click', async () => {
                const isShipping = shippingOption.querySelector('input').checked;
                
                let customerName = '';
                let customerEmail = '';
                let phone = '';
                let address = '';
                let address2 = '';
                let city = '';
                let state = '';
                let zip = '';
                
                if (isShipping) {
                    customerName = modal.querySelector('#shippingName').value.trim();
                    customerEmail = modal.querySelector('#shippingEmail').value.trim();
                    phone = modal.querySelector('#shippingPhone').value.trim();
                    address = modal.querySelector('#addressLine1').value.trim();
                    address2 = modal.querySelector('#addressLine2').value.trim();
                    city = modal.querySelector('#city').value.trim();
                    state = modal.querySelector('#state').value.trim();
                    zip = modal.querySelector('#zip').value.trim();
                    
                    if (!customerName) { showNotification('Please enter your name', 'error'); return; }
                    if (!customerEmail) { showNotification('Please enter your email', 'error'); return; }
                    if (!address) { showNotification('Please enter your street address', 'error'); return; }
                    if (!city) { showNotification('Please enter your city', 'error'); return; }
                    if (!state) { showNotification('Please enter your state', 'error'); return; }
                    if (!zip) { showNotification('Please enter your ZIP code', 'error'); return; }
                } else {
                    customerName = modal.querySelector('#walkinName').value.trim();
                    customerEmail = modal.querySelector('#walkinEmail').value.trim();
                    phone = modal.querySelector('#walkinPhone').value.trim();
                    
                    if (!customerName) { showNotification('Please enter your name', 'error'); return; }
                }
                
                confirmBtn.disabled = true;
                confirmBtn.textContent = 'Processing...';
                
                const finalTotal = isShipping ? baseTotal + shippingCost : baseTotal;
                
                const checkoutData = {
                    items: cart.items.map(item => ({
                        copy_id: item.copyId,
                        title: item.title,
                        artist: item.artist,
                        price: item.price,
                        condition: item.condition,
                        quantity: item.quantity
                    })),
                    item_type: 'record',
                    shipping: {
                        method: isShipping ? 'shipping' : 'pickup',
                        amount: isShipping ? shippingCost : 0
                    },
                    subtotal: subtotal,
                    total: finalTotal,
                    tax: taxAmount,
                    customer_name: customerName,
                    customer_email: customerEmail,
                    phone: phone,
                    notes: ''
                };
                
                if (isShipping) {
                    checkoutData.address = address;
                    checkoutData.apt = address2;
                    checkoutData.city = city;
                    checkoutData.state = state;
                    checkoutData.zip = zip;
                    checkoutData.country = 'USA';
                }
                
                try {
                    const response = await fetch(`${AppConfig.baseUrl}/api/checkout/process`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(checkoutData)
                    });
                    
                    const data = await response.json();
                    
                    if (data.status === 'success' && data.checkout_url) {
                        window.location.href = data.checkout_url;
                    } else {
                        showNotification('Checkout failed: ' + (data.error || 'Unknown error'), 'error');
                        confirmBtn.disabled = false;
                        confirmBtn.textContent = 'Continue to Payment';
                    }
                } catch (error) {
                    console.error('Checkout error:', error);
                    showNotification('Checkout error: ' + error.message, 'error');
                    confirmBtn.disabled = false;
                    confirmBtn.textContent = 'Continue to Payment';
                }
            });
        }

        // Initialization
        document.addEventListener('DOMContentLoaded', async () => {
            shippingCost = parseFloat(await getConfigValue('SHIPPING_COST')) || 0;
            taxRate = parseFloat(await getConfigValue('TAX_RATE')) || 0;
            loadCart();
            await loadCatalogData();
            
            document.getElementById('cartToggle')?.addEventListener('click', openCartDrawer);
            document.getElementById('closeCartDrawer')?.addEventListener('click', closeCartDrawer);
            document.getElementById('cartOverlay')?.addEventListener('click', closeCartDrawer);
            document.getElementById('clearAllFiltersBtn')?.addEventListener('click', clearAllFilters);
            document.getElementById('newArrivalsBtn')?.addEventListener('click', toggleNewArrivals);
            document.getElementById('newVinylBtn')?.addEventListener('click', toggleNewVinyl);
            
            const searchBox = document.getElementById('searchBox');
            searchBox?.addEventListener('input', debounce(() => loadCatalogData(), 500));
            
            const genreBtn = document.getElementById('genreFilterBtn');
            const genreDropdown = document.getElementById('genreDropdown');
            genreBtn?.addEventListener('click', (e) => { e.stopPropagation(); genreDropdown.classList.toggle('show'); });
            document.addEventListener('click', (e) => { if (!genreDropdown?.contains(e.target) && e.target !== genreBtn) genreDropdown?.classList.remove('show'); });
            document.getElementById('selectAllGenres')?.addEventListener('click', () => { document.querySelectorAll('#genreList input').forEach(cb => cb.checked = true); });
            document.getElementById('clearAllGenres')?.addEventListener('click', () => { document.querySelectorAll('#genreList input').forEach(cb => cb.checked = false); });
            document.getElementById('applyGenres')?.addEventListener('click', () => {
                selectedGenres = Array.from(document.querySelectorAll('#genreList input:checked')).map(cb => cb.value);
                genreDropdown.classList.remove('show');
                loadCatalogData();
            });
            window.removeFromCart = removeFromCart;
        });
    </script>
</body>
</html>
