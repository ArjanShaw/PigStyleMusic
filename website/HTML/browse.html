    <script>
        let allRecords = [];
        let availableGenres = [];
        let selectedGenres = [];
        let currentSearchTerm = '';
        let newArrivalsActive = true;
        let newVinylActive = false;
        let currentPage = 1;
        let recordsPerPage = 50;
        let cart = { items: [], total: 0 };
        let shippingCost = 0;
        let taxRate = 0;

        function extractGenreFromLocation(location) {
            if (!location || location === 'NULL') return null;
            if (location.includes(' | ')) {
                return location.split(' | ')[0].trim();
            }
            return location.trim();
        }
        
        function formatLocationDisplay(location) {
            if (!location || location === 'NULL') return 'Check with staff';
            return location;
        }

stones        function getConditionDisplayName(conditionId) {
            const map = {1: 'Mint', 2: 'Near Mint', 3: 'VG+', 4: 'VG', 5: 'G+', 6: 'G', 7: 'Fair', 8: 'Poor'};
            return map[conditionId] || 'Unknown';
        }

        function getCombinedCondition(discId, sleeveId) {
            const disc = getConditionDisplayName(discId);
            const sleeve = getConditionDisplayName(sleeveId);
            if (disc === sleeve) return disc;
            return `${disc}/${sleeve}`;
        }

        function isNewVinyl(record) {
            return record.condition_disc_id === 1 && record.condition_sleeve_id === 1;
        }

        function displayRecords(records) {
            const container = document.getElementById('catalogContainer');
            const totalRecords = records.length;
            const totalPages = Math.ceil(totalRecords / recordsPerPage);
            const startIndex = (currentPage - 1) * recordsPerPage;
            const endIndex = startIndex + recordsPerPage;
            const pageRecords = records.slice(startIndex, endIndex);
            
            container.innerHTML = '';
            
            if (!pageRecords || pageRecords.length === 0) {
                container.innerHTML = `<div class="no-records-message"><i class="fas fa-search"></i><p>No records match your filters.</p></div>`;
                return;
            }
            
            const grid = document.createElement('div');
            grid.className = 'records-grid';
            pageRecords.forEach(record => grid.appendChild(createRecordCard(record)));
            container.appendChild(grid);
            
            if (totalPages > 1) {
                addPaginationControls(totalPages, totalRecords);
            }
        }
        
        function addPaginationControls(totalPages, totalRecords) {
            const container = document.getElementById('catalogContainer');
            const existingPagination = document.getElementById('pagination-controls');
            if (existingPagination) existingPagination.remove();
            
            const paginationDiv = document.createElement('div');
            paginationDiv.id = 'pagination-controls';
            
            const prevBtn = document.createElement('button');
            prevBtn.innerHTML = '← Previous';
            prevBtn.className = 'pagination-btn';
            prevBtn.disabled = currentPage === 1;
            prevBtn.onclick = () => {
                if (currentPage > 1) {
                    currentPage--;
                    displayRecords(allRecords);
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }
            };
            
            const pageInfo = document.createElement('span');
            pageInfo.className = 'pagination-info';
            pageInfo.textContent = `Page ${currentPage} of ${totalPages} (${totalRecords} records)`;
            
            const nextBtn = document.createElement('button');
            nextBtn.innerHTML = 'Next →';
            nextBtn.className = 'pagination-btn';
            nextBtn.disabled = currentPage === totalPages;
            nextBtn.onclick = () => {
                if (currentPage < totalPages) {
                    currentPage++;
                    displayRecords(allRecords);
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }
            };
            
            paginationDiv.appendChild(prevBtn);
            paginationDiv.appendChild(pageInfo);
            paginationDiv.appendChild(nextBtn);
            container.appendChild(paginationDiv);
        }

        async function loadCatalogData() {
            const searchBox = document.getElementById('searchBox');
            currentSearchTerm = searchBox ? searchBox.value.trim() : '';
            currentPage = 1;
            
            let url = `${AppConfig.baseUrl}/records?status_id=2`;
            
            if (!newArrivalsActive) {
                url += `&bypass_date_filter=true`;
            }
            
            url += `&require_image=true`;
            url += `&exclude_old_no_location=true`;
            
            if (currentSearchTerm) {
                url = `${AppConfig.baseUrl}/records?search=${encodeURIComponent(currentSearchTerm)}&status_id=2`;
                if (!newArrivalsActive) {
                    url += `&bypass_date_filter=true`;
                }
                url += `&require_image=true`;
                url += `&exclude_old_no_location=true`;
            }
            
            document.getElementById('catalogContainer').innerHTML = `<div class="loading-indicator"><div class="loading-dots"><div></div><div></div><div></div><div></div></div><p>Loading records...</p></div>`;
            
            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                
                if (data.status === 'success') {
                    let records = data.records || [];
                    if (newVinylActive) records = records.filter(r => isNewVinyl(r));
                    if (selectedGenres.length > 0) {
                        records = records.filter(r => {
                            const genre = extractGenreFromLocation(r.location);
                            return genre && selectedGenres.some(s => s.toLowerCase() === genre.toLowerCase());
                        });
                    }
                    allRecords = records;
                    
                    const genreSet = new Set();
                    if (data.records) {
                        data.records.forEach(r => {
                            const genre = extractGenreFromLocation(r.location);
                            if (genre) genreSet.add(genre);
                        });
                    }
                    availableGenres = Array.from(genreSet).sort();
                    populateGenreDropdown();
                    displayRecords(allRecords);
                    updateFilterUI();
                }
            } catch (error) {
                document.getElementById('catalogContainer').innerHTML = `<div class="error-message"><i class="fas fa-exclamation-triangle"></i><h2>Failed to Load</h2><p>${error.message}</p><button class="retry-btn" onclick="location.reload()">Retry</button></div>`;
            }
        }

        function populateGenreDropdown() {
            const genreList = document.getElementById('genreList');
            if (!genreList) return;
            if (availableGenres.length === 0) {
                genreList.innerHTML = '<div style="color: #999; text-align: center;">No genres available</div>';
                return;
            }
            genreList.innerHTML = availableGenres.map(genre => `
                <div class="filter-checkbox-item">
                    <input type="checkbox" id="genre_${escapeHtml(genre)}" value="${escapeHtml(genre)}">
                    <label for="genre_${escapeHtml(genre)}">${escapeHtml(genre)}</label>
                </div>
            `).join('');
            document.querySelectorAll('#genreList input').forEach(cb => {
                if (selectedGenres.includes(cb.value)) cb.checked = true;
            });
        }

        function updateFilterUI() {
            const arrivalsBtn = document.getElementById('newArrivalsBtn');
            const vinylBtn = document.getElementById('newVinylBtn');
            
            if (newArrivalsActive) {
                arrivalsBtn.classList.add('active');
                arrivalsBtn.innerHTML = '<i class="fas fa-calendar-week"></i> New Arrivals';
            } else {
                arrivalsBtn.classList.remove('active');
                arrivalsBtn.innerHTML = '<i class="fas fa-list"></i> All Records';
            }
            
            if (newVinylActive) vinylBtn.classList.add('active');
            else vinylBtn.classList.remove('active');
            
            const filters = [];
            if (currentSearchTerm) filters.push(`Search: "${currentSearchTerm}"`);
            if (newArrivalsActive) filters.push(`New Arrivals (last 7 days)`);
            if (!newArrivalsActive) filters.push(`All Records`);
            if (newVinylActive) filters.push(`New Vinyl Only`);
            if (selectedGenres.length > 0) filters.push(`Genre: ${selectedGenres.join(', ')}`);
            
            const statusRow = document.getElementById('filterStatusRow');
            const summaryDiv = document.getElementById('filterSummary');
            
            if (filters.length === 0 && newArrivalsActive) {
                statusRow.style.display = 'flex';
                summaryDiv.innerHTML = `New Arrivals (last 7 days) <span class="result-count-badge">${allRecords.length} results</span>`;
            } else if (filters.length === 0 && !newArrivalsActive) {
                statusRow.style.display = 'flex';
                summaryDiv.innerHTML = `All Records <span class="result-count-badge">${allRecords.length} results</span>`;
            } else if (filters.length > 0) {
                statusRow.style.display = 'flex';
                summaryDiv.innerHTML = `${filters.join(' · ')} <span class="result-count-badge">${allRecords.length} results</span>`;
            } else {
                statusRow.style.display = 'none';
            }
        }

        function createRecordCard(record) {
            const card = document.createElement('div');
            card.className = 'record-card';
            
            const genre = extractGenreFromLocation(record.location);
            const locationDisplay = formatLocationDisplay(record.location);
            const combinedCondition = getCombinedCondition(record.condition_disc_id, record.condition_sleeve_id);
            const alreadyInCart = cart.items.some(item => item.copyId === record.id);
            
            const imageHtml = record.image_url ? 
                `<img src="${record.image_url}" alt="${record.title}" onerror="this.parentElement.classList.add('default-bg'); this.style.display='none';">` : '';
            
            let innerHtml = `
                <div class="record-card-image ${!record.image_url ? 'default-bg' : ''}">
                    ${imageHtml || '<i class="fas fa-music"></i>'}
                </div>
                <div class="record-card-info">
                    <div class="record-card-artist">${escapeHtml(record.artist)}</div>
                    <div class="record-card-title">${escapeHtml(record.title)}</div>
                    <div class="record-card-price">$${parseFloat(record.store_price).toFixed(2)}</div>
                    <div>
                        <span class="record-card-condition">${escapeHtml(combinedCondition)}</span>
                        ${alreadyInCart ? '<span class="in-cart-badge"><i class="fas fa-check"></i> In Cart</span>' : ''}
                    </div>
            `;
            
            if (genre) {
                innerHtml += `<div class="record-card-genre"><i class="fas fa-music"></i> ${escapeHtml(genre)}</div>`;
            }
            
            innerHtml += `<div class="record-card-location"><i class="fas fa-map-marker-alt"></i> ${escapeHtml(locationDisplay)}</div>`;
            innerHtml += `</div>`;
            
            card.innerHTML = innerHtml;
            card.addEventListener('click', () => showRecordModal(record));
            return card;
        }

        function showRecordModal(record) {
            const alreadyInCart = cart.items.some(item => item.copyId === record.id);
            const genre = extractGenreFromLocation(record.location);
            const locationDisplay = formatLocationDisplay(record.location);
            const discCondition = getConditionDisplayName(record.condition_disc_id);
            const sleeveCondition = getConditionDisplayName(record.condition_sleeve_id);
            
            const modal = document.createElement('div');
            modal.className = 'record-modal-overlay';
            const imageHtml = record.image_url ? `<img src="${record.image_url}" alt="${record.title}">` : '<i class="fas fa-music" style="font-size: 64px;"></i>';
            
            let detailsHtml = `
                <div class="detail-row"><span class="detail-label">Disc:</span><span>${escapeHtml(discCondition)}</span></div>
                <div class="detail-row"><span class="detail-label">Sleeve:</span><span>${escapeHtml(sleeveCondition)}</span></div>
            `;
            if (genre) {
                detailsHtml += `<div class="detail-row"><span class="detail-label">Genre:</span><span>${escapeHtml(genre)}</span></div>`;
            }
            detailsHtml += `<div class="detail-row"><span class="detail-label">Location:</span><span>${escapeHtml(locationDisplay)}</span></div>`;
            
            modal.innerHTML = `
                <div class="record-modal">
                    <div class="record-modal-header">
                        <h3>${escapeHtml(record.artist)}</h3>
                        <button class="record-modal-close">&times;</button>
                    </div>
                    <div class="record-modal-image ${!record.image_url ? 'default-bg' : ''}">${imageHtml}</div>
                    <div class="record-modal-info">
                        <div class="record-modal-title">${escapeHtml(record.title)}</div>
                        <div class="record-modal-details">
                            ${detailsHtml}
                        </div>
                        <div class="record-modal-price">$${parseFloat(record.store_price).toFixed(2)}</div>
                        <div class="record-modal-actions">
                            <button class="add-to-cart-modal-btn" ${alreadyInCart ? 'disabled' : ''}><i class="fas ${alreadyInCart ? 'fa-check' : 'fa-cart-plus'}"></i> ${alreadyInCart ? 'In Cart' : 'Add to Cart'}</button>
                            <button class="close-modal-btn">Close</button>
                        </div>
                    </div>
                </div>
            `;
            
            document.body.appendChild(modal);
            modal.querySelector('.record-modal-close').onclick = () => modal.remove();
            modal.querySelector('.close-modal-btn').onclick = () => modal.remove();
            modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
            
            const addBtn = modal.querySelector('.add-to-cart-modal-btn');
            if (addBtn && !addBtn.disabled) {
                addBtn.onclick = () => { addToCart(record); modal.remove(); };
            }
        }

        function addToCart(record) {
            if (cart.items.some(item => item.copyId === record.id)) {
                showNotification('Already in cart', 'error');
                return;
            }
            const combinedCondition = getCombinedCondition(record.condition_disc_id, record.condition_sleeve_id);
            cart.items.push({
                copyId: record.id, title: record.title, artist: record.artist,
                condition: combinedCondition,
                price: parseFloat(record.store_price), image_url: record.image_url,
                location: formatLocationDisplay(record.location), quantity: 1
            });
            cart.total = cart.items.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            saveCart();
            showNotification(`Added ${record.title} to cart!`, 'success');
            displayRecords(allRecords);
        }
        
        function removeFromCart(index) {
            cart.items.splice(index, 1);
            cart.total = cart.items.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            saveCart();
            showNotification('Removed from cart', 'success');
            if (cart.items.length === 0) closeCartDrawer();
            displayRecords(allRecords);
        }
        
        function saveCart() { localStorage.setItem('pigstyle_cart', JSON.stringify(cart)); updateCartDisplay(); }
        function loadCart() { const saved = localStorage.getItem('pigstyle_cart'); if (saved) { cart = JSON.parse(saved); updateCartDisplay(); } }
        
        function updateCartDisplay() {
            const count = cart.items.reduce((sum, item) => sum + item.quantity, 0);
            document.getElementById('cartBadge').textContent = count;
            document.getElementById('cartToggleContainer').style.display = count > 0 ? 'block' : 'none';
            updateCartDrawer();
        }
        
        function updateCartDrawer() {
            const itemsDiv = document.getElementById('cartItems'); 
            const footer = document.getElementById('cartFooter'); 
            if(cart.items.length===0){ 
                itemsDiv.innerHTML='<div class="empty-cart-message"><i class="fas fa-shopping-bag"></i><p>Your cart is empty</p></div>'; 
                footer.style.display='none'; 
                return; 
            } 
            let subtotal = cart.items.reduce((s,i)=>s+(i.price*i.quantity),0); 
            let taxAmt = subtotal * (taxRate/100); 
            let html = `
                <table class="cart-items-table">
                    <thead><tr><th>Item</th><th>Price</th><th>Qty</th><th>Total</th><th></th></tr></thead>
                    <tbody>
            `;
            cart.items.forEach((item, idx) => {
                html += `<tr><td><strong>${escapeHtml(item.artist)} - ${escapeHtml(item.title)}</strong><br><small>${item.condition}</small><br><small><i class="fas fa-map-marker-alt"></i> ${escapeHtml(item.location)}</small></td><td>$${item.price.toFixed(2)}</td><td>${item.quantity}</td><td>$${(item.price * item.quantity).toFixed(2)}</td><td><button class="remove-item-btn" onclick="removeFromCart(${idx})"><i class="fas fa-trash"></i></button></td></tr>`;
            });
            html += `</tbody></table><div style="margin-top:15px"><div>Subtotal: $${subtotal.toFixed(2)}</div><div>Tax: $${taxAmt.toFixed(2)}</div><div><strong>Total: $${(subtotal + taxAmt).toFixed(2)}</strong></div><button class="checkout-btn" id="checkoutBtn">Proceed to Checkout</button></div>`;
            itemsDiv.innerHTML = html;
            footer.style.display = 'block';
            document.getElementById('checkoutBtn')?.addEventListener('click', showCheckoutModal);
        }
        
        function showNotification(msg, type) {
            const n = document.createElement('div');
            n.className = 'notification';
            n.textContent = msg;
            n.style.background = type === 'error' ? '#dc3545' : '#28a745';
            document.body.appendChild(n);
            setTimeout(() => n.remove(), 3000);
        }
        
        function openCartDrawer() { document.getElementById('cartDrawer').classList.add('open'); document.getElementById('cartOverlay').classList.add('active'); updateCartDrawer(); }
        function closeCartDrawer() { document.getElementById('cartDrawer').classList.remove('open'); document.getElementById('cartOverlay').classList.remove('active'); }
        
        function escapeHtml(text) { 
            if(!text) return ''; 
            const div = document.createElement('div'); 
            div.textContent = text; 
            return div.innerHTML; 
        }
        
        function debounce(fn, delay) { 
            let t; 
            return function(...a){ 
                clearTimeout(t); 
                setTimeout(()=>fn(...a), delay); 
            }; 
        }

        // CHECKOUT MODAL WITH SHIPPING VS WALK-IN
        function showCheckoutModal() {
            closeCartDrawer();
            const subtotal = cart.total;
            const taxAmount = subtotal * (taxRate / 100);
            const baseTotal = subtotal + taxAmount;
            const modal = document.createElement('div');
            modal.className = 'checkout-modal-overlay';
            modal.innerHTML = `<div class="checkout-modal"><div class="checkout-modal-header" style="padding:20px;background:#2c3e50;color:white;display:flex;justify-content:space-between"><h3>Checkout</h3><button class="checkout-modal-close" style="background:none;border:none;color:white;font-size:24px">&times;</button></div><div style="padding:20px"><div>Subtotal: $${subtotal.toFixed(2)}</div><div>Tax: $${taxAmount.toFixed(2)}</div><div><strong>Total: $${baseTotal.toFixed(2)}</strong></div><div style="margin:20px 0"><label><input type="radio" name="type" value="pickup" checked> In-Store Pickup</label><label style="margin-left:20px"><input type="radio" name="type" value="shipping"> Ship to Me ($${shippingCost.toFixed(2)} shipping)</label></div><div id="shippingFields" style="display:none"><input type="text" id="shippingName" placeholder="Full Name" style="width:100%;padding:8px;margin:5px 0"><input type="email" id="shippingEmail" placeholder="Email" style="width:100%;padding:8px;margin:5px 0"><input type="text" id="shippingAddress" placeholder="Address" style="width:100%;padding:8px;margin:5px 0"><input type="text" id="shippingCity" placeholder="City" style="width:100%;padding:8px;margin:5px 0"><input type="text" id="shippingZip" placeholder="ZIP" style="width:100%;padding:8px;margin:5px 0"></div><div id="pickupFields"><input type="text" id="pickupName" placeholder="Your Name" style="width:100%;padding:8px;margin:5px 0"><input type="email" id="pickupEmail" placeholder="Email" style="width:100%;padding:8px;margin:5px 0"></div><button id="confirmCheckoutBtn" style="width:100%;padding:12px;background:#28a745;color:white;border:none;border-radius:6px;margin-top:20px">Continue to Payment</button></div></div>`;
            document.body.appendChild(modal);
            const closeBtn = modal.querySelector('.checkout-modal-close');
            closeBtn.onclick = () => modal.remove();
            const radios = modal.querySelectorAll('input[name="type"]');
            const shippingFields = modal.querySelector('#shippingFields');
            const pickupFields = modal.querySelector('#pickupFields');
            radios.forEach(r => r.onchange = () => { shippingFields.style.display = r.value === 'shipping' ? 'block' : 'none'; pickupFields.style.display = r.value === 'pickup' ? 'block' : 'none'; });
            modal.querySelector('#confirmCheckoutBtn').onclick = async () => {
                const isShipping = modal.querySelector('input[value="shipping"]').checked;
                let customerName, customerEmail;
                if (isShipping) {
                    customerName = modal.querySelector('#shippingName').value.trim();
                    customerEmail = modal.querySelector('#shippingEmail').value.trim();
                    if (!customerName || !customerEmail) { showNotification('Please fill all fields', 'error'); return; }
                } else {
                    customerName = modal.querySelector('#pickupName').value.trim();
                    customerEmail = modal.querySelector('#pickupEmail').value.trim();
                    if (!customerName) { showNotification('Please enter your name', 'error'); return; }
                }
                const finalTotal = isShipping ? baseTotal + shippingCost : baseTotal;
                const response = await fetch(`${AppConfig.baseUrl}/api/checkout/process`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ items: cart.items.map(i => ({ copy_id: i.copyId, title: i.title, artist: i.artist, price: i.price, condition: i.condition, quantity: i.quantity })), item_type: 'record', shipping: { method: isShipping ? 'shipping' : 'pickup', amount: isShipping ? shippingCost : 0 }, subtotal: subtotal, total: finalTotal, tax: taxAmount, customer_name: customerName, customer_email: customerEmail })
                });
                const data = await response.json();
                if (data.status === 'success' && data.checkout_url) window.location.href = data.checkout_url;
                else showNotification('Checkout failed', 'error');
            };
            modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
        }
        
        document.addEventListener('DOMContentLoaded', async () => {
            shippingCost = parseFloat(await getConfigValue('SHIPPING_COST')) || 0;
            taxRate = parseFloat(await getConfigValue('TAX_RATE')) || 0;
            loadCart();
            await loadCatalogData();
            document.getElementById('cartToggle')?.addEventListener('click', openCartDrawer);
            document.getElementById('closeCartDrawer')?.addEventListener('click', closeCartDrawer);
            document.getElementById('cartOverlay')?.addEventListener('click', closeCartDrawer);
            document.getElementById('clearAllFiltersBtn')?.addEventListener('click', () => { selectedGenres = []; currentSearchTerm = ''; newArrivalsActive = true; newVinylActive = false; currentPage = 1; document.getElementById('searchBox').value = ''; document.querySelectorAll('#genreList input').forEach(cb => cb.checked = false); loadCatalogData(); });
            document.getElementById('newArrivalsBtn')?.addEventListener('click', () => { newArrivalsActive = !newArrivalsActive; currentPage = 1; loadCatalogData(); });
            document.getElementById('newVinylBtn')?.addEventListener('click', () => { newVinylActive = !newVinylActive; currentPage = 1; loadCatalogData(); });
            document.getElementById('searchBox')?.addEventListener('input', debounce(() => loadCatalogData(), 500));
            const genreBtn = document.getElementById('genreFilterBtn');
            const genreDropdown = document.getElementById('genreDropdown');
            genreBtn?.addEventListener('click', (e) => { e.stopPropagation(); genreDropdown.classList.toggle('show'); });
            document.addEventListener('click', (e) => { if (!genreDropdown?.contains(e.target) && e.target !== genreBtn) genreDropdown?.classList.remove('show'); });
            document.getElementById('selectAllGenres')?.addEventListener('click', () => { document.querySelectorAll('#genreList input').forEach(cb => cb.checked = true); });
            document.getElementById('clearAllGenres')?.addEventListener('click', () => { document.querySelectorAll('#genreList input').forEach(cb => cb.checked = false); });
            document.getElementById('applyGenres')?.addEventListener('click', () => { selectedGenres = Array.from(document.querySelectorAll('#genreList input:checked')).map(cb => cb.value); genreDropdown.classList.remove('show'); currentPage = 1; loadCatalogData(); });
            window.removeFromCart = removeFromCart;
        });
    </script>
</body>
</html>
