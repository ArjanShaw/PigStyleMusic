<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Portrait-only viewport + fullscreen kiosk settings -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover, shrink-to-fit=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="icon" href="/static/images/PigStyle.ico">
    <title>PigStyle Kiosk · Portrait Mode</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* Fullscreen lock - force portrait orientation */
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #000;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            position: relative;
            height: 100%;
        }

        /* Landscape warning overlay - prevents usage in landscape */
        .orientation-warning {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 9999;
            display: none;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
            flex-direction: column;
            gap: 20px;
        }
        
        .orientation-warning i {
            font-size: 60px;
            color: #ffcd7e;
        }
        
        .orientation-warning p {
            font-size: 20px;
            padding: 20px;
            max-width: 80%;
        }
        
        /* Show warning in landscape */
        @media (orientation: landscape) {
            .orientation-warning {
                display: flex;
            }
            .splash-screen, .results-view {
                display: none;
            }
        }

        /* ===== BACKGROUND LAYER ===== */
        .background-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
        }
        .background-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .background-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 1;
        }

        /* ===== SPLASH SCREEN - PIG FITS WIDTH, NO CROPPING ===== */
        .splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1000;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1), visibility 0.5s;
            opacity: 1;
            visibility: visible;
        }
        .splash-screen.hide-splash {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        /* PIG CONTAINER - fits width, maintains aspect ratio, centered vertically */
        .pig-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        
        .pig-image {
            width: 100%;
            max-width: 100%;
            height: auto;
            object-fit: contain;
            display: block;
        }
        
        /* Using img tag for better control */
        .pig-img {
            width: 100%;
            height: auto;
            max-height: 100%;
            object-fit: contain;
        }

        /* Overlay touch zone with text printed ON the pig */
        .touch-overlay {
            position: absolute;
            bottom: 8%;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 10;
            pointer-events: none;
        }
        
        .touch-badge {
            display: inline-flex;
            align-items: center;
            gap: 14px;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(14px);
            padding: 14px 28px;
            border-radius: 80px;
            border: 2px solid rgba(255, 215, 100, 0.9);
            box-shadow: 0 8px 25px rgba(0,0,0,0.5);
            animation: gentleGlow 1.8s infinite ease-in-out;
        }
        
        .touch-badge i {
            font-size: 32px;
            color: #ffcd7e;
        }
        
        .touch-badge span {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #FFE6B0, #FFB347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 1px 2px rgba(0,0,0,0.3);
        }
        
        @keyframes gentleGlow {
            0% { transform: scale(1); box-shadow: 0 8px 25px rgba(0,0,0,0.5), 0 0 0 2px rgba(255,215,100,0.3); }
            50% { transform: scale(1.03); box-shadow: 0 12px 30px rgba(0,0,0,0.7), 0 0 0 4px rgba(255,215,100,0.7); }
            100% { transform: scale(1); box-shadow: 0 8px 25px rgba(0,0,0,0.5), 0 0 0 2px rgba(255,215,100,0.3); }
        }

        /* ===== MAIN INVENTORY VIEW (PORTRAIT OPTIMIZED) ===== */
        .results-view {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.4s ease, visibility 0s linear 0.4s;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 0;
            padding-top: 80px;
            padding-bottom: 70px;
        }
        .results-view.active-view {
            opacity: 1;
            visibility: visible;
            transition: opacity 0.4s ease, visibility 0s linear 0s;
        }

        .search-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(10, 10, 16, 0.96);
            backdrop-filter: blur(16px);
            padding: 12px 20px;
            z-index: 150;
            box-shadow: 0 4px 18px rgba(0,0,0,0.5);
            border-bottom: 1px solid rgba(255,210,90,0.3);
        }
        .search-input-wrapper {
            position: relative;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
        }
        .search-input-wrapper i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #ffcd7e;
            font-size: 18px;
        }
        .search-input {
            width: 100%;
            height: 48px;
            padding: 0 16px 0 48px;
            font-size: 18px;
            border: none;
            border-radius: 40px;
            background: #2a2a2f;
            color: white;
            font-family: inherit;
        }
        .search-input:focus {
            outline: none;
            background: #35353e;
            box-shadow: 0 0 0 2px #ffcd7e;
        }

        .results-grid-container {
            padding: 12px 20px 30px 20px;
        }
        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 16px;
        }
        
        .record-card {
            background: rgba(22, 22, 30, 0.94);
            backdrop-filter: blur(4px);
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.12s ease;
            border: 1px solid rgba(255,210,90,0.2);
        }
        .record-card:active {
            transform: scale(0.97);
        }
        .card-image {
            width: 100%;
            aspect-ratio: 1;
            background: #1f1f2a;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .default-record-bg {
            background: linear-gradient(145deg, #3a2c4a, #1e1a2f);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .default-record-bg i {
            font-size: 48px;
            color: #ffcd7e;
        }
        .card-info {
            padding: 12px;
        }
        .card-artist {
            font-size: 13px;
            font-weight: 600;
            color: #ccc;
            margin-bottom: 5px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .card-title {
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 8px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .card-price {
            font-size: 16px;
            font-weight: 700;
            color: #9bffb0;
            margin-bottom: 8px;
        }
        .location-badge {
            display: inline-block;
            background: #2b422b;
            color: #c0ffb0;
            padding: 6px 10px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 600;
            width: 100%;
            text-align: center;
        }
        .location-badge i {
            margin-right: 6px;
            font-size: 10px;
        }
        .no-results, .loading-spinner {
            text-align: center;
            padding: 60px 20px;
        }
        .no-results i, .loading-spinner i {
            font-size: 56px;
            color: #ffcd7e;
            margin-bottom: 16px;
        }
        .loading-spinner i {
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .reset-kiosk-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(12px);
            border-radius: 50px;
            padding: 10px 18px;
            z-index: 200;
            border: 1px solid #ffcd7e;
            color: #ffcd7e;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .reset-kiosk-btn:active {
            background: #ffcd7e20;
            transform: scale(0.96);
        }
    </style>
</head>
<body>

<!-- Landscape orientation warning -->
<div class="orientation-warning" id="orientationWarning">
    <i class="fas fa-rotate"></i>
    <p>Please rotate your device to PORTRAIT mode for the best experience</p>
    <i class="fas fa-mobile-alt"></i>
</div>

<!-- BACKGROUND IMAGE (fallback) -->
<div class="background-container">
    <img src="/static/images/background.png" alt="Store Background" class="background-image" id="bgImage">
    <div class="background-overlay"></div>
</div>

<!-- SPLASH SCREEN: PIG FITS WIDTH ONLY -->
<div class="splash-screen" id="splashScreen">
    <div class="pig-container" id="pigFullscreenBtn">
        <img src="/static/images/PigStyle.ico" alt="PigStyle Records" class="pig-img" id="pigImage">
        <!-- "Touch to Search" printed directly ON the pig -->
        <div class="touch-overlay">
            <div class="touch-badge">
                <i class="fas fa-hand-peace"></i>
                <span>TOUCH TO SEARCH</span>
                <i class="fas fa-search"></i>
            </div>
        </div>
    </div>
</div>

<!-- MAIN INVENTORY VIEW -->
<div class="results-view" id="resultsView">
    <div class="search-header">
        <div class="search-input-wrapper">
            <i class="fas fa-search"></i>
            <input type="text" class="search-input" id="searchInput" placeholder="Artist or album name..." autocomplete="off">
        </div>
    </div>
    <div class="results-grid-container" id="resultsContainer">
        <div class="loading-spinner">
            <i class="fas fa-spinner"></i>
            <p>Loading vinyl collection...</p>
        </div>
    </div>
    <div class="reset-kiosk-btn" id="resetKioskBtn">
        <i class="fas fa-arrow-rotate-left"></i> 
        <span>START OVER</span>
    </div>
</div>

<script src="/static/js/app-config.js"></script>
<script src="/static/js/config-value-manager.js"></script>

<script>
    (function() {
        // ========== FULLSCREEN MANAGEMENT - PERSISTENT ==========
        let isFullscreen = false;
        
        function enterFullscreen() {
            const docEl = document.documentElement;
            const requestMethod = docEl.requestFullscreen || docEl.webkitRequestFullscreen || docEl.msRequestFullscreen;
            if (requestMethod) {
                requestMethod.call(docEl).catch(err => {
                    console.log('Fullscreen error:', err);
                    setTimeout(() => {
                        if (!isFullscreen) enterFullscreen();
                    }, 500);
                }).then(() => {
                    isFullscreen = true;
                    console.log('[Kiosk] Fullscreen mode active');
                });
            }
        }
        
        function handleFullscreenChange() {
            isFullscreen = !!(document.fullscreenElement || document.webkitFullscreenElement);
            if (!isFullscreen) {
                console.log('[Kiosk] Fullscreen lost - re-entering');
                setTimeout(() => {
                    enterFullscreen();
                }, 50);
            }
        }
        
        document.addEventListener('fullscreenchange', handleFullscreenChange);
        document.addEventListener('webkitfullscreenchange', handleFullscreenChange);
        
        function enforceFullscreen() {
            if (!isFullscreen) {
                enterFullscreen();
            }
        }
        
        document.body.addEventListener('touchstart', enforceFullscreen, { passive: true });
        document.body.addEventListener('click', enforceFullscreen, { passive: true });
        
        setInterval(() => {
            if (!isFullscreen && (document.visibilityState === 'visible')) {
                enterFullscreen();
            }
        }, 2000);
        
        setTimeout(() => enterFullscreen(), 100);
        setTimeout(() => enterFullscreen(), 500);
        setTimeout(() => enterFullscreen(), 1000);
        
        document.addEventListener('contextmenu', (e) => e.preventDefault());
        
        window.addEventListener('keydown', (e) => {
            if (e.key === 'F11' || e.key === 'Escape') {
                e.preventDefault();
                setTimeout(() => enterFullscreen(), 10);
            }
        });
        
        // ========== PORTRAIT ORIENTATION ENFORCEMENT ==========
        function checkOrientation() {
            const warning = document.getElementById('orientationWarning');
            if (window.matchMedia("(orientation: landscape)").matches) {
                if (warning) warning.style.display = 'flex';
                // Optionally hide other content
            } else {
                if (warning) warning.style.display = 'none';
            }
        }
        
        window.addEventListener('resize', checkOrientation);
        window.addEventListener('orientationchange', checkOrientation);
        checkOrientation();
        
        // ========== FIX BACKGROUND IMAGE ==========
        const bgImg = document.getElementById('bgImage');
        if (bgImg) {
            bgImg.onerror = function() {
                console.warn('[Kiosk] background.png not found - using fallback');
                const bgContainer = document.querySelector('.background-container');
                if (bgContainer) {
                    bgContainer.style.background = 'linear-gradient(145deg, #1a1a2a, #0a0a12)';
                }
                this.style.display = 'none';
            };
            bgImg.onload = () => console.log('[Kiosk] background.png loaded');
        }
        
        // Fix pig image loading
        const pigImage = document.getElementById('pigImage');
        if (pigImage) {
            pigImage.onerror = function() {
                console.warn('[Kiosk] PigStyle.ico not found');
                this.style.display = 'none';
            };
        }
        
        // ========== AUTO-RESET AFTER 60 SECONDS ==========
        let idleTimer = null;
        const INACTIVITY_LIMIT = 60000;
        
        function fullResetToStart() {
            if (searchInput) searchInput.value = '';
            if (inventoryLoaded && allRecords.length) {
                filteredRecords = [...allRecords];
                displayRecords(filteredRecords);
            }
            showSplashScreen();
            if (document.activeElement === searchInput) searchInput.blur();
            resetIdleTimer();
            setTimeout(() => enterFullscreen(), 50);
        }
        
        function resetIdleTimer() {
            if (idleTimer) clearTimeout(idleTimer);
            idleTimer = setTimeout(() => {
                const isInventoryActive = resultsViewEl.classList.contains('active-view');
                const isSplashHidden = splashEl.classList.contains('hide-splash');
                if (isInventoryActive && isSplashHidden) {
                    console.log('[Kiosk] Auto-reset after 60s inactivity');
                    fullResetToStart();
                }
            }, INACTIVITY_LIMIT);
        }
        
        const activityEvents = ['touchstart', 'touchend', 'click', 'input', 'scroll'];
        activityEvents.forEach(ev => document.addEventListener(ev, resetIdleTimer, { passive: true }));
        
        // ========== GLOBALS ==========
        let allRecords = [];
        let filteredRecords = [];
        
        const splashEl = document.getElementById('splashScreen');
        const resultsViewEl = document.getElementById('resultsView');
        const searchInput = document.getElementById('searchInput');
        const resultsContainer = document.getElementById('resultsContainer');
        const pigBtn = document.getElementById('pigFullscreenBtn');
        const resetBtn = document.getElementById('resetKioskBtn');
        
        let inventoryLoaded = false;
        let isLoadingAttempt = false;
        
        function showSplashScreen() {
            if (searchInput) searchInput.value = '';
            resultsViewEl.classList.remove('active-view');
            splashEl.classList.remove('hide-splash');
            if (allRecords.length) {
                filteredRecords = [...allRecords];
                displayRecords(filteredRecords);
            }
            enforceFullscreen();
        }
        
        function showInventoryView() {
            splashEl.classList.add('hide-splash');
            resultsViewEl.classList.add('active-view');
            if (!inventoryLoaded && !isLoadingAttempt) {
                loadRecords();
            } else if (inventoryLoaded && allRecords.length > 0) {
                if (searchInput.value.trim() === '') {
                    filteredRecords = [...allRecords];
                    displayRecords(filteredRecords);
                } else {
                    filterRecords(searchInput.value);
                }
            }
            resetIdleTimer();
            enforceFullscreen();
        }
        
        // LOAD INVENTORY
        async function loadRecords() {
            if (isLoadingAttempt) return;
            isLoadingAttempt = true;
            showLoading();
            try {
                let baseUrl = '';
                if (typeof AppConfig !== 'undefined' && AppConfig.baseUrl) {
                    baseUrl = AppConfig.baseUrl;
                }
                const url = `${baseUrl}/catalog/records`;
                console.log('[Kiosk] Fetching:', url);
                const response = await fetch(url);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                if (data.status === 'success' && Array.isArray(data.records)) {
                    allRecords = data.records;
                    filteredRecords = [...allRecords];
                    inventoryLoaded = true;
                    displayRecords(filteredRecords);
                } else {
                    throw new Error(data.message || 'Invalid data');
                }
            } catch (err) {
                console.error(err);
                resultsContainer.innerHTML = `
                    <div class="no-results">
                        <i class="fas fa-exclamation-triangle"></i>
                        <p>Unable to load collection.<br>${escapeHtml(err.message)}</p>
                        <button id="retryLoadBtn" style="margin-top:20px; padding:12px 28px; background:#ffcd7e; border:none; border-radius:50px; color:#1e1e2a; font-weight:bold; cursor:pointer;">⟳ RETRY</button>
                    </div>
                `;
                const retry = document.getElementById('retryLoadBtn');
                if (retry) retry.addEventListener('click', () => { isLoadingAttempt = false; loadRecords(); }, { once: true });
            } finally {
                isLoadingAttempt = false;
            }
        }
        
        function showLoading() {
            resultsContainer.innerHTML = `<div class="loading-spinner"><i class="fas fa-spinner"></i><p>Digging through crates...</p></div>`;
        }
        
        function displayRecords(records) {
            if (!records || records.length === 0) {
                resultsContainer.innerHTML = `<div class="no-results"><i class="fas fa-search"></i><p>No matching records found.</p><p style="font-size:14px; margin-top:8px;">Try a different artist or album.</p></div>`;
                return;
            }
            let html = '<div class="results-grid">';
            for (let rec of records) {
                const imageUrl = rec.image_url ? rec.image_url : null;
                let imageHtml = '';
                let imageClass = 'card-image';
                if (imageUrl && imageUrl.trim() !== '') {
                    imageHtml = `<img src="${escapeHtml(imageUrl)}" alt="${escapeHtml(rec.title)}" onerror="this.parentElement.innerHTML='<i class=\\'fas fa-record-vinyl\\'></i>'; this.parentElement.classList.add('default-record-bg');">`;
                } else {
                    imageHtml = `<i class="fas fa-record-vinyl"></i>`;
                    imageClass = 'card-image default-record-bg';
                }
                const artist = escapeHtml(rec.artist || 'Unknown Artist');
                const title = escapeHtml(rec.title || 'Untitled');
                const location = escapeHtml(rec.location || 'Ask staff');
                let priceDisplay = 'Call for price';
                if (rec.store_price && typeof rec.store_price === 'number') priceDisplay = `$${rec.store_price.toFixed(2)}`;
                else if (rec.store_price && !isNaN(parseFloat(rec.store_price))) priceDisplay = `$${parseFloat(rec.store_price).toFixed(2)}`;
                html += `<div class="record-card"><div class="${imageClass}">${imageHtml}</div><div class="card-info"><div class="card-artist">${artist}</div><div class="card-title">${title}</div><div class="card-price">${priceDisplay}</div><div class="location-badge"><i class="fas fa-map-marker-alt"></i> ${location}</div></div></div>`;
            }
            html += '</div>';
            resultsContainer.innerHTML = html;
        }
        
        function filterRecords(searchTerm) {
            if (!searchTerm || searchTerm.trim() === '') filteredRecords = [...allRecords];
            else {
                const term = searchTerm.toLowerCase().trim();
                filteredRecords = allRecords.filter(r => (r.artist || '').toLowerCase().includes(term) || (r.title || '').toLowerCase().includes(term));
            }
            displayRecords(filteredRecords);
        }
        
        let debounce;
        searchInput.addEventListener('input', (e) => {
            if (!inventoryLoaded) return;
            clearTimeout(debounce);
            debounce = setTimeout(() => filterRecords(e.target.value), 280);
            resetIdleTimer();
        });
        
        function escapeHtml(str) { 
            if (!str) return ''; 
            return String(str).replace(/[&<>]/g, function(m) { 
                if (m === '&') return '&amp;'; 
                if (m === '<') return '&lt;'; 
                if (m === '>') return '&gt;'; 
                return m; 
            }); 
        }
        
        // Event listeners
        if (pigBtn) {
            pigBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                showInventoryView();
                resetIdleTimer();
                enforceFullscreen();
            });
        }
        
        splashEl.addEventListener('click', (e) => {
            if (e.target === splashEl || splashEl.contains(e.target)) {
                showInventoryView();
                resetIdleTimer();
                enforceFullscreen();
            }
        });
        
        if (resetBtn) {
            resetBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                fullResetToStart();
                resetIdleTimer();
                enforceFullscreen();
            });
        }
        
        resultsViewEl.addEventListener('scroll', () => resetIdleTimer(), { passive: true });
        
        // Initial state
        resultsViewEl.classList.remove('active-view');
        splashEl.classList.remove('hide-splash');
        resetIdleTimer();
        
        console.log('[Kiosk] Portrait mode only — pig fits width, persistent fullscreen, auto-reset 60s');
    })();
</script>
</body>
</html>
