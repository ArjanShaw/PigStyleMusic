<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Kiosk fullscreen meta: hides address bar on mobile, prevents zoom/scroll -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover, shrink-to-fit=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="icon" href="/static/images/PigStyle.ico">
    <title>PigStyle Kiosk · Touch to Search</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        /* RESET & FULLSCREEN LOCKDOWN */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* disable body scroll & address bar hiding */
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #121212;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #fff;
        }

        body {
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            position: relative;
            height: 100%;
            touch-action: pan-y pinch-zoom;
        }

        /* Background image layer - fixed, no scroll */
        .background-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }
        .background-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .background-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.72);
        }

        /* ATTENTION SPLASH SCREEN (TOUCH TO SEARCH) */
        .splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1000;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.45s cubic-bezier(0.2, 0.9, 0.4, 1.1), visibility 0.45s;
            opacity: 1;
            visibility: visible;
        }
        .splash-screen.hide-splash {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .touch-card {
            background: rgba(10, 10, 18, 0.88);
            backdrop-filter: blur(16px);
            border-radius: 72px;
            width: 86%;
            max-width: 380px;
            padding: 2rem 1.8rem 2.4rem;
            text-align: center;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.6), 0 0 0 2px rgba(255, 200, 100, 0.35);
            border: 1px solid rgba(255, 210, 90, 0.5);
            animation: softPulse 1.6s infinite ease-in-out;
            cursor: pointer;
            transition: transform 0.2s ease, background 0.2s;
        }
        .touch-card:active {
            transform: scale(0.97);
        }
        @keyframes softPulse {
            0% { transform: scale(1); box-shadow: 0 30px 50px rgba(0,0,0,0.5), 0 0 0 2px rgba(255,210,90,0.25); }
            50% { transform: scale(1.02); box-shadow: 0 38px 60px rgba(0,0,0,0.7), 0 0 0 4px rgba(255,210,90,0.6); }
            100% { transform: scale(1); box-shadow: 0 30px 50px rgba(0,0,0,0.5), 0 0 0 2px rgba(255,210,90,0.25); }
        }

        /* PigStyle Icon instead of generic vinyl */
        .pig-icon-large {
            width: 100px;
            height: 100px;
            margin: 0 auto 18px;
            background-image: url('/static/images/PigStyle.ico');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            filter: drop-shadow(0 4px 12px rgba(0,0,0,0.5));
            display: inline-block;
        }
        .touch-card h2 {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #FFE6B0, #FFB347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 12px;
        }
        .touch-card p {
            font-size: 17px;
            color: #ddd;
            margin-bottom: 28px;
            font-weight: 500;
        }
        .big-touch-area {
            background: rgba(255, 200, 100, 0.12);
            border-radius: 60px;
            padding: 16px 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            border: 1px solid rgba(255, 190, 70, 0.5);
            backdrop-filter: blur(4px);
        }
        .big-touch-area i {
            font-size: 32px;
            color: #ffcd7e;
        }
        .big-touch-area span {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 2px;
            color: #FFE0A3;
        }
        .store-note {
            margin-top: 22px;
            font-size: 13px;
            color: #aaa;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        /* MAIN INVENTORY VIEW (Search + Results) */
        .results-view {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.35s ease, visibility 0s linear 0.35s;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 0;
            padding-top: 80px;
            padding-bottom: 70px;
        }
        .results-view.active-view {
            opacity: 1;
            visibility: visible;
            transition: opacity 0.4s ease, visibility 0s linear 0s;
        }

        /* Fixed search header */
        .search-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(18, 18, 26, 0.97);
            backdrop-filter: blur(16px);
            padding: 14px 20px;
            z-index: 150;
            box-shadow: 0 4px 18px rgba(0,0,0,0.5);
            border-bottom: 1px solid rgba(255,210,90,0.3);
        }
        .search-input-wrapper {
            position: relative;
            width: 100%;
        }
        .search-input-wrapper i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #ffcd7e;
            font-size: 18px;
        }
        .search-input {
            width: 100%;
            height: 52px;
            padding: 0 16px 0 48px;
            font-size: 18px;
            border: none;
            border-radius: 40px;
            background: #2a2a2f;
            color: white;
            font-family: inherit;
            transition: all 0.2s;
        }
        .search-input:focus {
            outline: none;
            background: #35353e;
            box-shadow: 0 0 0 2px #ffcd7e;
        }
        .search-input::placeholder {
            color: #aaa;
        }

        /* scrollable results grid */
        .results-grid-container {
            padding: 8px 20px 30px 20px;
        }
        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 18px;
            margin-top: 5px;
        }
        .record-card {
            background: rgba(22, 22, 30, 0.94);
            backdrop-filter: blur(4px);
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.12s ease, box-shadow 0.2s;
            border: 1px solid rgba(255,210,90,0.2);
        }
        .record-card:active {
            transform: scale(0.97);
        }
        .card-image {
            width: 100%;
            aspect-ratio: 1;
            background: #1f1f2a;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .default-record-bg {
            background: linear-gradient(145deg, #3a2c4a, #1e1a2f);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .default-record-bg i {
            font-size: 48px;
            color: #ffcd7e;
            opacity: 0.85;
        }
        .card-info {
            padding: 12px;
        }
        .card-artist {
            font-size: 13px;
            font-weight: 600;
            color: #ccc;
            margin-bottom: 5px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .card-title {
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 8px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .card-price {
            font-size: 16px;
            font-weight: 700;
            color: #9bffb0;
            margin-bottom: 8px;
        }
        .location-badge {
            display: inline-block;
            background: #2b422b;
            color: #c0ffb0;
            padding: 6px 10px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 600;
            width: 100%;
            text-align: center;
            box-sizing: border-box;
        }
        .location-badge i {
            margin-right: 6px;
            font-size: 10px;
        }
        .no-results, .loading-spinner {
            text-align: center;
            padding: 60px 20px;
        }
        .no-results i, .loading-spinner i {
            font-size: 56px;
            color: #ffcd7e;
            margin-bottom: 16px;
        }
        .loading-spinner i {
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        /* start over button */
        .reset-kiosk-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(12px);
            border-radius: 50px;
            padding: 10px 18px;
            z-index: 200;
            border: 1px solid #ffcd7e;
            color: #ffcd7e;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
        }
        .reset-kiosk-btn:active {
            background: #ffcd7e20;
            transform: scale(0.96);
        }

        @media (max-width: 768px) {
            .results-grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
                gap: 12px;
            }
            .touch-card h2 {
                font-size: 28px;
            }
            .big-touch-area span {
                font-size: 20px;
            }
            .pig-icon-large {
                width: 80px;
                height: 80px;
            }
        }
    </style>
</head>
<body>

<!-- BACKGROUND IMAGE (static/images/background.png) -->
<div class="background-container">
    <img src="/static/images/background.png" alt="PigStyle Background" class="background-image">
    <div class="background-overlay"></div>
</div>

<!-- SPLASH: ATTENTION GRABBING "TOUCH TO SEARCH" with PigStyle.ico -->
<div class="splash-screen" id="splashScreen">
    <div class="touch-card" id="touchToStartBtn">
        <div class="pig-icon-large"></div>
        <h2>PIGSTYLE RECORDS</h2>
        <p>Tap to explore the vinyl archive</p>
        <div class="big-touch-area">
            <i class="fas fa-hand-pointer"></i>
            <span>TOUCH TO SEARCH</span>
            <i class="fas fa-search"></i>
        </div>
        <div class="store-note">
            <i class="fas fa-shield-alt"></i> In-store kiosk · fullscreen mode
        </div>
    </div>
</div>

<!-- MAIN INVENTORY VIEW (search + catalog) -->
<div class="results-view" id="resultsView">
    <div class="search-header">
        <div class="search-input-wrapper">
            <i class="fas fa-search"></i>
            <input type="text" class="search-input" id="searchInput" placeholder="Artist or album name..." autocomplete="off">
        </div>
    </div>
    <div class="results-grid-container" id="resultsContainer">
        <div class="loading-spinner">
            <i class="fas fa-spinner"></i>
            <p>Loading vinyl collection...</p>
        </div>
    </div>
    <div class="reset-kiosk-btn" id="resetKioskBtn">
        <i class="fas fa-arrow-rotate-left"></i> 
        <span>START OVER</span>
    </div>
</div>

<script src="/static/js/app-config.js"></script>
<script src="/static/js/config-value-manager.js"></script>

<script>
    (function() {
        // ========== FULL KIOSK MODE: hide address bar, prevent navigation ==========
        function requestFullscreenIfNeeded() {
            const docEl = document.documentElement;
            if (docEl.requestFullscreen) {
                docEl.requestFullscreen().catch(() => {});
            } else if (docEl.webkitRequestFullscreen) {
                docEl.webkitRequestFullscreen();
            }
        }
        
        // On first touch, request fullscreen to hide address bar
        document.body.addEventListener('touchstart', function firstTouch() {
            requestFullscreenIfNeeded();
            document.body.removeEventListener('touchstart', firstTouch);
        }, { once: true });
        
        // Block context menu (long press)
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
            return false;
        });
        
        // ========== AUTO-RESET AFTER 60 SECONDS INACTIVITY ==========
        let idleTimer = null;
        const INACTIVITY_LIMIT = 60000; // 60 seconds
        
        // Function to reset the kiosk back to splash screen
        function fullResetToStart() {
            // Clear search input
            if (searchInput) searchInput.value = '';
            // If inventory loaded, reset filtered display
            if (inventoryLoaded && allRecords.length) {
                filteredRecords = [...allRecords];
                displayRecords(filteredRecords);
            }
            // Show splash screen, hide inventory view
            showSplashScreen();
            // Blur any focused input
            if (document.activeElement === searchInput) searchInput.blur();
            // Reset idle timer after returning to splash
            resetIdleTimer();
        }
        
        // Reset the inactivity timer (call on every user interaction)
        function resetIdleTimer() {
            if (idleTimer) clearTimeout(idleTimer);
            idleTimer = setTimeout(() => {
                // Only auto-reset if inventory view is ACTIVE (not already on splash)
                // and the splash screen is hidden (meaning user is browsing)
                const isInventoryActive = resultsViewEl.classList.contains('active-view');
                const isSplashHidden = splashEl.classList.contains('hide-splash');
                if (isInventoryActive && isSplashHidden) {
                    console.log('[Kiosk] Auto-reset after 60s inactivity — returning to splash screen');
                    fullResetToStart();
                }
            }, INACTIVITY_LIMIT);
        }
        
        // Listen to all relevant user interactions to reset timer
        const activityEvents = ['touchstart', 'touchend', 'click', 'input', 'scroll'];
        activityEvents.forEach(eventType => {
            document.addEventListener(eventType, resetIdleTimer, { passive: true });
        });
        
        // ========== GLOBALS ==========
        let allRecords = [];
        let filteredRecords = [];
        
        const splashEl = document.getElementById('splashScreen');
        const resultsViewEl = document.getElementById('resultsView');
        const searchInput = document.getElementById('searchInput');
        const resultsContainer = document.getElementById('resultsContainer');
        const touchCard = document.getElementById('touchToStartBtn');
        const resetBtn = document.getElementById('resetKioskBtn');
        
        let inventoryLoaded = false;
        let isLoadingAttempt = false;
        
        // Show splash screen (attention mode)
        function showSplashScreen() {
            if (searchInput) searchInput.value = '';
            resultsViewEl.classList.remove('active-view');
            splashEl.classList.remove('hide-splash');
            if (allRecords.length) {
                filteredRecords = [...allRecords];
                displayRecords(filteredRecords);
            }
        }
        
        // Show inventory view (search mode)
        function showInventoryView() {
            splashEl.classList.add('hide-splash');
            resultsViewEl.classList.add('active-view');
            if (!inventoryLoaded && !isLoadingAttempt) {
                loadRecords();
            } else if (inventoryLoaded && allRecords.length > 0) {
                if (searchInput.value.trim() === '') {
                    filteredRecords = [...allRecords];
                    displayRecords(filteredRecords);
                } else {
                    filterRecords(searchInput.value);
                }
            }
            // Reset timer when entering inventory view
            resetIdleTimer();
        }
        
        // LOAD INVENTORY (safe, same-origin)
        async function loadRecords() {
            if (isLoadingAttempt) return;
            isLoadingAttempt = true;
            showLoading();
            try {
                let baseUrl = '';
                if (typeof AppConfig !== 'undefined' && AppConfig.baseUrl) {
                    baseUrl = AppConfig.baseUrl;
                }
                const url = `${baseUrl}/catalog/records`;
                console.log('[Kiosk] Fetching inventory:', url);
                const response = await fetch(url);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                if (data.status === 'success' && Array.isArray(data.records)) {
                    allRecords = data.records;
                    filteredRecords = [...allRecords];
                    inventoryLoaded = true;
                    displayRecords(filteredRecords);
                } else {
                    throw new Error(data.message || 'Invalid data');
                }
            } catch (err) {
                resultsContainer.innerHTML = `
                    <div class="no-results">
                        <i class="fas fa-exclamation-triangle"></i>
                        <p>Unable to load collection.<br>${escapeHtml(err.message)}</p>
                        <button id="retryLoadBtn" style="margin-top: 20px; padding: 12px 28px; background: #ffcd7e; border: none; border-radius: 50px; color: #1e1e2a; font-weight: bold; cursor: pointer;">⟳ RETRY</button>
                    </div>
                `;
                const retryBtn = document.getElementById('retryLoadBtn');
                if (retryBtn) {
                    retryBtn.addEventListener('click', () => { isLoadingAttempt = false; loadRecords(); }, { once: true });
                }
            } finally {
                isLoadingAttempt = false;
            }
        }
        
        function showLoading() {
            resultsContainer.innerHTML = `<div class="loading-spinner"><i class="fas fa-spinner"></i><p>Digging through crates...</p></div>`;
        }
        
        function displayRecords(records) {
            if (!records || records.length === 0) {
                resultsContainer.innerHTML = `<div class="no-results"><i class="fas fa-search"></i><p>No matching records found.</p><p style="font-size:14px; margin-top:8px;">Try a different artist or album.</p></div>`;
                return;
            }
            let html = '<div class="results-grid">';
            for (let rec of records) {
                const imageUrl = rec.image_url ? rec.image_url : null;
                let imageHtml = '';
                let imageClass = 'card-image';
                if (imageUrl && imageUrl.trim() !== '') {
                    imageHtml = `<img src="${escapeHtml(imageUrl)}" alt="${escapeHtml(rec.title)}" onerror="this.parentElement.innerHTML='<i class=\\'fas fa-record-vinyl\\'></i>'; this.parentElement.classList.add('default-record-bg');">`;
                } else {
                    imageHtml = `<i class="fas fa-record-vinyl"></i>`;
                    imageClass = 'card-image default-record-bg';
                }
                const artist = escapeHtml(rec.artist || 'Unknown Artist');
                const title = escapeHtml(rec.title || 'Untitled');
                const location = escapeHtml(rec.location || 'Ask staff');
                let priceDisplay = 'Call for price';
                if (rec.store_price && typeof rec.store_price === 'number') priceDisplay = `$${rec.store_price.toFixed(2)}`;
                else if (rec.store_price && !isNaN(parseFloat(rec.store_price))) priceDisplay = `$${parseFloat(rec.store_price).toFixed(2)}`;
                html += `<div class="record-card"><div class="${imageClass}">${imageHtml}</div><div class="card-info"><div class="card-artist">${artist}</div><div class="card-title">${title}</div><div class="card-price">${priceDisplay}</div><div class="location-badge"><i class="fas fa-map-marker-alt"></i> ${location}</div></div></div>`;
            }
            html += '</div>';
            resultsContainer.innerHTML = html;
        }
        
        function filterRecords(searchTerm) {
            if (!searchTerm || searchTerm.trim() === '') {
                filteredRecords = [...allRecords];
            } else {
                const term = searchTerm.toLowerCase().trim();
                filteredRecords = allRecords.filter(r => (r.artist || '').toLowerCase().includes(term) || (r.title || '').toLowerCase().includes(term));
            }
            displayRecords(filteredRecords);
        }
        
        let debounce;
        searchInput.addEventListener('input', (e) => {
            if (!inventoryLoaded) return;
            clearTimeout(debounce);
            debounce = setTimeout(() => filterRecords(e.target.value), 280);
            resetIdleTimer(); // user typing resets timer
        });
        
        function escapeHtml(str) { 
            if (!str) return ''; 
            return String(str).replace(/[&<>]/g, function(m) { 
                if (m === '&') return '&amp;'; 
                if (m === '<') return '&lt'; 
                if (m === '>') return '&gt;'; 
                return m; 
            }); 
        }
        
        // ========== EVENT LISTENERS ==========
        if (touchCard) {
            touchCard.addEventListener('click', (e) => { 
                e.stopPropagation(); 
                showInventoryView(); 
                resetIdleTimer();
            });
        }
        if (splashEl) {
            splashEl.addEventListener('click', (e) => { 
                if (e.target === splashEl || splashEl.contains(e.target)) {
                    showInventoryView(); 
                    resetIdleTimer();
                }
            });
        }
        if (resetBtn) {
            resetBtn.addEventListener('click', (e) => { 
                e.stopPropagation(); 
                fullResetToStart(); 
                resetIdleTimer();
            });
        }
        
        // Additional scroll listener to keep timer alive while browsing
        resultsViewEl.addEventListener('scroll', () => resetIdleTimer(), { passive: true });
        
        // ========== INITIAL STATE ==========
        resultsViewEl.classList.remove('active-view');
        splashEl.classList.remove('hide-splash');
        
        // Start idle timer from beginning (splash screen counts as idle? We'll start timer but reset only matters when inventory active)
        resetIdleTimer();
        
        // Extra fullscreen attempt on any tap after load (keeps address bar hidden)
        const forceFullscreen = () => requestFullscreenIfNeeded();
        document.body.addEventListener('touchstart', forceFullscreen, { passive: true });
        
        console.log('[Kiosk] Ready — Touch to Search screen. Auto-reset to splash after 60 seconds inactivity.');
    })();
</script>
</body>
</html>
