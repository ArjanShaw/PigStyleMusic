<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <!-- All assets are local or HTTPS CDN — no mixed content warnings -->
    <link rel="icon" href="/static/images/PigStyle.ico">
    <title>Record Kiosk · PigStyle · Touch to Search</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* clean kiosk tap experience */
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #121212;
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ===== BACKGROUND LAYER (same background.png for both splash + inventory) ===== */
        .background-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }
        .background-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .background-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.72);
        }

        /* ===== ATTENTION SPLASH SCREEN ===== */
        .splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1000;
            background: transparent;  /* let background.png show through, only card overlay */
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.45s cubic-bezier(0.2, 0.9, 0.4, 1.1), visibility 0.45s;
            opacity: 1;
            visibility: visible;
        }
        .splash-screen.hide-splash {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        /* main glass card – elegant, attention grabbing */
        .touch-card {
            background: rgba(10, 10, 18, 0.88);
            backdrop-filter: blur(16px);
            border-radius: 72px;
            width: 86%;
            max-width: 380px;
            padding: 2rem 1.8rem 2.4rem;
            text-align: center;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.6), 0 0 0 2px rgba(255, 200, 100, 0.35);
            border: 1px solid rgba(255, 210, 90, 0.5);
            animation: softPulse 1.6s infinite ease-in-out;
            cursor: pointer;
            transition: transform 0.2s ease, background 0.2s;
        }
        .touch-card:active {
            transform: scale(0.97);
            background: rgba(6, 6, 12, 0.94);
        }
        @keyframes softPulse {
            0% { transform: scale(1); box-shadow: 0 30px 50px rgba(0,0,0,0.5), 0 0 0 2px rgba(255,210,90,0.25); }
            50% { transform: scale(1.02); box-shadow: 0 38px 60px rgba(0,0,0,0.7), 0 0 0 4px rgba(255,210,90,0.6); }
            100% { transform: scale(1); box-shadow: 0 30px 50px rgba(0,0,0,0.5), 0 0 0 2px rgba(255,210,90,0.25); }
        }

        /* PigStyle icon instead of vinyl icon */
        .pig-icon-large {
            width: 100px;
            height: 100px;
            margin: 0 auto 18px;
            background-image: url('/static/images/PigStyle.ico');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            filter: drop-shadow(0 4px 12px rgba(0,0,0,0.5));
            display: inline-block;
        }

        /* fallback if .ico has any weird rendering, we also add an emoji? but it's fine */
        .touch-card h2 {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #FFE6B0, #FFB347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 12px;
        }
        .touch-card p {
            font-size: 17px;
            color: #ddd;
            margin-bottom: 28px;
            font-weight: 500;
        }
        .big-touch-area {
            background: rgba(255, 200, 100, 0.12);
            border-radius: 60px;
            padding: 16px 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            border: 1px solid rgba(255, 190, 70, 0.5);
            backdrop-filter: blur(4px);
        }
        .big-touch-area i {
            font-size: 32px;
            color: #ffcd7e;
        }
        .big-touch-area span {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 2px;
            color: #FFE0A3;
        }
        .store-note {
            margin-top: 22px;
            font-size: 13px;
            color: #aaa;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        /* ===== MAIN INVENTORY VIEW (search + results) ===== */
        .results-view {
            padding: 20px;
            padding-top: 80px;
            padding-bottom: 40px;
            min-height: 100vh;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.35s ease, visibility 0s linear 0.35s;
        }
        .results-view.active-view {
            opacity: 1;
            visibility: visible;
            transition: opacity 0.4s ease, visibility 0s linear 0s;
        }
        .search-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(18, 18, 26, 0.96);
            backdrop-filter: blur(12px);
            padding: 14px 20px;
            z-index: 100;
            box-shadow: 0 4px 18px rgba(0,0,0,0.5);
            border-bottom: 1px solid rgba(255,210,90,0.25);
        }
        .search-input-wrapper {
            position: relative;
            width: 100%;
        }
        .search-input-wrapper i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #ffcd7e;
            font-size: 18px;
        }
        .search-input {
            width: 100%;
            height: 52px;
            padding: 0 16px 0 48px;
            font-size: 18px;
            border: none;
            border-radius: 40px;
            background: #2a2a2f;
            color: white;
            font-family: inherit;
            transition: all 0.2s;
        }
        .search-input:focus {
            outline: none;
            background: #35353e;
            box-shadow: 0 0 0 2px #ffcd7e;
        }
        .search-input::placeholder {
            color: #aaa;
        }
        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 18px;
            margin-top: 15px;
        }
        .record-card {
            background: rgba(22, 22, 30, 0.94);
            backdrop-filter: blur(4px);
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.12s ease, box-shadow 0.2s;
            border: 1px solid rgba(255,210,90,0.2);
        }
        .record-card:active {
            transform: scale(0.97);
        }
        .card-image {
            width: 100%;
            aspect-ratio: 1;
            background: #1f1f2a;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .default-record-bg {
            background: linear-gradient(145deg, #3a2c4a, #1e1a2f);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .default-record-bg i {
            font-size: 48px;
            color: #ffcd7e;
            opacity: 0.85;
        }
        .card-info {
            padding: 12px;
        }
        .card-artist {
            font-size: 13px;
            font-weight: 600;
            color: #ccc;
            margin-bottom: 5px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .card-title {
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 8px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .card-price {
            font-size: 16px;
            font-weight: 700;
            color: #9bffb0;
            margin-bottom: 8px;
        }
        .location-badge {
            display: inline-block;
            background: #2b422b;
            color: #c0ffb0;
            padding: 6px 10px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 600;
            width: 100%;
            text-align: center;
            box-sizing: border-box;
        }
        .location-badge i {
            margin-right: 6px;
            font-size: 10px;
        }
        .no-results, .loading-spinner {
            text-align: center;
            padding: 60px 20px;
        }
        .no-results i, .loading-spinner i {
            font-size: 56px;
            color: #ffcd7e;
            margin-bottom: 16px;
        }
        .loading-spinner i {
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .reset-kiosk-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(12px);
            border-radius: 50px;
            padding: 10px 18px;
            z-index: 150;
            border: 1px solid #ffcd7e;
            color: #ffcd7e;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
        }
        .reset-kiosk-btn:active {
            background: #ffcd7e20;
            transform: scale(0.96);
        }
        @media (max-width: 560px) {
            .results-grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
                gap: 12px;
            }
            .touch-card h2 {
                font-size: 28px;
            }
            .big-touch-area span {
                font-size: 20px;
            }
            .pig-icon-large {
                width: 80px;
                height: 80px;
            }
        }
    </style>
</head>
<body>

<!-- BACKGROUND IMAGE: static/images/background.png (same level as HTML folder? path: /static/images/background.png) -->
<div class="background-container">
    <img src="/static/images/background.png" alt="Record Store Background" class="background-image">
    <div class="background-overlay"></div>
</div>

<!-- SPLASH SCREEN (ATTENTION MODE) - using PigStyle.ico image -->
<div class="splash-screen" id="splashScreen">
    <div class="touch-card" id="touchToStartBtn">
        <!-- PigStyle.ico as large attention icon (instead of vinyl) -->
        <div class="pig-icon-large" role="img" aria-label="PigStyle Records"></div>
        <h2>PIGSTYLE RECORDS</h2>
        <p>Touch anywhere to browse the crates</p>
        <div class="big-touch-area">
            <i class="fas fa-hand-pointer"></i>
            <span>TOUCH TO SEARCH</span>
            <i class="fas fa-search"></i>
        </div>
        <div class="store-note">
            <i class="fas fa-shield-alt"></i> In-store kiosk · secure
        </div>
    </div>
</div>

<!-- MAIN INVENTORY VIEW (search + catalog) -->
<div class="results-view" id="resultsView">
    <div class="search-header">
        <div class="search-input-wrapper">
            <i class="fas fa-search"></i>
            <input type="text" class="search-input" id="searchInput" placeholder="Artist or album name..." autocomplete="off">
        </div>
    </div>
    <div id="resultsContainer">
        <div class="loading-spinner">
            <i class="fas fa-spinner"></i>
            <p>Loading vinyl collection...</p>
        </div>
    </div>
    <div class="reset-kiosk-btn" id="resetKioskBtn">
        <i class="fas fa-arrow-rotate-left"></i> 
        <span>START OVER</span>
    </div>
</div>

<!-- Load config utilities (local paths, safe) -->
<script src="/static/js/app-config.js"></script>
<script src="/static/js/config-value-manager.js"></script>

<script>
    (function() {
        // ---------- GLOBALS ----------
        let allRecords = [];
        let filteredRecords = [];
        
        // DOM elements
        const splashEl = document.getElementById('splashScreen');
        const resultsViewEl = document.getElementById('resultsView');
        const searchInput = document.getElementById('searchInput');
        const resultsContainer = document.getElementById('resultsContainer');
        const touchCard = document.getElementById('touchToStartBtn');
        const resetBtn = document.getElementById('resetKioskBtn');
        
        let inventoryLoaded = false;
        let isLoadingAttempt = false;
        
        // Helper: show splash (attract mode)
        function showSplashScreen() {
            if (searchInput) searchInput.value = '';
            resultsViewEl.classList.remove('active-view');
            splashEl.classList.remove('hide-splash');
            if (allRecords.length) {
                filteredRecords = [...allRecords];
                displayRecords(filteredRecords);
            }
        }
        
        // Show inventory (load records lazily)
        function showInventoryView() {
            splashEl.classList.add('hide-splash');
            resultsViewEl.classList.add('active-view');
            if (!inventoryLoaded && !isLoadingAttempt) {
                loadRecords();
            } else if (inventoryLoaded && allRecords.length > 0) {
                if (searchInput.value.trim() === '') {
                    filteredRecords = [...allRecords];
                    displayRecords(filteredRecords);
                } else {
                    filterRecords(searchInput.value);
                }
            }
        }
        
        // ----- FETCH INVENTORY (secure, same-origin, no mixed content) -----
        async function loadRecords() {
            if (isLoadingAttempt) return;
            isLoadingAttempt = true;
            showLoading();
            try {
                let baseUrl = '';
                if (typeof AppConfig !== 'undefined' && AppConfig.baseUrl) {
                    baseUrl = AppConfig.baseUrl;
                }
                const url = `${baseUrl}/catalog/records`;
                console.log('[Kiosk] Fetching inventory:', url);
                const response = await fetch(url, {
                    method: 'GET',
                    headers: { 'Accept': 'application/json' }
                });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                if (data.status === 'success' && Array.isArray(data.records)) {
                    allRecords = data.records;
                    filteredRecords = [...allRecords];
                    inventoryLoaded = true;
                    displayRecords(filteredRecords);
                } else {
                    throw new Error(data.message || 'Invalid inventory format');
                }
            } catch (err) {
                console.error('[Kiosk] Load error:', err);
                resultsContainer.innerHTML = `
                    <div class="no-results">
                        <i class="fas fa-exclamation-triangle"></i>
                        <p>Unable to load record collection.<br>${escapeHtml(err.message)}</p>
                        <button id="retryLoadBtn" style="margin-top: 20px; padding: 12px 28px; background: #ffcd7e; border: none; border-radius: 50px; color: #1e1e2a; font-weight: bold; font-size: 16px; cursor: pointer;">⟳ TRY AGAIN</button>
                    </div>
                `;
                const retryBtn = document.getElementById('retryLoadBtn');
                if (retryBtn) {
                    retryBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        isLoadingAttempt = false;
                        loadRecords();
                    }, { once: true });
                }
            } finally {
                isLoadingAttempt = false;
            }
        }
        
        function showLoading() {
            resultsContainer.innerHTML = `
                <div class="loading-spinner">
                    <i class="fas fa-spinner"></i>
                    <p>Digging through vinyl stacks...</p>
                </div>
            `;
        }
        
        // Display records as cards
        function displayRecords(records) {
            if (!records || records.length === 0) {
                resultsContainer.innerHTML = `
                    <div class="no-results">
                        <i class="fas fa-search"></i>
                        <p>No records match your search.</p>
                        <p style="font-size: 14px; margin-top: 8px;">Try a different artist or album.</p>
                    </div>
                `;
                return;
            }
            let html = '<div class="results-grid">';
            for (let rec of records) {
                const imageUrl = rec.image_url ? rec.image_url : null;
                let imageHtml = '';
                let imageClass = 'card-image';
                if (imageUrl && imageUrl.trim() !== '') {
                    imageHtml = `<img src="${escapeHtml(imageUrl)}" alt="${escapeHtml(rec.title)}" onerror="this.parentElement.innerHTML='<i class=\\'fas fa-record-vinyl\\'></i>'; this.parentElement.classList.add('default-record-bg');">`;
                    imageClass = 'card-image';
                } else {
                    imageHtml = `<i class="fas fa-record-vinyl"></i>`;
                    imageClass = 'card-image default-record-bg';
                }
                const artist = escapeHtml(rec.artist || 'Unknown Artist');
                const title = escapeHtml(rec.title || 'Untitled');
                const location = escapeHtml(rec.location || 'Ask staff');
                let priceDisplay = 'Call for price';
                if (rec.store_price && typeof rec.store_price === 'number') {
                    priceDisplay = `$${rec.store_price.toFixed(2)}`;
                } else if (rec.store_price && !isNaN(parseFloat(rec.store_price))) {
                    priceDisplay = `$${parseFloat(rec.store_price).toFixed(2)}`;
                }
                html += `
                    <div class="record-card">
                        <div class="${imageClass}">
                            ${imageHtml}
                        </div>
                        <div class="card-info">
                            <div class="card-artist">${artist}</div>
                            <div class="card-title">${title}</div>
                            <div class="card-price">${priceDisplay}</div>
                            <div class="location-badge">
                                <i class="fas fa-map-marker-alt"></i> ${location}
                            </div>
                        </div>
                    </div>
                `;
            }
            html += '</div>';
            resultsContainer.innerHTML = html;
        }
        
        function filterRecords(searchTerm) {
            if (!searchTerm || searchTerm.trim() === '') {
                filteredRecords = [...allRecords];
            } else {
                const term = searchTerm.toLowerCase().trim();
                filteredRecords = allRecords.filter(record => {
                    const artist = (record.artist || '').toLowerCase();
                    const title = (record.title || '').toLowerCase();
                    return artist.includes(term) || title.includes(term);
                });
            }
            displayRecords(filteredRecords);
        }
        
        let debounceTimer;
        function handleSearchInput(e) {
            if (!inventoryLoaded) return;
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => {
                filterRecords(e.target.value);
            }, 280);
        }
        
        // Full reset: back to splash (start over)
        function fullResetToStart() {
            if (searchInput) searchInput.value = '';
            if (inventoryLoaded && allRecords.length) {
                filteredRecords = [...allRecords];
                displayRecords(filteredRecords);
            }
            showSplashScreen();
            if (document.activeElement === searchInput) searchInput.blur();
        }
        
        // ----- EVENT LISTENERS (no HTTPS issues, all relative / local assets) -----
        if (touchCard) {
            touchCard.addEventListener('click', (e) => {
                e.stopPropagation();
                showInventoryView();
            });
        }
        // Also allow clicking on entire splash background for better usability
        if (splashEl) {
            splashEl.addEventListener('click', (e) => {
                if (e.target === splashEl || splashEl.contains(e.target)) {
                    showInventoryView();
                }
            });
        }
        
        if (resetBtn) {
            resetBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                fullResetToStart();
            });
        }
        
        if (searchInput) {
            searchInput.addEventListener('input', handleSearchInput);
        }
        
        // initial state: splash screen active, inventory view hidden, no data loaded until user touches.
        resultsViewEl.classList.remove('active-view');
        splashEl.classList.remove('hide-splash');
        
        // small helper for escaping HTML
        function escapeHtml(str) {
            if (!str) return '';
            return String(str).replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        // Edge: if background.png fails to load, it's still fine; PigStyle.ico shown prominently.
        console.log('[PigStyle Kiosk] Ready — "Touch to Search" attention screen with custom background and PigStyle icon.');
    })();
</script>
</body>
</html>
